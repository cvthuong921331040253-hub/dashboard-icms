<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8"/>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>TỒN TÁC VỤ CĐBR</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial;
      background:#f3f4f6;
      padding:15px;
      color:#111827;
    }

    h1{
      font-size:28px;
      margin-bottom:5px;
    }

    .update{
      color:#6b7280;
      margin-bottom:20px;
    }

    .section-title{
      margin:25px 0 15px;
      font-size:24px;
      font-weight:bold;
    }

    .dashboard{
      display:grid;
      grid-template-columns:
        repeat(auto-fit,minmax(220px,1fr));

      gap:15px;
    }

    .card{
      background:white;
      border-radius:12px;
      padding:20px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
      cursor:pointer;
      transition:.2s;
    }

    .card:hover{
      transform:translateY(-3px);
    }

    .card-title{
      font-weight:bold;
      margin-bottom:12px;
      font-size:18px;
    }

    .card-count{
      font-size:40px;
      font-weight:bold;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.5);

      display:flex;
      justify-content:center;
      align-items:center;

      z-index:9999;
    }

    .hidden{
      display:none;
    }

    .modal-content{

      width:96%;
      height:92vh;

      background:white;

      border-radius:12px;

      padding:15px;

      overflow:auto;

    }

    .modal-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:15px;
    }

    .close-btn{
      border:none;
      background:red;
      color:white;
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:15px;
    }

    .toolbar input,
    .toolbar select{

      padding:10px;
      border:1px solid #ddd;
      border-radius:8px;

    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th{
      background:#f3f4f6;
      position:sticky;
      top:0;
      z-index:2;
    }

    th,td{
      border:1px solid #ddd;
      padding:8px;
      text-align:left;
      font-size:14px;
      vertical-align:top;
    }

    tr:nth-child(even){
      background:#fafafa;
    }

    .badge{
      padding:4px 8px;
      border-radius:6px;
      color:white;
      font-size:12px;
      font-weight:bold;
      display:inline-block;
    }

    .red{
      background:#dc2626;
    }

    .orange{
      background:#ea580c;
    }

    .blue{
      background:#2563eb;
    }

    .purple{
      background:#7c3aed;
    }

    .gray{
      background:#6b7280;
    }

    .green{
      background:#16a34a;
    }

    .expand-btn{
      color:#2563eb;
      cursor:pointer;
      margin-top:5px;
      font-size:13px;
    }

    .nd-full{
      display:none;
      margin-top:5px;
      white-space:pre-wrap;
      line-height:1.5;
    }

    .show{
      display:block;
    }

  </style>

</head>

<body>

  <h1>TỒN TÁC VỤ CĐBR</h1>

  <div
    class="update"
    id="updateTime"
  >
    Đang tải...
  </div>

  <!-- TON SC -->

  <div class="section-title">
    TỒN SỰ CỐ
  </div>

  <div
    class="dashboard"
    id="tonscDashboard"
  ></div>

  <!-- TON TKM -->

  <div class="section-title">
    TỒN TRIỂN KHAI
  </div>

  <div
    class="dashboard"
    id="tontkmDashboard"
  ></div>

  <!-- MODAL -->

  <div
    class="modal hidden"
    id="modal"
  >

    <div class="modal-content">

      <div class="modal-header">

        <h2 id="modalTitle"></h2>

        <button
          class="close-btn"
          onclick="closeModal()"
        >
          Đóng
        </button>

      </div>

      <div class="toolbar">

        <input
          type="text"
          id="searchInput"
          placeholder="Tìm kiếm..."
        >

        <select id="huyenFilter">
          <option value="">
            Tất cả huyện
          </option>
        </select>

      </div>

      <div id="tableContainer"></div>

    </div>

  </div>

  <script>

    const API =
      "https://script.google.com/macros/s/AKfycbz8k9j9KDRnEQhV6Y1568e-WSZoSamqS4p8JJZJv6wN27QOG4oSm0Oi7to7LDIDLuED/exec";

    let tonsc = [];
    let tontkm = [];

    let currentData = [];

    async function loadData(){

      try{

        const res =
          await fetch(API);

        const json =
          await res.json();

        tonsc =
          json.tonsc || [];

        tontkm =
          json.tontkm || [];

        console.log(
          "TON SC:",
          tonsc.length
        );

        console.log(
          "TON TKM:",
          tontkm.length
        );

        document
          .getElementById("updateTime")
          .innerHTML =
            "Cập nhật: " +
            new Date()
            .toLocaleString();

        renderTonSC();

        renderTonTKM();

      }catch(err){

        console.error(err);

        alert("Lỗi tải API");

      }

    }

    /* =====================
       CARD
    ===================== */

    function createCard(
      title,
      count,
      color,
      onClick
    ){

      return `
        <div
          class="card"
          onclick="${onClick}"
        >

          <div class="card-title">
            ${title}
          </div>

          <div
            class="card-count"
            style="color:${color}"
          >
            ${count}
          </div>

        </div>
      `;

    }

    /* =====================
       TON SC
    ===================== */

    function renderTonSC(){

      const dashboard =
        document.getElementById(
          "tonscDashboard"
        );

      const socpk =
        tonsc.filter(x => {

          const v =
            String(x.sc || "")
            .trim()
            .toUpperCase();

          return v ===
            "SOC HOME WIFI";

        });

      const soc =
        tonsc.filter(x => {

          const v =
            String(x.sc || "")
            .trim()
            .toUpperCase();

          return (
            v === "SOC PORT KÉM" ||
            v === "HÀNG LOẠT"
          );

        });

      const suco =
        tonsc.filter(x => {

          const v =
            String(x.sc || "")
            .trim()
            .toUpperCase();

          return [

            "SC",
            "HT",
            "SC HOT",
            "HT HOT",
            "SC VIP",
            "HT VIP"

          ].includes(v);

        });

      const chuagiao =
        tonsc.filter(x => {

          return (
            !x.nv ||
            x.nv == 0
          );

        });

      window.socpkData = socpk;
      window.socData = soc;
      window.sucoData = suco;
      window.chuagiaoData = chuagiao;

      dashboard.innerHTML =

        createCard(
          "SOC PK",
          socpk.length,
          "#2563eb",
          "showTable('SOC PK',socpkData)"
        )

        +

        createCard(
          "SOC",
          soc.length,
          "#ea580c",
          "showTable('SOC',socData)"
        )

        +

        createCard(
          "SỰ CỐ",
          suco.length,
          "#dc2626",
          "showTable('SỰ CỐ',sucoData)"
        )

        +

        createCard(
          "SC CHƯA GIAO",
          chuagiao.length,
          "#7c3aed",
          "showTable('SC CHƯA GIAO',chuagiaoData)"
        );

    }

    /* =====================
       TON TKM
    ===================== */

    function renderTonTKM(){
    
      const dashboard =
        document.getElementById(
          "tontkmDashboard"
        );
    
      const groups = {};
    
      /* =====================
         GROUP KPI
      ===================== */
    
      tontkm.forEach(x => {
    
        let kpi =
          String(x.kpi || "")
            .trim();
    
        /* KPI RỖNG */
    
        if(!kpi){
    
          kpi = "KHÔNG KPI";
    
        }
    
        if(!groups[kpi]){
    
          groups[kpi] = [];
    
        }
    
        groups[kpi].push(x);
    
      });
    
      let html = "";
    
      /* =====================
         CARD TỔNG
      ===================== */
    
      window.tongtkm = tontkm;
    
      html += createCard(
    
        "TỔNG",
    
        tontkm.length,
    
        "#111827",
    
        "showTable('TỔNG',tongtkm)"
    
      );
    
      /* =====================
         KPI CARD
      ===================== */
    
      Object.keys(groups)
    
        .sort()
    
        .forEach(kpi => {
    
          window[
            "kpi_" + kpi
          ] = groups[kpi];
    
          html += createCard(
    
            kpi,
    
            groups[kpi].length,
    
            "#16a34a",
    
            `showTable('${kpi}',window['kpi_${kpi}'])`
    
          );
    
        });
    
      /* =====================
         CHƯA GIAO
      ===================== */
    
      const chuagiao =
        tontkm.filter(x =>
    
          String(x.tt || "")
            .trim()
            .toUpperCase()
    
          ===
    
          "ĐANG GIAO TỔ ĐỘI"
    
        );
    
      window.tkmchuagiao =
        chuagiao;
    
      html += createCard(
    
        "TKM CHƯA GIAO",
    
        chuagiao.length,
    
        "#7c3aed",
    
        "showTable('TKM CHƯA GIAO',tkmchuagiao)"
    
      );
    
      dashboard.innerHTML = html;
    
      /* =====================
         DEBUG
      ===================== */
    
      console.log(
        "TOTAL TKM:",
        tontkm.length
      );
    
      console.log(
        "GROUPS:",
        groups
      );
    
    }

    /* =====================
       MODAL
    ===================== */

    function showTable(title,data){

      currentData = data;

      document
        .getElementById("modal")
        .classList.remove("hidden");

      document
        .getElementById("modalTitle")
        .innerHTML = title;

      initFilters(data);

      renderTable(data);

    }

    function initFilters(data){

      const huyenSet =
        new Set();

      data.forEach(x => {

        if(x.huyen){

          huyenSet.add(
            x.huyen
          );

        }

      });

      const select =
        document.getElementById(
          "huyenFilter"
        );

      select.innerHTML =
        `<option value="">
          Tất cả huyện
        </option>`;

      [...huyenSet]
        .sort()
        .forEach(h => {

          select.innerHTML +=
            `<option value="${h}">
              ${h}
            </option>`;

        });

    }

    document
      .getElementById("searchInput")
      .addEventListener(
        "input",
        filterTable
      );

    document
      .getElementById("huyenFilter")
      .addEventListener(
        "change",
        filterTable
      );

    function filterTable(){

      const kw =
        document
          .getElementById("searchInput")
          .value
          .toLowerCase();

      const huyen =
        document
          .getElementById("huyenFilter")
          .value;

      const filtered =
        currentData.filter(row => {

          const text =
            JSON.stringify(row)
            .toLowerCase();

          const okSearch =
            text.includes(kw);

          const okHuyen =
            !huyen ||
            row.huyen == huyen;

          return okSearch &&
            okHuyen;

        });

      renderTable(filtered);

    }

    function renderTable(data){

      if(!data.length){

        document
          .getElementById("tableContainer")
          .innerHTML =
            "Không có dữ liệu";

        return;

      }

      data.sort((a,b) => {

        return new Date(b.tg)
          - new Date(a.tg);

      });

      const cols =
        Object.keys(data[0]);

      let html =
        `<table>
          <thead>
            <tr>`;

      cols.forEach(c => {

        html += `<th>${c}</th>`;

      });

      html += `
            </tr>
          </thead>
          <tbody>
      `;

      data.forEach((row,index) => {

        html += "<tr>";

        cols.forEach(c => {

          let val =
            row[c] || "";

          /* badge sc */

          if(c === "sc"){

            let cls = "gray";

            if(
              String(val)
              .includes("HOT")
            ){

              cls = "red";

            }
            else if(
              String(val)
              .includes("VIP")
            ){

              cls = "purple";

            }
            else if(
              String(val)
              .includes("SOC")
            ){

              cls = "orange";

            }
            else{

              cls = "blue";

            }

            val =
              `<span class="badge ${cls}">
                ${val}
              </span>`;

          }

          /* expand nd */

          if(c === "nd"){

            const shortText =
              String(val)
              .substring(0,80);

            html += `
              <td
                style="min-width:300px"
              >

                <div>
                  ${shortText}
                </div>

                <div
                  class="nd-full"
                  id="full_${index}"
                >
                  ${val}
                </div>

                <div
                  class="expand-btn"
                  onclick="toggleND(${index})"
                >
                  Xem thêm
                </div>

              </td>
            `;

          }else{

            html += `<td>${val}</td>`;

          }

        });

        html += "</tr>";

      });

      html += `
          </tbody>
        </table>
      `;

      document
        .getElementById("tableContainer")
        .innerHTML = html;

    }

    function toggleND(index){

      document
        .getElementById(
          "full_" + index
        )
        .classList.toggle("show");

    }

    function closeModal(){

      document
        .getElementById("modal")
        .classList.add("hidden");

    }

    loadData();

    setInterval(
      loadData,
      30000
    );

  </script>

</body>
</html>
