<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>TỒN TÁC VỤ CĐBR</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#f3f4f6;
      color:#111827;
      padding:15px;
    }

    h1{
      font-size:28px;
      margin-bottom:5px;
    }

    .update{
      color:#6b7280;
      margin-bottom:20px;
      font-size:14px;
    }

    .section-title{
      margin:20px 0 12px;
      font-size:22px;
      font-weight:bold;
    }

    .dashboard{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:15px;
    }

    .card{
      background:white;
      border-radius:12px;
      padding:18px;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
      cursor:pointer;
      transition:.2s;
    }

    .card:hover{
      transform:translateY(-3px);
    }

    .card-title{
      font-size:16px;
      margin-bottom:10px;
      font-weight:bold;
    }

    .card-count{
      font-size:34px;
      font-weight:bold;
      color:#2563eb;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.5);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .hidden{
      display:none;
    }

    .modal-content{
      width:96%;
      height:92vh;
      background:white;
      border-radius:12px;
      padding:15px;
      overflow:auto;
    }

    .modal-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    .modal-header h2{
      font-size:22px;
    }

    .close-btn{
      background:red;
      color:white;
      border:none;
      padding:8px 14px;
      border-radius:8px;
      cursor:pointer;
    }

    .toolbar{
      display:flex;
      gap:10px;
      margin-bottom:15px;
      flex-wrap:wrap;
    }

    .toolbar input,
    .toolbar select{
      padding:10px;
      border:1px solid #ddd;
      border-radius:8px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th{
      background:#f3f4f6;
      position:sticky;
      top:0;
      z-index:2;
    }

    th,td{
      border:1px solid #ddd;
      padding:8px;
      font-size:14px;
      text-align:left;
      vertical-align:top;
    }

    tr:nth-child(even){
      background:#fafafa;
    }

    .badge{
      padding:4px 8px;
      border-radius:6px;
      font-size:12px;
      color:white;
      font-weight:bold;
      display:inline-block;
    }

    .red{
      background:#dc2626;
    }

    .orange{
      background:#ea580c;
    }

    .blue{
      background:#2563eb;
    }

    .green{
      background:#16a34a;
    }

    .purple{
      background:#7c3aed;
    }

    .gray{
      background:#6b7280;
    }

    .expand-btn{
      color:#2563eb;
      cursor:pointer;
      margin-top:5px;
      font-size:13px;
    }

    .nd-full{
      display:none;
      margin-top:5px;
      white-space:pre-wrap;
      line-height:1.5;
    }

    .show{
      display:block;
    }

    @media(max-width:768px){

      body{
        padding:10px;
      }

      .card-count{
        font-size:28px;
      }

      table{
        font-size:12px;
      }

      th,td{
        padding:6px;
      }

    }

  </style>

</head>

<body>

  <h1>TỒN TÁC VỤ CĐBR</h1>

  <div class="update" id="updateTime">
    Đang tải dữ liệu...
  </div>

  <!-- TON SC -->

  <div class="section-title">
    TỒN SỰ CỐ
  </div>

  <div class="dashboard" id="tonscDashboard"></div>

  <!-- TON TKM -->

  <div class="section-title">
    TỒN TRIỂN KHAI
  </div>

  <div class="dashboard" id="tontkmDashboard"></div>

  <!-- MODAL -->

  <div class="modal hidden" id="modal">

    <div class="modal-content">

      <div class="modal-header">

        <h2 id="modalTitle"></h2>

        <button class="close-btn" onclick="closeModal()">
          Đóng
        </button>

      </div>

      <div class="toolbar">

        <input
          type="text"
          id="searchInput"
          placeholder="Tìm kiếm..."
        >

        <select id="huyenFilter">
          <option value="">Tất cả huyện</option>
        </select>

      </div>

      <div id="tableContainer"></div>

    </div>

  </div>

  <script>

    const API =
      "https://script.google.com/macros/s/AKfycbx5pF40GAhapDMZJovrWgI0Y6N6HOMW40u2gcl4_n5wARTiJLkkK0aOGP1i4fmitTI5/exec";

    let tonsc = [];
    let tontkm = [];

    let currentData = [];

    async function loadData(){

      try{

        const res = await fetch(API);

        const json = await res.json();

        tonsc = json.tonsc || [];
        tontkm = json.tontkm || [];

        document.getElementById("updateTime").innerHTML =
          "Cập nhật: " + new Date().toLocaleString();

        renderTonSC();

        renderTonTKM();

      }catch(err){

        console.error(err);

        alert("Lỗi tải API");

      }

    }

    /* =====================
       CARD
    ===================== */

    function createCard(title,count,color,onClick){

      return `
        <div
          class="card"
          onclick="${onClick}"
        >

          <div class="card-title">
            ${title}
          </div>

          <div class="card-count" style="color:${color}">
            ${count}
          </div>

        </div>
      `;

    }

    /* =====================
       TON SC
    ===================== */

    function renderTonSC(){

      const dashboard =
        document.getElementById("tonscDashboard");

      const socpk =
        tonsc.filter(x =>
          String(x["Loại sự cố"]).trim() ===
          "SOC HOME WIFI"
        );

      const soc =
        tonsc.filter(x => {

          const v =
            String(x["Loại sự cố"]).trim();

          return (
            v === "SOC PORT KÉM" ||
            v === "HÀNG LOẠT"
          );

        });

      const suco =
        tonsc.filter(x => {

          const v =
            String(x["Loại sự cố"]).trim();

          return [
            "SC",
            "HT",
            "SC HOT",
            "HT HOT",
            "SC VIP",
            "HT VIP"
          ].includes(v);

        });

      const chuagiao =
        tonsc.filter(x => {

          const nv =
            x["Tên NV"];

          return (
            nv === "" ||
            nv === null ||
            nv == 0
          );

        });

      window.socpkData = socpk;
      window.socData = soc;
      window.sucoData = suco;
      window.chuagiaoData = chuagiao;

      dashboard.innerHTML =

        createCard(
          "SOC PK",
          socpk.length,
          "#2563eb",
          "showTable('SOC PK',socpkData)"
        )

        +

        createCard(
          "SOC",
          soc.length,
          "#ea580c",
          "showTable('SOC',socData)"
        )

        +

        createCard(
          "SỰ CỐ",
          suco.length,
          "#dc2626",
          "showTable('SỰ CỐ',sucoData)"
        )

        +

        createCard(
          "SC CHƯA GIAO",
          chuagiao.length,
          "#7c3aed",
          "showTable('SC CHƯA GIAO',chuagiaoData)"
        );

    }

    /* =====================
       TON TKM
    ===================== */

    function renderTonTKM(){

      const dashboard =
        document.getElementById("tontkmDashboard");

      const groups = {};

      tontkm.forEach(x => {

        const kpi =
          x["Tính KPI"] || "Khác";

        if(!groups[kpi]){

          groups[kpi] = [];

        }

        groups[kpi].push(x);

      });

      let html = "";

      Object.keys(groups).forEach(kpi => {

        window["kpi_" + kpi] =
          groups[kpi];

        html += createCard(

          kpi,

          groups[kpi].length,

          "#16a34a",

          `showTable('${kpi}',window['kpi_${kpi}'])`

        );

      });

      const chuagiao =
        tontkm.filter(x =>
          String(x["Trạng thái CV"]).trim()
          === "Đang giao tổ đội"
        );

      window.tkmchuagiao =
        chuagiao;

      html += createCard(

        "TKM CHƯA GIAO",

        chuagiao.length,

        "#7c3aed",

        "showTable('TKM CHƯA GIAO',tkmchuagiao)"

      );

      dashboard.innerHTML = html;

    }

    /* =====================
       MODAL TABLE
    ===================== */

    function showTable(title,data){

      currentData = data;

      document
        .getElementById("modal")
        .classList.remove("hidden");

      document
        .getElementById("modalTitle")
        .innerHTML = title;

      initFilters(data);

      renderTable(data);

    }

    function initFilters(data){

      const huyenSet = new Set();

      data.forEach(x => {

        const h =
          x["Huyện"];

        if(h){

          huyenSet.add(h);

        }

      });

      const select =
        document.getElementById("huyenFilter");

      select.innerHTML =
        `<option value="">Tất cả huyện</option>`;

      [...huyenSet]
        .sort()
        .forEach(h => {

          select.innerHTML +=
            `<option value="${h}">
              ${h}
            </option>`;

        });

    }

    document
      .getElementById("searchInput")
      .addEventListener("input",filterTable);

    document
      .getElementById("huyenFilter")
      .addEventListener("change",filterTable);

    function filterTable(){

      const kw =
        document
          .getElementById("searchInput")
          .value
          .toLowerCase();

      const huyen =
        document
          .getElementById("huyenFilter")
          .value;

      const filtered =
        currentData.filter(row => {

          const text =
            JSON.stringify(row)
            .toLowerCase();

          const okSearch =
            text.includes(kw);

          const okHuyen =
            !huyen ||
            row["Huyện"] == huyen;

          return okSearch && okHuyen;

        });

      renderTable(filtered);

    }

    function renderTable(data){

      if(!data.length){

        document
          .getElementById("tableContainer")
          .innerHTML =
            "Không có dữ liệu";

        return;

      }

      data.sort((a,b) => {

        return new Date(b["Thời gian"])
          - new Date(a["Thời gian"]);

      });

      const cols =
        Object.keys(data[0]);

      let html =
        `<table>
          <thead>
            <tr>`;

      cols.forEach(c => {

        html += `<th>${c}</th>`;

      });

      html += `
            </tr>
          </thead>
          <tbody>
      `;

      data.forEach((row,index) => {

        html += "<tr>";

        cols.forEach(c => {

          let val = row[c] || "";

          /* Badge */

          if(c === "Loại sự cố"){

            let cls = "gray";

            if(String(val).includes("HOT")){

              cls = "red";

            }
            else if(String(val).includes("VIP")){

              cls = "purple";

            }
            else if(String(val).includes("SOC")){

              cls = "orange";

            }
            else{

              cls = "blue";

            }

            val =
              `<span class="badge ${cls}">
                ${val}
              </span>`;

          }

          /* Expand nội dung */

          if(c === "Nội dung PA"){

            const shortText =
              String(val)
                .substring(0,80);

            html += `

              <td style="min-width:300px">

                <div>
                  ${shortText}
                </div>

                <div
                  class="nd-full"
                  id="full_${index}"
                >
                  ${val}
                </div>

                <div
                  class="expand-btn"
                  onclick="toggleND(${index})"
                >
                  Xem thêm
                </div>

              </td>

            `;

          }else{

            html += `<td>${val}</td>`;

          }

        });

        html += "</tr>";

      });

      html += `
          </tbody>
        </table>
      `;

      document
        .getElementById("tableContainer")
        .innerHTML = html;

    }

    function toggleND(index){

      const el =
        document
          .getElementById("full_" + index);

      el.classList.toggle("show");

    }

    function closeModal(){

      document
        .getElementById("modal")
        .classList.add("hidden");

    }

    loadData();

    setInterval(loadData,30000);

  </script>

</body>

</html>
