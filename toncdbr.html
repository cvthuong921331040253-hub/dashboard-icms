<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1,user-scalable=no"/>
<title>TỒN TÁC VỤ CĐBR</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{font-family:Arial;background:#f3f4f6;padding:15px;color:#111827;}

h1{font-size:28px;margin-bottom:5px;}

.update{color:#6b7280;margin-bottom:20px;}

.section-title{margin:25px 0 15px;font-size:24px;font-weight:bold;}

.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;}

.card{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.08);cursor:pointer;transition:.2s;}

.card:hover{transform:translateY(-3px);}

.card-title{font-weight:bold;margin-bottom:12px;font-size:18px;}

.card-count{font-size:40px;font-weight:bold;}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;justify-content:center;align-items:center;z-index:9999;}

.hidden{display:none;}

.modal-content{width:96%;height:92vh;background:white;border-radius:12px;padding:15px;overflow:auto;}

.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}

.close-btn{border:none;background:red;color:white;padding:10px 14px;border-radius:8px;cursor:pointer;}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;}

.toolbar input,.toolbar select{padding:10px;border:1px solid #ddd;border-radius:8px;}

table{width:100%;border-collapse:collapse;background:white;}

th{background:#f3f4f6;position:sticky;top:0;z-index:20;white-space:nowrap;}

th{border:1px solid #ddd;padding:8px;text-align:center;font-size:14px;vertical-align:middle;}

td{border:1px solid #ddd;padding:8px;text-align:left;font-size:14px;vertical-align:middle;}

tr:nth-child(even){background:#fafafa;}

.badge{padding:4px 8px;border-radius:6px;color:white;font-size:12px;font-weight:bold;display:inline-block;}

.red{background:#dc2626;}

.orange{background:#ea580c;}

.blue{background:#2563eb;}

.purple{background:#7c3aed;}

.gray{background:#6b7280;}

.green{background:#16a34a;}

.expand-btn{color:#2563eb;cursor:pointer;margin-top:5px;font-size:13px;}

.nd-full{display:none;margin-top:5px;white-space:pre-wrap;line-height:1.5;}

.show{display:block;}
.toolbar button{padding:10px 14px;border:none;border-radius:8px;background:#16a34a;color:white;cursor:pointer;font-weight:bold;}

@media(max-width:768px){

body{padding:8px;}

h1{font-size:22px;}

.section-title{font-size:20px;margin:18px 0 10px;}

.dashboard{grid-template-columns:repeat(2,1fr);gap:8px;}

.card{padding:12px;border-radius:10px;}

.card-title{font-size:14px;margin-bottom:6px;}

.card-count{font-size:30px;}

.modal-content{width:100%;height:100vh;border-radius:0;padding:8px;}

.modal-header{margin-bottom:8px;}

.modal-header h2{font-size:18px;}

.close-btn{padding:8px 10px;font-size:13px;}

.toolbar{gap:6px;flex-direction:column;}

.toolbar input,.toolbar select,.toolbar button{width:100%;font-size:14px;padding:10px;}

table{font-size:12px;min-width:1200px;}

th,td{padding:6px;font-size:12px;}

.badge{font-size:10px;padding:3px 6px;}

.expand-btn{font-size:12px;}

}
</style>

</head>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<body>

<h1>📊 TỒN TÁC VỤ CĐBR</h1>

<div class="update" id="updateTime">⏳ Đang tải dữ liệu...vui lòng chờ!</div>

<div class="section-title">🔥TỒN SỰ CỐ</div>

<div class="dashboard" id="tonscDashboard"></div>

<div class="section-title">🔥TỒN TRIỂN KHAI</div>

<div class="dashboard" id="tontkmDashboard"></div>

<div class="modal hidden" id="modal">

<div class="modal-content">

<div class="modal-header">

<h2 id="modalTitle"></h2>

<button class="close-btn" onclick="closeModal()">Đóng</button>

</div>

<div class="toolbar">
<button onclick="exportExcel()">Xuất Excel</button>

<input type="text" id="searchInput" placeholder="Tìm kiếm...">

<select id="huyenFilter">
<option value="">Tất cả huyện</option>
</select>

<select id="typeFilter">
<option value="">Tất cả loại</option>
</select>

</div>

<div style="overflow:auto;width:100%;"><div id="tableContainer"></div></div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbywITVgVMxEBC3i38MtqT9lBsxFZn_T_dX6p3zWiLAPvcRoOOgnPndZbKSrPPvkutSR/exec";

let tonsc=[];
let tontkm=[];
let currentData=[];
let filteredData=[];

function countUniqueAccount(data){const set=new Set();data.forEach(x=>{const acc=String(x.account||"").replace(/\s+/g," ").trim().toUpperCase();if(acc)set.add(acc);});return set.size;}

function parseDateVN(str){if(!str)return 0;try{const [datePart,timePart]=str.split(" ");const [d,m,y]=datePart.split("/");const [hh,mm,ss]=(timePart||"00:00:00").split(":");return new Date(Number(y),Number(m)-1,Number(d),Number(hh),Number(mm),Number(ss));}catch(err){return 0;}}

async function loadData(){

try{

const res=await fetch(API);
const json=await res.json();

tonsc=json.tonsc||[];
tontkm=json.tontkm||[];

console.log("TON SC:",tonsc.length);
console.log("TON TKM:",tontkm.length);

renderTonSC();
renderTonTKM();
document.getElementById("updateTime").innerHTML="⏰ Thời gian lấy báo cáo: "+(tontkm[0]?.tgupdate||"");
}catch(err){

console.error(err);
alert("Lỗi tải API");

}

}

function createCard(title,count,color,onClick){

return `
<div class="card" onclick="${onClick}">
<div class="card-title">${title}</div>
<div class="card-count" style="color:${color}">${count}</div>
</div>
`;

}

/* =====================
TON SC
===================== */

function renderTonSC(){

const dashboard=document.getElementById("tonscDashboard");

const socpk=tonsc.filter(x=>{const v=String(x.sc||"").replace(/\s+/g," ").trim().toUpperCase();return v==="SOC PK";});

const soc=tonsc.filter(x=>{const v=String(x.sc||"").replace(/\s+/g," ").trim().toUpperCase();return v==="SOC";});

const suco=tonsc.filter(x=>{const v=String(x.sc||"").replace(/\s+/g," ").trim().toUpperCase();return v.includes("SC")||v.includes("HT");});

const chuagiao=tonsc.filter(x=>{return !x.user||x.user==0;});

window.tongsc=tonsc;
window.socpkData=socpk;
window.socData=soc;
window.sucoData=suco;
window.chuagiaoData=chuagiao;

dashboard.innerHTML=

createCard("TỔNG SC",countUniqueAccount(tonsc),"#111827","showTable('TỔNG SC',tongsc)")

+

createCard("SOC PK",countUniqueAccount(socpk),"#2563eb","showTable('SOC PK',socpkData)")

+

createCard("SOC",countUniqueAccount(soc),"#ea580c","showTable('SOC',socData)")

+

createCard("SỰ CỐ",countUniqueAccount(suco),"#dc2626","showTable('SỰ CỐ',sucoData)")

+

createCard("SC CHƯA GIAO",countUniqueAccount(chuagiao),"#7c3aed","showTable('SC CHƯA GIAO',chuagiaoData)");

}

/* =====================
TON TKM
===================== */

function renderTonTKM(){

const dashboard=document.getElementById("tontkmDashboard");

const groups={};

const capnhaths=tontkm.filter(x=>String(x.tt||"").replace(/\s+/g," ").trim().toUpperCase()==="CẬP NHẬT HỒ SƠ");

window.capnhaths=capnhaths;

tontkm.forEach(x=>{

const tt=String(x.tt||"").replace(/\s+/g," ").trim().toUpperCase();

if(tt==="CẬP NHẬT HỒ SƠ")return;

let kpi=String(x.kpi||"").replace(/\s+/g," ").trim().toUpperCase();

if(!kpi)kpi="KHÔNG KPI";

if(!groups[kpi])groups[kpi]=[];

groups[kpi].push(x);

});

let html="";

window.tongtkm=tontkm;

html+=createCard("TỔNG TKM",countUniqueAccount(tontkm),"#111827","showTable('TỔNG TKM',tongtkm)");

Object.keys(groups).sort().forEach(kpi=>{

window["kpi_"+kpi]=groups[kpi];

const cardColor=(kpi==="QUÁ 24H"||kpi==="QUÁ HẸN")?"#dc2626":"#16a34a";

html+=createCard(kpi,countUniqueAccount(groups[kpi]),cardColor,`showTable('${kpi}',window['kpi_${kpi}'])`);

});

const chuagiao=tontkm.filter(x=>String(x.tt||"").replace(/\s+/g," ").trim().toUpperCase()==="ĐANG GIAO TỔ ĐỘI");

window.tkmchuagiao=chuagiao;
  
html+=createCard("TỒN CẬP NHẬT HỒ SƠ",countUniqueAccount(capnhaths),"#dc2626","showTable('TỒN CẬP NHẬT HỒ SƠ',capnhaths)");

html+=createCard("TKM CHƯA GIAO",countUniqueAccount(chuagiao),"#7c3aed","showTable('TKM CHƯA GIAO',tkmchuagiao)");

dashboard.innerHTML=html;

}

/* =====================
MODAL
===================== */

function showTable(title,data){

currentData=data;
filteredData=data;

document.getElementById("modal").classList.remove("hidden");

document.getElementById("modalTitle").innerHTML=title;

initFilters(data);

renderTable(data);

}

function initFilters(data){

const huyenSet=new Set();
const typeSet=new Set();

data.forEach(x=>{

if(x.huyen)huyenSet.add(x.huyen);

if(x.sc)typeSet.add(x.sc);

if(x.kpi)typeSet.add(x.kpi);

});

const huyenSelect=document.getElementById("huyenFilter");

huyenSelect.innerHTML=`<option value="">Tất cả huyện</option>`;

[...huyenSet].sort().forEach(h=>{

huyenSelect.innerHTML+=`<option value="${h}">${h}</option>`;

});

const typeSelect=document.getElementById("typeFilter");

typeSelect.innerHTML=`<option value="">Tất cả loại</option>`;

[...typeSet].sort().forEach(t=>{

typeSelect.innerHTML+=`<option value="${t}">${t}</option>`;

});

}

document.getElementById("searchInput").addEventListener("input",filterTable);

document.getElementById("huyenFilter").addEventListener("change",filterTable);

document.getElementById("typeFilter").addEventListener("change",filterTable);
  
function filterTable(){

const kw=document.getElementById("searchInput").value.toLowerCase();

const huyen=document.getElementById("huyenFilter").value;

const type=document.getElementById("typeFilter").value;

const filtered=currentData.filter(row=>{

const text=JSON.stringify(row).toLowerCase();

const okSearch=text.includes(kw);

const okHuyen=!huyen||row.huyen==huyen;

const okType=!type||row.sc==type||row.kpi==type;

return okSearch&&okHuyen&&okType;

});
filteredData=filtered;
renderTable(filtered);

}

function getColumnTitle(col){

const map={

user:"Mã nv",
nv:"Tên nv",
tg:"Thời gian",
huyen:"Huyện",
account:"Account",
dc:"Địa chỉ",
ngay:"Ngày phát sinh",
gio:"Giờ phát sinh",
sc:"Loại sự cố",
mdb:"Mất đồng bộ GNOC",
gnoc:"Trạng thái GNOC",
nd:"Nội dung",

cv:"Loại cv",
gline:"Gline",
ntdn:"Ngày đấu nối",
ntnt:"Ngày nghiệm thu",
tt:"Trạng thái cv",
tthen:"Trạng thái tích hẹn",
kpi:"Tính KPI",
nnt:"Nguyên nhân tồn",
nnth:"Nguyên nhân tích hủy"

};

return map[col]||col;

}

function renderTable(data){

if(!data.length){
document.getElementById("tableContainer").innerHTML="Không có dữ liệu";return;}

data.sort((a,b)=>{

const tgA=parseFloat(a.tg)||0;

const tgB=parseFloat(b.tg)||0;

return tgB-tgA;

});

const cols=Object.keys(data[0]).filter(c=>c!=="user"&&c!=="thuongcv1"&&c!=="tgupdate");

let html=`<table><thead><tr>`;

cols.forEach(c=>{

let stickyHeader="";

if(c==="nv"){

stickyHeader="position:sticky;left:0;z-index:30;background:#f3f4f6;min-width:140px;";

}

if(c==="cv"){

stickyHeader="position:sticky;left:0;z-index:30;background:#f3f4f6;min-width:160px;";

}

html+=`<th style="${stickyHeader}">${getColumnTitle(c)}</th>`;

});

html+=`</tr></thead><tbody>`;

data.forEach((row,index)=>{

html+="<tr>";

cols.forEach(c=>{

let val=row[c]||"";

let stickyStyle="";

if(c==="nv"){

stickyStyle="position:sticky;left:0;background:#fff;z-index:10;min-width:140px;";

}

if(c==="cv"){

stickyStyle="position:sticky;left:0;background:#fff;z-index:10;min-width:160px;";

}

if(c==="tg"){

const tgValue=parseFloat(val)||0;

const tgColor=tgValue>24?"#dc2626":"";

html+=`<td style="${stickyStyle}color:${tgColor};font-weight:bold;">${val}</td>`;

}

else if(c==="sc"){

let cls="gray";

if(String(val).includes("HOT"))cls="red";
else if(String(val).includes("VIP"))cls="purple";
else if(String(val).includes("SOC"))cls="orange";
else cls="blue";

val=`<span class="badge ${cls}">${val}</span>`;

html+=`<td style="${stickyStyle}">${val}</td>`;}

else if(c==="nd"){

const shortText=String(val).substring(0,80);

html+=`
<td style="${stickyStyle}min-width:300px">
<div>${shortText}</div>
<div class="nd-full" id="full_${index}">${val}</div>
<div class="expand-btn" onclick="toggleND(${index})">Xem thêm</div>
</td>`;}

else{
html+=`<td style="${stickyStyle}">${val}</td>`;
}
});

html+="</tr>";

});

html+=`</tbody></table>`;

document.getElementById("tableContainer").innerHTML=html;

}

function toggleND(index){

document.getElementById("full_"+index).classList.toggle("show");

}

function closeModal(){

document.getElementById("modal").classList.add("hidden");

}

loadData();

setInterval(loadData,30000);

function exportExcel(){

if(!filteredData.length){

alert("Không có dữ liệu");

return;

}

const rows=filteredData.map(row=>{

const obj={};

Object.keys(row).forEach(k=>{

if(k==="thuongcv1"||k==="tgupdate")return;

obj[getColumnTitle(k)]=row[k];

});

return obj;

});

const ws=XLSX.utils.json_to_sheet(rows);

const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"DATA");

const title=document.getElementById("modalTitle").innerText||"DATA";

XLSX.writeFile(wb,title+".xlsx");

}
</script>

</body>
</html>
