<script>

const API="https://script.google.com/macros/s/AKfycbywITVgVMxEBC3i38MtqT9lBsxFZn_T_dX6p3zWiLAPvcRoOOgnPndZbKSrPPvkutSR/exec";

let tontkm=[];
let currentData=[];
let filteredData=[];
let currentPage=1;
const PAGE_SIZE=300;

function countUniqueAccount(data){const set=new Set();data.forEach(x=>{const acc=String(x.account||"").replace(/\s+/g," ").trim().toUpperCase();if(acc)set.add(acc);});return set.size;}

function parseDateVN(str){if(!str)return 0;try{const [datePart,timePart]=str.split(" ");const [d,m,y]=datePart.split("/");const [hh,mm,ss]=(timePart||"00:00:00").split(":");return new Date(Number(y),Number(m)-1,Number(d),Number(hh),Number(mm),Number(ss));}catch(err){return 0;}}

async function loadData(){

try{

const res=await fetch(API);
const json=await res.json();

tonsc=json.tonsc||[];
tontkm=json.tontkm||[];

console.log("TON SC:",tonsc.length);
console.log("TON TKM:",tontkm.length);

renderTonSC();
renderTonTKM();
renderCharts();
document.getElementById("updateTime").innerHTML="⏰ Thời gian lấy báo cáo: "+(tontkm[0]?.tgupdate||"");
}catch(err){

console.error(err);
document.getElementById("updateTime").innerHTML="⚠️ Không tải được dữ liệu API";

}

}

function createCard(title,count,color,onClick){

return `
<div class="card" onclick="${onClick}">
<div class="card-title">${title}</div>
<div class="card-count" style="color:${color}">${count}</div>
</div>
`;

}

/* =====================
TON SC
===================== */

function renderTonSC(){

const dashboard=document.getElementById("tonscDashboard");

const socpk=tonsc.filter(x=>{

    const v=String(x.sc||"")
        .replace(/\s+/g," ")
        .trim()
        .toUpperCase();

    return v==="SOC HOME";

});

const soc=tonsc.filter(x=>{

    const v=String(x.sc||"")
        .replace(/\s+/g," ")
        .trim()
        .toUpperCase();

    return v==="SOC";

});

const suco=tonsc.filter(x=>{

    const v=String(x.sc||"")
        .replace(/\s+/g," ")
        .trim()
        .toUpperCase();

    return [
        "HT",
        "SC",
        "SC HOT",
        "HT HOT",
        "SC VIP",
        "HT VIP"
    ].includes(v);

});

const sucoKNTKM=tonsc.filter(x=>{

    const v=String(x.sc||"")
        .replace(/\s+/g," ")
        .trim()
        .toUpperCase();

    return !v;

});
const chuagiao=tonsc.filter(x=>{

    return !x.user || x.user==0;

});
window.tongsc=tonsc;
window.socpkData=socpk;
window.socData=soc;
window.sucoData=suco;
window.sucoKNTKM=sucoKNTKM;
window.chuagiaoData=chuagiao;

dashboard.innerHTML=

createCard("TỔNG SC",tonsc.length,"#111827","showTable('TỔNG SC',tongsc)")

+

createCard("SOC HOME KÉM",socpk.length,"#2563eb","showTable('SOC HOME KÉM',socpkData)")

+

createCard("SOC HT, SOC PORT KÉM",soc.length,"#ea580c","showTable('SOC HT, SOC PORT KÉM',socData)")

+

createCard("SỰ CỐ",suco.length,"#dc2626","showTable('SỰ CỐ',sucoData)")

+
createCard(
    "SỰ CỐ KN TKM",
    sucoKNTKM.length,
    "#9333ea",
    "showTable('SỰ CỐ KN TKM',sucoKNTKM)"
)
  
+
  
createCard("SỰ CỐ CHƯA GIAO",chuagiao.length,"#7c3aed","showTable('SỰ CỐ CHƯA GIAO',chuagiaoData)");

}

/* =====================
TON TKM
===================== */

function renderTonTKM(){

const dashboard=document.getElementById("tontkmDashboard");

const groups={};

const capnhaths=tontkm.filter(x=>{

    const tt=String(x.tt||"")
        .replace(/\s+/g," ")
        .trim()
        .toUpperCase();

    return tt==="CẬP NHẬT HỒ SƠ";

});

window.capnhaths=capnhaths;

tontkm.forEach(x=>{

const tt=String(x.tt||"").replace(/\s+/g," ").trim().toUpperCase();


let kpi=String(x.kpi||"")
    .replace(/\s+/g," ")
    .trim()
    .toUpperCase();

kpi = kpi.replace(/\s*,\s*/g,", ");

if(!kpi)kpi="KHÔNG KPI";

if(!groups[kpi])groups[kpi]=[];

groups[kpi].push(x);

});

let html="";

window.tongtkm=tontkm;

html+=createCard("TỔNG TKM",tontkm.length,"#111827","showTable('TỔNG TKM',tongtkm)");

[
    "QUÁ 24H",
    "QUÁ 3H, TRONG 10H",
    "QUÁ 10H, TRONG 16H",
    "QUÁ 16H",
    "QUÁ HẸN",
    "TRONG 3H",
    "TRONG HẸN",
    "KHÔNG KPI"
].forEach(kpi=>{

    if(!groups[kpi]) groups[kpi]=[];

    window["kpi_"+kpi]=groups[kpi];

    const cardColor=
        (
            kpi==="QUÁ 24H" ||
            kpi==="QUÁ HẸN" ||
            kpi==="QUÁ 16H" ||
            kpi==="KHÔNG KPI"
        )
        ? "#dc2626"
        : "#16a34a";

    html+=createCard(
        kpi,
        groups[kpi].length,
        cardColor,
        `showTable('${kpi}',window['kpi_${kpi}'])`
    );

});

const chuagiao=tontkm.filter(x=>String(x.tt||"").replace(/\s+/g," ").trim().toUpperCase()==="ĐANG GIAO TỔ ĐỘI");

window.tkmchuagiao=chuagiao;
  
html+=createCard("TỒN CẬP NHẬT HỒ SƠ",capnhaths.length,"#dc2626","showTable('TỒN CẬP NHẬT HỒ SƠ',capnhaths)");

html+=createCard("TKM CHƯA GIAO",chuagiao.length,"#7c3aed","showTable('TKM CHƯA GIAO',tkmchuagiao)");

dashboard.innerHTML=html;

}

function renderCharts(){

renderSCHuyen();

renderHSChart();

renderKPIChart();

}

function renderSCHuyen(){

const labels=[...new Set(tonsc.map(x=>x.huyen||"Khác"))];

const socHome={};
const soc={};
const suco={};
const sucoKNTKM={};

labels.forEach(h=>{

socHome[h]=0;
soc[h]=0;
suco[h]=0;
sucoKNTKM[h]=0;

});

tonsc.forEach(x=>{

const h=x.huyen||"Khác";

const loai=String(x.sc||"").toUpperCase();

if(loai==="SOC HOME"){

    socHome[h]++;

}
else if(loai==="SOC"){

    soc[h]++;

}
else if(!loai){

    sucoKNTKM[h]++;

}
else if(
    [
        "HT",
        "SC",
        "SC HOT",
        "HT HOT",
        "SC VIP",
        "HT VIP"
    ].includes(loai)
){

    suco[h]++;

}

});

new Chart(document.getElementById("scHuyenChart"),{

type:"bar",

data:{

labels:labels,

datasets:[

{
label:"SOC HOME",
data:labels.map(h=>socHome[h])
},

{
label:"SOC",
data:labels.map(h=>soc[h])
},

{
label:"SỰ CỐ",
data:labels.map(h=>suco[h])
}

,
{
label:"SC KN TKM",
data:labels.map(h=>sucoKNTKM[h])
}

]

},

options:{
responsive:true,
maintainAspectRatio:false
}

});

}

function renderHSChart(){

const labels=[...new Set(tontkm.map(x=>x.huyen||"Khác"))];

const hs={};

labels.forEach(h=>{

hs[h]=0;

});

tontkm.forEach(x=>{

const h=x.huyen||"Khác";

const tt=String(x.tt||"").toUpperCase();

if(tt.includes("CẬP NHẬT HỒ SƠ")){

hs[h]++;

}

});

new Chart(document.getElementById("hsChart"),{

type:"bar",

data:{

labels:labels,

datasets:[

{
label:"Cập nhật hồ sơ",
data:labels.map(h=>hs[h])
}

]

},

options:{
responsive:true,
maintainAspectRatio:false
}

});

}

function renderKPIChart(){

const labels=[...new Set(tontkm.map(x=>x.huyen||"Khác"))];

const q24={};
const q3_10={};
const q10_16={};
const q16={};
const qhen={};
const t3h={};
const then={};

labels.forEach(h=>{

    q24[h]=0;
    q3_10[h]=0;
    q10_16[h]=0;
    q16[h]=0;
    qhen[h]=0;
    t3h[h]=0;
    then[h]=0;

});

tontkm.forEach(x=>{

const h=x.huyen||"Khác";

const k=String(x.kpi||"")

    .replace(/\u00A0/g," ")
    .replace(/\n/g," ")
    .replace(/\s+/g," ")
    .trim()
    .toUpperCase()
    .replace(/\s*,\s*/g,", ");

if(k==="QUÁ 24H"){

    q24[h]++;

}
else if(k==="QUÁ 3H, TRONG 10H"){

    q3_10[h]++;

}
else if(k==="QUÁ 10H, TRONG 16H"){

    q10_16[h]++;

}
else if(k==="QUÁ 16H"){

    q16[h]++;

}
else if(k==="QUÁ HẸN"){

    qhen[h]++;

}
else if(k==="TRONG 3H"){

    t3h[h]++;

}
else if(k==="TRONG HẸN"){

    then[h]++;

}

});

new Chart(document.getElementById("kpiChart"),{

type:"bar",

data:{

labels:labels,

datasets:[

{
    label:"Quá 24h",
    data:labels.map(h=>q24[h])
},

{
    label:"Quá 3h, Trong 10h",
    data:labels.map(h=>q3_10[h])
},

{
    label:"Quá 10h, Trong 16h",
    data:labels.map(h=>q10_16[h])
},

{
    label:"Quá 16h",
    data:labels.map(h=>q16[h])
},

{
    label:"Quá hẹn",
    data:labels.map(h=>qhen[h])
},

{
    label:"Trong 3h",
    data:labels.map(h=>t3h[h])
},

{
    label:"Trong hẹn",
    data:labels.map(h=>then[h])
}

]

},

options:{
responsive:true,
maintainAspectRatio:false
}

});

}
/* =====================
MODAL
===================== */

function showTable(title,data){

currentData=data;
filteredData=data;

document.getElementById("modal").classList.remove("hidden");

document.getElementById("modalTitle").innerHTML=title;

initFilters(data);

currentPage=1;
renderTable(data);

}

function initFilters(data){

const huyenSet=new Set();
const typeSet=new Set();

data.forEach(x=>{

if(x.huyen)huyenSet.add(x.huyen);

if(x.sc)typeSet.add(x.sc);

if(x.kpi)typeSet.add(x.kpi);

});

const huyenSelect=document.getElementById("huyenFilter");

huyenSelect.innerHTML=`<option value="">Tất cả huyện</option>`;

[...huyenSet].sort().forEach(h=>{

huyenSelect.innerHTML+=`<option value="${h}">${h}</option>`;

});

const typeSelect=document.getElementById("typeFilter");

typeSelect.innerHTML=`<option value="">Tất cả loại</option>`;

[...typeSet].sort().forEach(t=>{

typeSelect.innerHTML+=`<option value="${t}">${t}</option>`;

});

}

document.getElementById("searchInput").addEventListener("input",filterTable);

document.getElementById("huyenFilter").addEventListener("change",filterTable);

document.getElementById("typeFilter").addEventListener("change",filterTable);
  
function filterTable(){

const kw=document.getElementById("searchInput").value.toLowerCase();

const huyen=document.getElementById("huyenFilter").value;

const type=document.getElementById("typeFilter").value;

const filtered=currentData.filter(row=>{

const text=JSON.stringify(row).toLowerCase();

const okSearch=text.includes(kw);

const okHuyen=!huyen||row.huyen==huyen;

const okType=!type||row.sc==type||row.kpi==type;

return okSearch&&okHuyen&&okType;

});
filteredData=filtered;
currentPage=1;
renderTable(filtered);

}

function getColumnTitle(col){

const map={

user:"Mã nv",
nv:"Tên nv",
tg:"Thời gian",
huyen:"Huyện",
account:"Account",
dc:"Địa chỉ",
ngay:"Ngày phát sinh",
gio:"Giờ phát sinh",
sc:"Loại sự cố",
mdb:"Mất đồng bộ GNOC",
gnoc:"Trạng thái GNOC",
nd:"Nội dung",

cv:"Loại cv",
gline:"Gline",
ntdn:"Ngày đấu nối",
ntnt:"Ngày nghiệm thu",
tt:"Trạng thái cv",
tthen:"Trạng thái tích hẹn",
kpi:"Tính KPI",
nnt:"Nguyên nhân tồn",
nnth:"Nguyên nhân tích hủy"

};

return map[col]||col;

}

function renderTable(data){if(window.innerWidth<=768){renderMobileCards(data);return;}
data=[...data];
data.sort((a,b)=>{

const tgA=parseFloat(a.tg)||0;

const tgB=parseFloat(b.tg)||0;

return tgB-tgA;

});

const renderData=data.slice(0,currentPage*PAGE_SIZE);

let cols=[];

const isTKM=data[0]?.cv!==undefined;

if(isTKM){

cols=["nv","tg","huyen","account","kpi","cv","tt","tthen","ntdn","ntnt","nnt","nnth"];

}else{

cols=["nv","tg","huyen","account","dc","ngay","gio","sc","mdb","gnoc","nd"];

}

cols=cols.filter(c=>data[0][c]!==undefined);

let html=`<table><thead><tr>`;

cols.forEach(c=>{

let stickyHeader="";

if(c==="nv"){

stickyHeader="";

}

if(c==="cv"){

stickyHeader="";

}

html+=`<th style="${stickyHeader}">${getColumnTitle(c)}</th>`;

});

html+=`</tr></thead><tbody>`;

renderData.forEach((row,index)=>{

html+="<tr>";

cols.forEach(c=>{

let val=row[c]||"";

if(c==="sc" && !val){

    val="SỰ CỐ KN TKM";

}

let stickyStyle="";

if(c==="nv"){

stickyStyle="";

}

if(c==="cv"){

stickyStyle="";

}

if(c==="tg"){

const tgValue=parseFloat(val)||0;

const tgColor=tgValue>24?"#dc2626":"";

html+=`<td style="${stickyStyle}color:${tgColor};font-weight:bold;">${val}</td>`;

}

else if(c==="sc"){

let cls="gray";

if(String(val).includes("HOT"))cls="red";
else if(String(val).includes("VIP"))cls="purple";
else if(String(val).includes("SOC"))cls="orange";
else cls="blue";

val=`<span class="badge ${cls}">${val}</span>`;

html+=`<td style="${stickyStyle}">${val}</td>`;}

else if(c==="nd"||c==="nnt"||c==="nnth"){

const shortText=String(val).slice(0,120);

html+=`
<td style="${stickyStyle}width:480px;min-width:480px;max-width:480px;vertical-align:top;">
<div class="text-preview">${shortText}</div>
<div class="nd-full" id="full_${index}" data-full="${encodeURIComponent(val)}"></div>
<div class="expand-btn" onclick="openTextModal('${encodeURIComponent(val)}')">Xem thêm</div>
</td>`;}

else{

let colStyle=stickyStyle;

if(c==="dc"){

colStyle+="width:240px;min-width:240px;max-width:240px;word-break:break-word;";

}

html+=`<td style="${colStyle}">${val}</td>`;

}
});

html+="</tr>";

});

html+=`</tbody></table>`;

if(data.length>renderData.length){

html+=`
<div style="padding:15px;text-align:center;">

<button onclick="loadMore()" style="padding:10px 16px;border:none;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer;">
Xem thêm dữ liệu
</button>

</div>
`;

}

document.getElementById("tableContainer").innerHTML=html;

}

currentPage++;

renderTable(filteredData);

}

function exportExcel(){

if(!filteredData.length){

alert("Không có dữ liệu");

return;

}

const rows=filteredData.map(row=>{

const obj={};

Object.keys(row).forEach(k=>{

if(k==="thuongcv1"||k==="tgupdate")return;

obj[getColumnTitle(k)]=row[k];

});

return obj;

});

const ws=XLSX.utils.json_to_sheet(rows);

const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"DATA");

const title=document.getElementById("modalTitle").innerText||"DATA";

XLSX.writeFile(wb,title+".xlsx");

}
