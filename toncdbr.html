  const socpk=tonsc.filter(x=>{

          .replace(/\s+/g," ")
          .trim()

  });
  
  const soc=tonsc.filter(x=>{
  
      const v=String(x.sc||"")
          .replace(/\s+/g," ")
          .trim()
          .toUpperCase();
  
      return v==="SOC";
  
  });
  
  const suco=tonsc.filter(x=>{
  
      const v=String(x.sc||"")
          .replace(/\s+/g," ")
          .trim()
          .toUpperCase();

          "SC",
          "SC HOT",
          "HT HOT",
          "SC VIP",
          "HT VIP"
      ].includes(v);
  
  });

  function showTable(title,data){
  
  currentData=data;
  filteredData=data;
  
  document.getElementById("modal").classList.remove("hidden");
  
  document.getElementById("modalTitle").innerHTML=title;
  
  initFilters(data);
  
  currentPage=1;
  renderTable(data);
  
  }
  
  function initFilters(data){
  
  const huyenSet=new Set();
  const typeSet=new Set();
  
  data.forEach(x=>{
  
  if(x.huyen)huyenSet.add(x.huyen);
  
  if(x.sc)typeSet.add(x.sc);
  
  if(x.kpi)typeSet.add(x.kpi);
  
  });
  
  const huyenSelect=document.getElementById("huyenFilter");
  
  huyenSelect.innerHTML=`<option value="">Tất cả huyện</option>`;
  
  [...huyenSet].sort().forEach(h=>{
  
  huyenSelect.innerHTML+=`<option value="${h}">${h}</option>`;
  
  });
  
  const typeSelect=document.getElementById("typeFilter");
  
  typeSelect.innerHTML=`<option value="">Tất cả loại</option>`;
  
  [...typeSet].sort().forEach(t=>{
  
  typeSelect.innerHTML+=`<option value="${t}">${t}</option>`;
  
  });
  
  }
  
  document.getElementById("searchInput")
  .addEventListener("input",()=>{
  
  const title =
  
  document.getElementById(
  "modalTitle"
  )
  .innerText;
  
  /* ACCOUNT BYPASS */
  
  if(
  title.includes("ACCOUNT")
  ){
  
  showAccountManager();
  
  return;
  
  }
  
  /* SC + TKM */
  
  if(
  title.includes("SC VÀ TKM")
  ){
  
  showScTkmManager();
  
  return;
  
  }
  
  /* TABLE THƯỜNG */
  
  filterTable();
  
  });
  
  document.getElementById("huyenFilter").addEventListener("change",filterTable);
  
  document.getElementById("typeFilter").addEventListener("change",filterTable);
    
  function filterTable(){
  
  const kw=document.getElementById("searchInput").value.toLowerCase();
  
  const huyen=document.getElementById("huyenFilter").value;
  
  const type=document.getElementById("typeFilter").value;
  
  const filtered=currentData.filter(row=>{
  
  const text=JSON.stringify(row).toLowerCase();
  
  const okSearch=text.includes(kw);
  
  const okHuyen=!huyen||row.huyen==huyen;
  
  const okType=!type||row.sc==type||row.kpi==type;
  
  return okSearch&&okHuyen&&okType;
  
  });
  filteredData=filtered;
  currentPage=1;
  renderTable(filtered);
  
  }

  dc:"Địa chỉ",

  ntnt:"Ngày nghiệm thu",
  tt:"Trạng thái cv",

  kpi:"Tính KPI",
  nnt:"Nguyên nhân tồn",

  };

  function formatDate(v){
  
  if(!v)return "";
  
  const d = new Date(v);
  
  if(isNaN(d)) return v;
  
  const dd =
  String(d.getDate())
  .padStart(2,"0");
  
  const mm =
  String(d.getMonth()+1)
  .padStart(2,"0");
  
  const yyyy =
  d.getFullYear();
  
  return `${dd}/${mm}/${yyyy}`;
  
  }
  
  function formatDateTime(v){
  
  if(!v)return "";
  
  const d = new Date(v);
  
  if(isNaN(d)) return v;
  
  const dd =
  String(d.getDate())
  .padStart(2,"0");
  
  const mm =
  String(d.getMonth()+1)
  .padStart(2,"0");
  
  const yyyy =
  d.getFullYear();
  
  const hh =
  String(d.getHours())
  .padStart(2,"0");
  
  const mi =
  String(d.getMinutes())
  .padStart(2,"0");
  
  return `${hh}:${mi} ${dd}/${mm}/${yyyy}`;
  
  }
