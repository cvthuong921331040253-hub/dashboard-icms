<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>KSGPON SURVEY</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#0b0f14;
    font-family:Arial,sans-serif;
}

#map{
    width:100%;
    height:100%;
}

.topbar{
    position:fixed;
    top:8px;
    left:8px;
    right:8px;
    z-index:9999;
    background:rgba(10,15,20,.92);
    border:1px solid #1f2937;
    border-radius:14px;
    padding:10px 14px;
    color:#fff;
    backdrop-filter:blur(8px);
    box-shadow:0 4px 20px rgba(0,0,0,.35);
}

.title{
    font-size:15px;
    font-weight:700;
}

.gps-info{
    font-size:11px;
    margin-top:4px;
    color:#9ca3af;
}

.tools{
    position:fixed;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    z-index:9999;
    display:flex;
    gap:8px;
    background:rgba(10,15,20,.95);
    border:1px solid #1f2937;
    border-radius:18px;
    padding:7px;
    backdrop-filter:blur(8px);
    box-shadow:0 4px 20px rgba(0,0,0,.35);
}

.tool-btn{
    width:38px;
    height:38px;
    border:none;
    border-radius:12px;
    color:white;
    background:#111827;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
}

.tool-btn:active{
    transform:scale(.92);
}

.blue{border:1px solid #2563eb;}
.green{border:1px solid #16a34a;}
.yellow{border:1px solid #ca8a04;}
.purple{border:1px solid #9333ea;}
.red{border:1px solid #dc2626;}
.orange{border:1px solid #ea580c;}

.panel{
    position:fixed;
    left:0;
    right:0;
    display:none;
    top:70px;
    bottom:auto;
    max-height:75vh;
    z-index:99999;
    background:rgba(10,15,20,.98);
    border-top-left-radius:24px;
    border-top-right-radius:24px;
    border-top:1px solid #1f2937;
    padding:18px;
    transition:.35s ease;
    overflow:auto;
    box-shadow:0 -10px 30px rgba(0,0,0,.45);
}

.panel.active{ display:block; }

.drag-bar{
    width:60px;
    height:5px;
    border-radius:20px;
    background:#374151;
    margin:0 auto 14px;
}

.panel h3{
    margin-top:0;
    margin-bottom:14px;
    font-size:18px;
}

.input{
    width:100%;
    padding:11px 12px;
    margin-bottom:10px;
    background:#0f172a;
    border:1px solid #273244;
    border-radius:12px;
    color:white;
    box-sizing:border-box;
    font-size:14px;
}

.input:focus{
    outline:none;
    border-color:#2563eb;
}

.save-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:white;
    font-weight:700;
    font-size:15px;
}

.leaflet-popup-content-wrapper{
    background:#111827;
    color:white;
    border-radius:14px;
}

.leaflet-popup-tip{
    background:#111827;
}

.leaflet-control-attribution{
    font-size:10px !important;
}

.map-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.35);
    z-index:9990;
    display:none;
}

.map-overlay.active{
    display:block;
}

    
.bottom-stats{
    position:fixed;
    left:10px;
    bottom:82px;
    z-index:9999;
    background:rgba(10,15,20,.9);
    border:1px solid #1f2937;
    border-radius:14px;
    padding:8px 12px;
    color:white;
    font-size:11px;
    backdrop-filter:blur(6px);
}

@media(max-width:768px){

.topbar{
    padding:9px 12px;
}

.title{
    font-size:14px;
}

.gps-info{
    font-size:10px;
}

.panel{
    padding:16px;
}

.tool-btn{
    width:40px;
    height:40px;
    font-size:15px;
}

.tools{
    gap:6px;
    padding:8px;
}

}

</style>
</head>
<body>

<div id="map"></div>

<div
    class="map-overlay"
    id="mapOverlay"
    onclick="
        document
        .getElementById('pointPanel')
        .classList
        .remove('active');

        this.classList.remove('active');
    "
></div>

<div class="bottom-stats" id="bottomStats">
    📍 0 điểm | 📏 0m
</div>

<div class="topbar">
    <div class="title">📡 KSGPON SURVEY</div>
    <div class="gps-info" id="gpsInfo">
        Đang lấy GPS...
    </div>

<select
    id="projectSelect"

    onchange="changeProject(this.value)"

    style="
        margin-top:8px;
        width:100%;
        padding:10px;
        border-radius:10px;
        background:#111827;
        color:white;
        border:1px solid #374151;
    "
></select>

<input
    id="searchPoint"

    placeholder="🔍 Tìm điểm khảo sát"

    oninput="searchPoint()"

    style="
        margin-top:8px;
        width:100%;
        padding:10px;
        border-radius:10px;
        background:#111827;
        color:white;
        border:1px solid #374151;
        box-sizing:border-box;
    "
/>

</div>

<div class="panel" id="pointPanel">

    <div class="drag-bar"></div>

    <div
        style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:10px;
        "
    >

        <h3
            style="
                margin:0;
                font-size:16px;
            "
        >
            ➕ Điểm khảo sát
        </h3>
        
        <button
            onclick="
                document
                .getElementById('pointPanel')
                .classList
                .remove('active');
        
                document
                .getElementById('mapOverlay')
                .classList
                .remove('active');
            "
        
            style="
                background:none;
                border:none;
                color:white;
                font-size:20px;
                cursor:pointer;
            "
        >
            ✕
        </button>
        
    </div>

    <input
        id="pointName"
        class="input"
        placeholder="Tên điểm"
    />

    <select id="pointType" class="input">
        <option value="ODF">🟦 ODF</option>
        <option value="ODP">🟩 ODP</option>
        <option value="TAPDIEM">🟨 Tập điểm</option>
        <option value="KH">🏠 Trạm</option>
        <option value="SC">🔴 Sự cố</option>
    </select>

    <div
        style="
            display:flex;
            gap:8px;
        "
    >

        <input
            id="pointLat"
            class="input"
            placeholder="Vĩ độ"
            readonly
        />

        <input
            id="pointLng"
            class="input"
            placeholder="Kinh độ"
            readonly
        />

    </div>

    <textarea
        id="pointNote"
        class="input"
        rows="2"
        placeholder="Ghi chú"
    ></textarea>

    <button
        class="save-btn"
        onclick="savePoint()"
    >
        Lưu điểm khảo sát
    </button>

</div>

<div class="tools">

    <button
        class="tool-btn purple"
        onclick="shareProject()"
    >
        <i class="fa-solid fa-share-nodes"></i>
    </button>
    
    <button class="tool-btn blue" onclick="document.getElementById('importFile').click()">
        <i class="fa-solid fa-folder-open"></i>
    </button>
    
    <button class="tool-btn purple" onclick="openProjectManager()">
        <i class="fa-solid fa-folder"></i>
    </button>
    
    <button class="tool-btn blue" onclick="goGPS()">
        <i class="fa-solid fa-location-crosshairs"></i>
    </button>


    <button class="tool-btn blue" onclick="toggleGPSLock()">
        <i class="fa-solid fa-satellite"></i>
    </button>



    <button class="tool-btn green" onclick="createDraggableMarker()">

        <i class="fa-solid fa-plus"></i>
    </button>

    <button class="tool-btn orange" onclick="clearAllData()">
        <i class="fa-solid fa-trash"></i>
    </button>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map;

let currentLocation=null;

let surveyPoints=[];

let tempImportPoints=[];

let tempPoint=null;

let editingIndex=-1;

let draggableMarker=null;

let mapMarkers=[];

let gpsLock=false;
let currentProject='';
initMap();

function initMap(){

    map=L.map('map',{
        zoomControl:false
    }).setView([13.9833,108.0000],16);

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution:'© OpenStreetMap'
        }
    ).addTo(map);

    updateProjectList();

    initGPS();

map.on('click',function(e){

});
}

function initGPS(){

    navigator.geolocation.watchPosition(pos=>{

        currentLocation={
            lat:pos.coords.latitude,
            lng:pos.coords.longitude
        };

      
        if(gpsLock && draggableMarker){
        
            draggableMarker.setLatLng([
                currentLocation.lat,
                currentLocation.lng
            ]);
        
        }

        
        document.getElementById('gpsInfo').innerHTML=
        `📍 ${currentLocation.lat.toFixed(6)}, ${currentLocation.lng.toFixed(6)}
        | Accuracy ${Math.round(pos.coords.accuracy)}m`;

    },err=>{

        alert('Không lấy được GPS');

    },{
        enableHighAccuracy:true
    });

}



function toggleGPSLock(){

    gpsLock=!gpsLock;

    if(gpsLock){

        alert('Đã bật GPS LOCK');

    }else{

        alert('Đã tắt GPS LOCK');

    }

}


function createDraggableMarker(){

    if(draggableMarker){

        map.removeLayer(draggableMarker);

    }

    const center=map.getCenter();

    draggableMarker=L.marker(
        [center.lat,center.lng],
        {
            draggable:true
        }
    ).addTo(map);

    draggableMarker.bindPopup(
        '📍 Kéo đến vị trí cần khảo sát<br><br>Bấm marker để nhập thông tin'
    );

    draggableMarker.on('click',function(){

        const pos=draggableMarker.getLatLng();

        tempPoint={
            lat:pos.lat,
            lng:pos.lng
        };

        document.getElementById('pointLat').value=
        pos.lat.toFixed(6);
        
        document.getElementById('pointLng').value=
        pos.lng.toFixed(6);
        
        document
            .getElementById('pointPanel')
            .classList
            .add('active');

        document
        .getElementById('mapOverlay')
        .classList
        .add('active');

    });

}

function goGPS(){

    if(!currentLocation) return;

    map.setView(
        [currentLocation.lat,currentLocation.lng],
        18
    );

    L.circleMarker(
        [currentLocation.lat,currentLocation.lng],
        {
            radius:8,
            color:'#fff',
            weight:2,
            fillColor:'#00d4ff',
            fillOpacity:1
        }
    )
    .addTo(map)
    .bindPopup('📍 Vị trí hiện tại');

}




function togglePanel(){

    const p=document.getElementById('pointPanel');

    p.classList.toggle('active');

}


function savePoint(){

    if(!tempPoint){

        alert('Hãy chọn vị trí');

        return;

    }

    const name=document.getElementById('pointName').value || 'Không tên';

    const type=document.getElementById('pointType').value;

    const note=document.getElementById('pointNote').value;

    let color='#22c55e';

    if(type==='ODF') color='#3b82f6';
    if(type==='ODP') color='#22c55e';
    if(type==='TAPDIEM') color='#eab308';
    if(type==='KH') color='#f97316';
    if(type==='SC') color='#ef4444';
    if(editingIndex>=0){
    
        map.removeLayer(
            mapMarkers[editingIndex]
        );
    
    }

    const marker=L.circleMarker(
        [tempPoint.lat,tempPoint.lng],
        {
            radius:8,
            color:'#fff',
            weight:2,
            fillColor:color,
            fillOpacity:1
        }
    ).addTo(map);
    finishSave();

    function finishSave(){

        const pointData={

            name,
            type,
            note,

            lat:tempPoint.lat,
            lng:tempPoint.lng,

        };

        
        if(editingIndex>=0){
        
            surveyPoints[editingIndex]=pointData;
        
        }else{
        
            surveyPoints.push(pointData);
        
        }

        let popup=`
            <b>${name}</b><br>
            ${type}<br>
            ${note}
        `;

        marker.bindPopup(popup);
        mapMarkers.push(marker);
        saveLocal();
        exportKML();

        updateStats();
        loadLocal();

        document.getElementById('pointName').value='';

        document.getElementById('pointNote').value='';

        document.getElementById('pointPanel').classList.remove('active');

    
        document
        .getElementById('mapOverlay')
        .classList
        .remove('active');

        editingIndex=-1;
        

    }

}

function saveLocal(){

    localStorage.setItem(
        'ksgpon_'+currentProject,
        JSON.stringify({
            points:surveyPoints,
        })
    );

}


function updateProjectList(){

    const s=
    document.getElementById(
        'projectSelect'
    );

    s.innerHTML='';

    s.innerHTML+=`
        <option value="ALL_PROJECTS">
            📂 TẤT CẢ CÔNG TRÌNH
        </option>
    `; 
   
    let projects=[];
    
    for(let i=0;i<localStorage.length;i++){
    
        const key=localStorage.key(i);
    
        if(
            key.startsWith('ksgpon_')
        ){
    
            projects.push(
                key.replace('ksgpon_','')
            );
    
        }
    
    }


    projects.forEach(name=>{

        s.innerHTML+=`
            <option value="${name}">
                ${name}
            </option>
        `;

    });


    if(currentProject){
    
        s.value=currentProject;
    
    }else{
    
        s.value='ALL_PROJECTS';
    
    }
    }

function changeProject(name){

    currentProject=name;

    if(name==='ALL_PROJECTS'){

        loadAllProjects();

        return;

    }

    loadLocal();

}

function loadLocal(){

    surveyPoints=[];
    mapMarkers.forEach(m=>{
    
        map.removeLayer(m);
    
    });
    
    mapMarkers=[];

    const raw=localStorage.getItem(
    'ksgpon_'+currentProject
    );


    if(!raw) return;

    const data=JSON.parse(raw);

    surveyPoints=data.points || [];

    surveyPoints.forEach((p,index)=>{

        let color='#22c55e';

        if(p.type==='ODF') color='#3b82f6';
        if(p.type==='ODP') color='#22c55e';
        if(p.type==='TAPDIEM') color='#eab308';
        if(p.type==='KH') color='#f97316';
        if(p.type==='SC') color='#ef4444';

        let popup=`
            <b>${p.name}</b><br>
            ${p.type}<br>
            ${p.note}
            
            <br><br>
            
            <button
                onclick="editPoint(${index})"
                style="
                    border:none;
                    padding:6px 10px;
                    border-radius:8px;
                    background:#2563eb;
                    color:white;
                "
            >
                ✏️ Sửa
            </button>

            <button
                onclick="deletePoint(${index})"
                style="
                    border:none;
                    padding:6px 10px;
                    border-radius:8px;
                    background:#dc2626;
                    color:white;
                    margin-left:6px;
                "
            >
                🗑 Xóa
            </button>
            
            `;

    const mk=L.circleMarker( [p.lat,p.lng], { radius:8, color:'#fff', weight:2, fillColor:color, fillOpacity:1 } ) .addTo(map) .bindPopup(popup); mapMarkers.push(mk);

    });

updateStats();

if(surveyPoints.length>0){

    const bounds=[];

    surveyPoints.forEach(p=>{

        bounds.push([
            p.lat,
            p.lng
        ]);

    });

    map.fitBounds(
        bounds,
        {
            padding:[40,40]
        }
    );

}
 
}


function updateStats(){

    let totalDistance=0;

    let textDistance='0m';

    if(totalDistance>1000){

        textDistance=
        (totalDistance/1000).toFixed(2)+' km';

    }else{

        textDistance=
        Math.round(totalDistance)+' m';

    }

    document.getElementById('bottomStats').innerHTML=
    `📍 ${surveyPoints.length} điểm | 📏 ${textDistance}`;

}

function openProjectManager(){

    const name=prompt(
        'Nhập mã trạm / công trình',
        currentProject
    );

    if(!name) return;


    currentProject=name;
    
    if(
        !localStorage.getItem(
            'ksgpon_'+currentProject
        )
    ){
    
        localStorage.setItem(
            'ksgpon_'+currentProject,
            JSON.stringify({
                points:[]
            })
        );
    
    }
    
    updateProjectList();
    
    document.getElementById(
        'projectSelect'
    ).value=currentProject;
    
    loadLocal();

    alert(
        'Đã chuyển sang công trình: '+
        currentProject
    );

}
    
function exportKML(){

    let kml=`<?xml version="1.0" encoding="UTF-8"?>`;

    kml+=`
    <kml xmlns="http://www.opengis.net/kml/2.2">
    <Document>
    `;

    surveyPoints.forEach(p=>{

        kml+=`
        <Placemark>
            <name>${p.name}</name>
            <description>${p.note}</description>
            <Point>
                <coordinates>
                    ${p.lng},${p.lat},0
                </coordinates>
            </Point>
        </Placemark>
        `;

    });

    kml+=`
    </Document>
    </kml>
    `;

    Android.saveKMLFile(
    
        currentProject+'.kml',
    
        kml
    
    );
    
}

function importSurveyFile(event){

    const file=event.target.files[0];
    
    if(!file) return;

    const reader=new FileReader();

    reader.onload=function(e){

        tempImportPoints=[];
        
        mapMarkers.forEach(m=>{
        
            map.removeLayer(m);
        
        });
        
        mapMarkers=[];

        const text=e.target.result;

        const parser=new DOMParser();

        const xml=parser.parseFromString(
            text,
            'text/xml'
        );

        const placemarks=
        xml.getElementsByTagName('Placemark');


        placemarksLoop:
        for(let i=0;i<placemarks.length;i++){
        const pm=placemarks[i];
        const point=
         pm.getElementsByTagName('Point')[0];
        if(point){
        const coord=
            point
            .getElementsByTagName('coordinates')[0]
            .textContent
            .trim();
        const arr=coord.split(',');
        const lng=parseFloat(arr[0]);
        const lat=parseFloat(arr[1]);
        const nameNode=
        pm.getElementsByTagName('name')[0];
        const name=
            nameNode
            ? nameNode.textContent
            : 'Điểm';
            tempImportPoints.push({
            name:name,
            type:'ODP',
            note:'',
            lat:lat,
            lng:lng,
            });
            }
        }
        tempImportPoints.forEach(p=>{
        const mk=L.circleMarker(
            [p.lat,p.lng],
            {
            radius:7,
            color:'#fff',
            weight:2,
            fillColor:'#eab308',
            fillOpacity:1
            }
            )
            .addTo(map)
            .bindPopup(
                '<b>FILE TẠM</b><br>'+p.name
            );
        
            mapMarkers.push(mk);
        });
    
        if(tempImportPoints.length>0){
        
            const bounds=[];
        
            tempImportPoints.forEach(p=>{
        
                bounds.push([
                    p.lat,
                    p.lng
                ]);
        
            });
        
            map.fitBounds(
                bounds,
                {
                    padding:[40,40]
                }
            );
        
        }
        alert('Đã import KML');
    };

    reader.readAsText(file);
}

function editPoint(index){

    const p=surveyPoints[index];

    editingIndex=index;

    tempPoint={
        lat:p.lat,
        lng:p.lng
    };

    document.getElementById('pointName').value=
    p.name;

    document.getElementById('pointType').value=
    p.type;

    document.getElementById('pointNote').value=
    p.note;

    document.getElementById('pointLat').value=
    p.lat;

    document.getElementById('pointLng').value=
    p.lng;

    document
    .getElementById('pointPanel')
    .classList
    .add('active');
    document .getElementById('mapOverlay') .classList .add('active');

}

function loadAllProjects(){

    mapMarkers.forEach(m=>{

        map.removeLayer(m);

    });

    mapMarkers=[];

    let projects=[];
    
    for(let i=0;i<localStorage.length;i++){
    
        const key=localStorage.key(i);
    
        if(
            key.startsWith('ksgpon_')
        ){
    
            projects.push(
                key.replace('ksgpon_','')
            );
    
        }
        }
    
    projects.forEach(project=>{

        const raw=
        localStorage.getItem(
            'ksgpon_'+project
        );

        if(!raw) return;

        const data=JSON.parse(raw);

        (data.points||[]).forEach(p=>{

            let color='#22c55e';

            if(p.type==='ODF') color='#3b82f6';
            if(p.type==='ODP') color='#22c55e';
            if(p.type==='TAPDIEM') color='#eab308';
            if(p.type==='KH') color='#f97316';
            if(p.type==='SC') color='#ef4444';

            const mk=L.circleMarker(
                [p.lat,p.lng],
                {
                    radius:7,
                    color:'#fff',
                    weight:2,
                    fillColor:color,
                    fillOpacity:1
                }
            )
            .addTo(map)
            .bindPopup(
                '<b>'+project+'</b><br>'+p.name
            );

            mapMarkers.push(mk);

        });

    });

    if(mapMarkers.length>0){
    
        const bounds=[];
    
        mapMarkers.forEach(m=>{
    
            bounds.push(
                m.getLatLng()
            );
    
        });
    
        map.fitBounds(
            bounds,
            {
                padding:[40,40]
            }
        );
    }
    }

function searchPoint(){

    const kw=
    document
    .getElementById('searchPoint')
    .value
    .toLowerCase();

    if(!kw){
    
        if(currentProject==='ALL_PROJECTS'){
    
            loadAllProjects();
    
        }else{
    
            loadLocal();
    
        }
    
        return;
    
    }

    mapMarkers.forEach(m=>{

        map.removeLayer(m);

    });

    mapMarkers=[];


    let sourcePoints=[];
    
    if(currentProject==='ALL_PROJECTS'){
    
    let projects=[];
    
    for(let i=0;i<localStorage.length;i++){
    
        const key=localStorage.key(i);
    
        if(
            key.startsWith('ksgpon_')
        ){
    
            projects.push(
                key.replace('ksgpon_','')
            );
    
        }
    
    }
    
        projects.forEach(project=>{
    
            const raw=
            localStorage.getItem(
                'ksgpon_'+project
            );
    
            if(!raw) return;
    
            const data=JSON.parse(raw);
    
            (data.points||[]).forEach(p=>{
    
                sourcePoints.push(p);
    
            });
    
        });
    
    }else{
    
        sourcePoints=surveyPoints;
    
    }
        
    sourcePoints.forEach((p,index)=>{

        if(
            p.name.toLowerCase().includes(kw)
        ){
            const mk=L.circleMarker(
                [p.lat,p.lng],
                {
                    radius:10,
                    color:'#fff',
                    weight:2,
                    fillColor:'#ff0000',
                    fillOpacity:1
                }
            )
            .addTo(map)
            .bindPopup(p.name);

            mapMarkers.push(mk);
            
            map.setView(
                [p.lat,p.lng],
                20
            );
            mk.openPopup();
        }
    });
}

function shareProject(){

    if(!currentProject){

        alert('Chưa chọn công trình');

        return;

    }

    Android.shareProject(
        currentProject
    );

}
    
function deletePoint(index){

    if(!confirm('Xóa điểm này?'))
        return;

    surveyPoints.splice(index,1);

    saveLocal();

    exportKML();

    loadLocal();

}

function clearAllData(){

    if(
        !confirm(
            'Xóa công trình '+currentProject+' ?'
        )
    ) return;

    try{

        Android.deleteProject(
            currentProject
        );

    }catch(e){

        alert(e);

    }

    localStorage.removeItem(
        'ksgpon_'+currentProject
    );

    surveyPoints=[];

    mapMarkers.forEach(m=>{

        map.removeLayer(m);

    });

    mapMarkers=[];
   
    currentProject='';
    
    updateProjectList();
    
    loadAllProjects();

    alert('Đã xóa công trình');

}

</script>

<input
    type="file"
    id="importFile"
    accept=".kml,.kmz"
    style="display:none"
    onchange="importSurveyFile(event)"
/>

</body>
