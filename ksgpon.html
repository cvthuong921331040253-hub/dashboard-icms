<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#0b0f14;
    font-family:Arial,sans-serif;
}

#map{
    width:100%;
    height:100%;
}

.topbar{
    position:fixed;
    top:6px;
    left:6px;
    right:6px;
    z-index:9999;
    background:rgba(10,15,20,.92);
    border:1px solid #1f2937;
    border-radius:12px;
    padding:7px 10px;
    color:#fff;
    backdrop-filter:blur(8px);
    box-shadow:0 4px 14px rgba(0,0,0,.28);
}

.title{
    font-size:11px;
    font-weight:700;
    margin-bottom:2px;
}

.gps-info{ font-size:9px; margin-top:2px; color:#9ca3af; }


.tools{
    position:fixed;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:9999;
    display:flex;
    gap:6px;
    background:rgba(10,15,20,.92);
    border:1px solid #1f2937;
    border-radius:16px;
    padding:6px;
    backdrop-filter:blur(8px);
    box-shadow:0 4px 20px rgba(0,0,0,.35);
}

.tool-btn{
    width:36px;
    height:36px;
    border:none;
    border-radius:10px;
    color:white;
    background:#111827;
    font-size:14px;
    cursor:pointer;
    transition:.2s;
}

.tool-btn:active{
    transform:scale(.92);
}

.blue{border:1px solid #2563eb;}
.green{border:1px solid #16a34a;}
.yellow{border:1px solid #ca8a04;}
.purple{border:1px solid #9333ea;}
.red{border:1px solid #dc2626;}
.orange{border:1px solid #ea580c;}

.panel{
    position:fixed;
    width:300px;
    max-width:88vw;
    left:50%;
    transform:translateX(-50%);
    display:none;
    top:72px;
    max-height:52vh;
    z-index:99999;
    background:rgba(10,15,20,.98);
    border-radius:18px;
    border:1px solid #1f2937;
    padding:10px;
    overflow:auto;
    box-shadow:0 10px 30px rgba(0,0,0,.45);
}

.panel.active{ display:block; }

.drag-bar{
    width:42px;
    height:4px;
    border-radius:20px;
    background:#374151;
    margin:0 auto 8px;
}

.panel h3{
    margin-top:0;
    margin-bottom:6px;
    font-size:13px;
}

.input{
    width:100%;
    padding:7px 9px;
    margin-bottom:6px;
    background:#0f172a;
    border:1px solid #273244;
    border-radius:9px;
    color:white;
    box-sizing:border-box;
    font-size:12px;
}

.input:focus{
    outline:none;
    border-color:#2563eb;
}


.save-btn{
    width:100%;
    padding:8px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-weight:700;
    font-size:13px;
}

.leaflet-popup-content-wrapper{
    background:#111827;
    color:white;
    border-radius:14px;
}

.leaflet-popup-tip{
    background:#111827;
}

.leaflet-control-attribution{
    font-size:10px !important;
}

.map-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.35);
    z-index:9990;
    display:none;
}

.map-overlay.active{
    display:block;
}

    
.bottom-stats{
    position:fixed;
    left:10px;
    bottom:82px;
    z-index:9999;
    background:rgba(10,15,20,.9);
    border:1px solid #1f2937;
    border-radius:14px;
    padding:8px 12px;
    color:white;
    font-size:11px;
    backdrop-filter:blur(6px);
}

@media(max-width:768px){

.topbar{
    padding:9px 12px;
}

.title{
    font-size:14px;
}

.gps-info{
    font-size:10px;
}

.panel{
    padding:16px;
}

.tool-btn{
    width:40px;
    height:40px;
    font-size:15px;
}

.tools{
    gap:6px;
    padding:8px;
}

}

</style>
</head>
<body>

<div id="map"></div>

<div
    class="map-overlay"
    id="mapOverlay"
    onclick="
        document
        .getElementById('pointPanel')
        .classList
        .remove('active');

        this.classList.remove('active');
    "
></div>

<div class="bottom-stats" id="bottomStats">
    📍 0 điểm
</div>

<div class="topbar">
    <div class="gps-info" id="gpsInfo">
        Đang lấy GPS...
    </div>

<select
    id="projectSelect"

    onchange="changeProject(this.value)"

    style="
        margin-top:5px;
        width:100%;
        padding:7px;
        border-radius:10px;
        background:#111827;
        color:white;
        border:1px solid #374151;
    "
></select>

<input
    id="searchPoint"

    placeholder="🔍 Tìm điểm khảo sát"

    oninput="searchPoint()"

    style="
        margin-top:5px;
        width:100%;
        padding:6px;
        border-radius:10px;
        background:#111827;
        color:white;
        border:1px solid #374151;
        box-sizing:border-box;
    "
/>

</div>

<div class="panel" id="pointPanel">

    <div class="drag-bar"></div>

    <div
        style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:10px;
        "
    >

        <h3
            style="
                margin:0;
                font-size:16px;
            "
        >
            ➕ Điểm khảo sát
        </h3>
        
        <button
            onclick="
                document
                .getElementById('pointPanel')
                .classList
                .remove('active');
        
                document
                .getElementById('mapOverlay')
                .classList
                .remove('active');
            "
        
            style="
                background:none;
                border:none;
                color:white;
                font-size:20px;
                cursor:pointer;
            "
        >
            ✕
        </button>
        
    </div>

    <input
        id="pointName"
        class="input"
        placeholder="Tên điểm"
    />

    <select
        id="pointType"
        class="input"
        onchange="updatePointPrefix()"
    >
    
        <option value="ODF">
            🟦 Cột điện lực
        </option>
    
        <option value="ODP">
            🟩 Cột viettel
        </option>
    
        <option value="TU_DL">
            🟨 Tủ điện lực
        </option>
    
        <option value="TU_VT">
            🟧 Tủ viettel
        </option>
    
        <option value="KH">
            🏠 Trạm
        </option>
    
    </select>


    <div
        style="
            display:flex;
            gap:8px;
        "
    >

        <input
            id="pointLat"
            class="input"
            placeholder="Vĩ độ"
            readonly
        />

        <input
            id="pointLng"
            class="input"
            placeholder="Kinh độ"
            readonly
        />

    </div>

    <textarea
        id="pointNote"
        style="min-height:42px;"
        class="input"
        rows="2"
        placeholder="Ghi chú"
    ></textarea>

    <button
        class="save-btn"
        onclick="savePoint()"
    >
        Lưu điểm khảo sát
    </button>

</div>

    <div class="panel" id="listPanel">
    
        <div class="drag-bar"></div>
    
        <div
            style="
                display:flex;
                justify-content:space-between;
                align-items:center;
                margin-bottom:10px;
            "
        >
    
            <h3
                style="
                    margin:0;
                    font-size:16px;
                "
            >
                📋 Danh sách điểm
            </h3>
    
            <button
                onclick="
                    document
                    .getElementById('listPanel')
                    .classList
                    .remove('active');
                "
    
                style="
                    background:none;
                    border:none;
                    color:white;
                    font-size:20px;
                    cursor:pointer;
                "
            >
                ✕
            </button>
    
        </div>
    
        <div id="pointListContainer"></div>
    
    </div>

<div class="tools">

    <!-- THÊM ĐIỂM -->
    <button
        class="tool-btn green"
        onclick="createDraggableMarker()"
    >
        <i class="fa-solid fa-plus"></i>
    </button>

    <!-- GPS -->
    <button
        class="tool-btn blue"
        onclick="goGPS()"
    >
        <i class="fa-solid fa-location-dot"></i>
    </button>

    <!-- GPS LOCK -->
    <button
        class="tool-btn blue"
        onclick="toggleGPSLock()"
    >
        <i class="fa-solid fa-satellite"></i>
    </button>

    <!-- IMPORT -->
    <button
        class="tool-btn yellow"
        onclick="
            document
            .getElementById('importFile')
            .click()
        "
    >
        <i class="fa-solid fa-folder-open"></i>
    </button>

    <!-- PROJECT -->
    <button
        class="tool-btn purple"
        onclick="openProjectManager()"
    >
        <i class="fa-solid fa-folder"></i>
    </button>

    <!-- LIST -->
    <button
        class="tool-btn blue"
        onclick="openPointList()"
    >
        <i class="fa-solid fa-list"></i>
    </button>

    <!-- SHARE -->
    <button
        class="tool-btn purple"
        onclick="shareProject()"
    >
        <i class="fa-solid fa-share-nodes"></i>
    </button>

    <!-- DELETE -->
    <button
        class="tool-btn orange"
        onclick="clearAllData()"
    >
        <i class="fa-solid fa-trash"></i>
    </button>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map;

let currentLocation=null;

let surveyPoints=[];

let tempImportPoints=[];

let tempPoint=null;

let editingIndex=-1;

let draggableMarker=null;

let mapMarkers=[];

let gpsLock=false;

let measurePoints=[];
    
let measureLine=null;
 
let currentProject='';
initMap();

function initMap(){

    map=L.map('map',{
        zoomControl:false
    }).setView([13.9833,108.0000],16);

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution:'© OpenStreetMap'
        }
    ).addTo(map);

    updateProjectList();
    
    loadAllProjects();
    
    initGPS();

    map.on('click',function(e){
    
        document
        .getElementById('listPanel')
        .classList
        .remove('active');
    
    });

}

function initGPS(){

    navigator.geolocation.watchPosition(pos=>{

        currentLocation={
            lat:pos.coords.latitude,
            lng:pos.coords.longitude
        };

      
        if(gpsLock && draggableMarker){
        
            draggableMarker.setLatLng([
                currentLocation.lat,
                currentLocation.lng
            ]);
        
        }

        
        document.getElementById('gpsInfo').innerHTML=
        `📍 ${currentLocation.lat.toFixed(6)}, ${currentLocation.lng.toFixed(6)}
        | Accuracy ${Math.round(pos.coords.accuracy)}m`;

    },err=>{

        alert('Không lấy được GPS');

    },{
        enableHighAccuracy:true
    });

}



function toggleGPSLock(){

    gpsLock=!gpsLock;

    if(gpsLock){

        alert('Đã bật GPS LOCK');

    }else{

        alert('Đã tắt GPS LOCK');

    }

}


function createDraggableMarker(){

    if(draggableMarker){

        map.removeLayer(draggableMarker);

    }

    const center=map.getCenter();

    draggableMarker=L.marker(
        [center.lat,center.lng],
        {
            draggable:true
        }
    ).addTo(map);

    draggableMarker.bindPopup(
        '📍 Kéo đến vị trí cần khảo sát<br>Bấm marker để nhập thông tin'
    );

    draggableMarker.on('click',function(){

        editingIndex=-1;
        
        document.getElementById(
            'pointNote'
        ).value='';
        
        document.getElementById(
            'pointType'
        ).value='ODF';
        updatePointPrefix();

        const pos=draggableMarker.getLatLng();

        tempPoint={
            lat:pos.lat,
            lng:pos.lng
        };

        document.getElementById('pointLat').value=
        pos.lat.toFixed(6);
        
        document.getElementById('pointLng').value=
        pos.lng.toFixed(6);
        
        document
            .getElementById('pointPanel')
            .classList
            .add('active');

        document
        .getElementById('mapOverlay')
        .classList
        .add('active');

    });

}

    function measureDistance(lat,lng){
    
        measurePoints.push([lat,lng]);
    
        if(measurePoints.length===1){
    
            alert('Đã chọn điểm đầu');
    
            return;
    
        }
    
        if(measurePoints.length===2){
    
            if(measureLine){
    
                map.removeLayer(measureLine);
    
            }
    
            measureLine=L.polyline(
                measurePoints,
                {
                    color:'#00e0ff',
                    weight:3,
                    dashArray:'6,6'
                }
            ).addTo(map);
    
            const p1=L.latLng(measurePoints[0]);
            const p2=L.latLng(measurePoints[1]);
    
            const d=
            p1.distanceTo(p2);
    
            let text='';
    
            if(d>1000){
    
                text=
                (d/1000).toFixed(2)+' km';
    
            }else{
    
                text=
                Math.round(d)+' m';
    
            }
    
            measureLine.bindPopup(
                '📏 '+text
            ).openPopup();
    
            measurePoints=[];

            setTimeout(()=>{
            
                if(measureLine){
            
                    map.removeLayer(measureLine);
            
                    measureLine=null;
            
                }
            
            },5000);
    
        }
    
    }

function goGPS(){

    if(!currentLocation) return;

    map.setView(
        [currentLocation.lat,currentLocation.lng],
        18
    );

    L.circleMarker(
        [currentLocation.lat,currentLocation.lng],
        {
            radius:8,
            color:'#fff',
            weight:2,
            fillColor:'#00d4ff',
            fillOpacity:1
        }
    )
    .addTo(map)
    .bindPopup('📍 Vị trí hiện tại');

}




function togglePanel(){

    const p=document.getElementById('pointPanel');

    p.classList.toggle('active');

}
    
    function updatePointPrefix(){
    
        if(editingIndex>=0) return;
    
        const type=
        document.getElementById(
            'pointType'
        ).value;
    
        let prefix='';
    
        if(type==='ODF'){
    
            prefix=
            currentProject+'_DL_';
    
        }
        
        if(type==='ODP'){
        
            prefix=
            currentProject+'_VT';
        
        }
    
        if(type==='TU_DL'){
        
            prefix=
            currentProject+'_DL_';
        
        }

    
        if(type==='TU_VT'){
    
            prefix=
            currentProject+'_VT_Tủ_';
    
        }
    
        if(type==='KH'){
        
            prefix=
            'Trạm_'+currentProject;
        
        }

        document.getElementById(
            'pointName'
        ).value=prefix;
    
    }


function savePoint(){

    if(!tempPoint){

        alert('Hãy chọn vị trí');

        return;

    }

    let inputName=
    document.getElementById(
        'pointName'
    ).value.trim();
    
    const type=
    document.getElementById(
        'pointType'
    ).value;
    
    let prefix='';
    
    if(type==='ODF'){
    
        prefix=
        currentProject+'_DL_';
    
    }
    
   
    if(type==='ODP'){
    
        prefix=
        currentProject+'_VT';
    
    }
   
    if(type==='TU_DL'){
    
        prefix=
        currentProject+'_DL_';
    
    }

    
    if(type==='TU_VT'){
    
        prefix=
        currentProject+'_VT_Tủ_';
    
    }
    
 
    if(type==='KH'){
    
        prefix=
        'Trạm_'+currentProject;
    
    }
    

    const name=inputName;

    const note=document.getElementById('pointNote').value;

    let color='#22c55e';

    if(type==='ODF') color='#3b82f6';
    if(type==='ODP') color='#22c55e';
    if(type==='TU_DL') color='#eab308';
    if(type==='TU_VT') color='#f59e0b';
    if(type==='KH') color='#f97316';
    if(type==='SC') color='#ef4444';
    if(editingIndex>=0){
    
        map.removeLayer(
            mapMarkers[editingIndex]
        );
    
    }

    const marker=L.circleMarker(
        [tempPoint.lat,tempPoint.lng],
        {
            radius:8,
            color:'#fff',
            weight:2,
            fillColor:color,
            fillOpacity:1
        }
    ).addTo(map);
    finishSave();

    function finishSave(){

        const pointData={

            name,
            type,
            note,

            lat:tempPoint.lat,
            lng:tempPoint.lng,

        };

        
        if(editingIndex>=0){
        
            surveyPoints[editingIndex]=pointData;
        
        }else{
        
            surveyPoints.push(pointData);
        
        }

        let popup=`
            <b>${name}</b><br>
            ${type}<br>
            ${note}
        `;

        marker.bindPopup(popup);
        mapMarkers.push(marker);
        saveLocal();
        exportKML();

        updateStats();

        document.getElementById('pointName').value='';

        document.getElementById('pointNote').value='';

        document.getElementById('pointPanel').classList.remove('active');

    
        document
        .getElementById('mapOverlay')
        .classList
        .remove('active');

        editingIndex=-1;
        

    }

}


    function saveLocal(){
    }


function updateProjectList(){

    const s=
    document.getElementById(
        'projectSelect'
    );

    s.innerHTML='';

    s.innerHTML+=`
        <option value="ALL_PROJECTS">
            📂 TẤT CẢ CÔNG TRÌNH
        </option>
    `;

    let projects=[];

    try{

        projects=
        JSON.parse(
            Android.getProjectList()
        );

    }catch(e){

        projects=[];

    }

    projects.forEach(name=>{

        s.innerHTML+=`
            <option value="${name}">
                ${name}
            </option>
        `;

    });

    if(currentProject){
    
        s.value=currentProject;
    
    }else{
    
        if(projects.length>0){
    
            currentProject=projects[0];
    
            s.value=currentProject;
    
            loadLocal();
    
        }else{
    
            s.value='ALL_PROJECTS';
    
        }
    
    }

}
    
    function changeProject(name){


    currentProject=name;

    measurePoints=[];
    
    if(measureLine){
    
        map.removeLayer(measureLine);
    
    }

    if(name==='ALL_PROJECTS'){

        loadAllProjects();

        return;

    }

    loadLocal();

}


    function loadProjectFromKML(name){
    
        try{
    
            const text=
            Android.readProjectKML(name);
    
            if(!text){
    
                return [];
    
            }
    
            const parser=
            new DOMParser();
    
            const xml=
            parser.parseFromString(
                text,
                'text/xml'
            );
    
            const placemarks=
            xml.getElementsByTagName(
                'Placemark'
            );
    
            let points=[];
    
            for(
                let i=0;
                i<placemarks.length;
                i++
            ){
    
                const pm=
                placemarks[i];
    
                const point=
                pm.getElementsByTagName(
                    'Point'
                )[0];
    
                if(!point) continue;
    
                const coord=
                point
                .getElementsByTagName(
                    'coordinates'
                )[0]
                .textContent
                .trim();
    
                const arr=
                coord.split(',');
    
                const lng=
                parseFloat(arr[0]);
    
                const lat=
                parseFloat(arr[1]);
    
                const nameNode=
                pm.getElementsByTagName(
                    'name'
                )[0];
    
                const noteNode=
                pm.getElementsByTagName(
                    'description'
                )[0];
    
        
                points.push({
                
                    name:nameNode
                    ? nameNode.textContent
                    : 'Điểm',
                
                    type:(()=>{
                
                        if(!noteNode){
                
                            return 'ODP';
                
                        }
                
                        const text=
                        noteNode.textContent;
                
                        if(text.includes('TYPE=ODF'))
                            return 'ODF';
                
                        if(text.includes('TYPE=ODP'))
                            return 'ODP';
                
                        if(text.includes('TYPE=TU_DL'))
                            return 'TU_DL';
                
                        if(text.includes('TYPE=TU_VT'))
                            return 'TU_VT';
                
                        if(text.includes('TYPE=KH'))
                            return 'KH';
                
                        return 'ODP';
                
                    })(),
                
                    note:(()=>{
                
                        if(!noteNode){
                
                            return '';
                
                        }
                
                        const text=
                        noteNode.textContent;
                
                        if(text.includes('||NOTE=')){
                
                            return text.split('||NOTE=')[1];
                
                        }
                
                        return text;
                
                    })(),
                
                    lat:lat,
                    lng:lng
                
                });
                 
            }
    
            return points;
    
        }catch(e){
    
            return [];
    
        }
    
    }
    
function loadLocal(){

    surveyPoints=[];
  
    mapMarkers.forEach(m=>{
    
        if(!m.isTempImport){
    
            map.removeLayer(m);
    
        }
    
    });
    
    mapMarkers=
    mapMarkers.filter(m=>m.isTempImport);

    surveyPoints=
    loadProjectFromKML(
        currentProject
    );

    surveyPoints.forEach((p,index)=>{

        let color='#22c55e';

        if(p.type==='ODF') color='#3b82f6';
        if(p.type==='ODP') color='#22c55e';
        if(p.type==='TU_DL')
            color='#eab308';
        
        if(p.type==='TU_VT')
            color='#f59e0b';

        if(p.type==='KH') color='#f97316';
        if(p.type==='SC') color='#ef4444';

        let popup=`
            <b>${p.name}</b><br>
            ${p.type}<br>
            ${p.note}
            
            <br><br>
            
            <button
                onclick="editPoint(${index})"
                style="
                    border:none;
                    padding:6px 10px;
                    border-radius:8px;
                    background:#2563eb;
                    color:white;
                "
            >
                ✏️ Sửa
            </button>

            <button
                onclick="deletePoint(${index})"
                style="
                    border:none;
                    padding:6px 10px;
                    border-radius:8px;
                    background:#dc2626;
                    color:white;
                    margin-left:6px;
                "
            >

            `;


    const mk=L.circleMarker(

        {

            color:'#fff',
            weight:2,
            fillColor:color,
            fillOpacity:1
        }
    )
    .addTo(map)
    .bindPopup(popup);
    
    mapMarkers.push(mk);

    mk.on('contextmenu',function(){
    
        measureDistance(
            p.lat,
            p.lng
        );
    
        mk.closePopup();
    
        navigator.vibrate?.(100);
    
    });

 });

updateStats();

    const bounds=[];

    surveyPoints.forEach(p=>{

        bounds.push([
            p.lat,
            p.lng
        ]);

    });

}
 
}


function updateStats(){

    document.getElementById(
        'bottomStats'
    ).innerHTML=
    `📍 ${surveyPoints.length} điểm`;

}

function openProjectManager(){

    const name=prompt(
        'Nhập mã trạm / công trình',
        currentProject
    );

    if(!name) return;

    currentProject=name;
    
    /* RESET DỮ LIỆU */
    
    surveyPoints=[];
    
    mapMarkers.forEach(m=>{
    
        if(!m.isTempImport){
    
            map.removeLayer(m);
    
        }
    
    });
    
    mapMarkers=
    mapMarkers.filter(m=>m.isTempImport);
    
    /* TẠO FILE MỚI */
    
    exportKML();

    updateProjectList();

    document.getElementById(
        'projectSelect'
    ).value=currentProject;

    loadLocal();

    alert(
        'Đã chuyển sang công trình: '+
        currentProject
    );

}
    
function exportKML(){

    let kml=`<?xml version="1.0" encoding="UTF-8"?>`;

    kml+=`
    <kml xmlns="http://www.opengis.net/kml/2.2">
    <Document>
    `;

    surveyPoints.forEach(p=>{

        kml+=`
        <Placemark>
            <name>${p.name}</name>
            <description>
            TYPE=${p.type}||NOTE=${p.note}
            </description>
            <Point>
                <coordinates>
                    ${p.lng},${p.lat},0
                </coordinates>
            </Point>
        </Placemark>
        `;

    });

    kml+=`
    </Document>
    </kml>
    `;

    Android.saveKMLFile(
    
        currentProject+'.kml',
    
        kml
    
    );
    
}

function importSurveyFile(event){

    const file=event.target.files[0];
    
    if(!file) return;

    const reader=new FileReader();

    reader.onload=function(e){

        tempImportPoints=[];
        
    mapMarkers.forEach(m=>{
    
        if(m.isTempImport){
    
            map.removeLayer(m);
    
        }
    
    });
 
    mapMarkers=
    mapMarkers.filter(m=>m.isTempImport===false);

        const text=e.target.result;

        const parser=new DOMParser();

        const xml=parser.parseFromString(
            text,
            'text/xml'
        );

        const placemarks=
        xml.getElementsByTagName('Placemark');


        placemarksLoop:
        for(let i=0;i<placemarks.length;i++){
        const pm=placemarks[i];
        const point=
         pm.getElementsByTagName('Point')[0];
        if(point){
        const coord=
            point
            .getElementsByTagName('coordinates')[0]
            .textContent
            .trim();
        const arr=coord.split(',');
        const lng=parseFloat(arr[0]);
        const lat=parseFloat(arr[1]);
        const nameNode=
        pm.getElementsByTagName('name')[0];
        const name=
            nameNode
            ? nameNode.textContent
            : 'Điểm';
            tempImportPoints.push({
            name:name,
            type:'ODP',
            note:'',
            lat:lat,
            lng:lng,
            });
            }
        }
        tempImportPoints.forEach(p=>{
        const mk=L.circleMarker(
            [p.lat,p.lng],
            {
            radius:7,
            color:'#fff',
            weight:2,
            fillColor:'#eab308',
            fillOpacity:1
            }
            )
            .addTo(map)
            .bindPopup(
                '<b>FILE TẠM</b><br>'+p.name
            );
          
            mk.isTempImport=true;
            mapMarkers.push(mk);
        });
    
        if(tempImportPoints.length>0){
        
            const bounds=[];
        
            tempImportPoints.forEach(p=>{
        
                bounds.push([
                    p.lat,
                    p.lng
                ]);
        
            });
        
            map.fitBounds(
                bounds,
                {
                    padding:[40,40]
                }
            );
        
        }
        alert('Đã import KML');
    };

    reader.readAsText(file);
}

function editPoint(index){

    const p=surveyPoints[index];

    editingIndex=index;

    tempPoint={
        lat:p.lat,
        lng:p.lng
    };

    document.getElementById('pointName').value=
    p.name;

    document.getElementById('pointType').value=
    p.type;

    document.getElementById('pointNote').value=
    p.note;

    document.getElementById('pointLat').value=
    p.lat;

    document.getElementById('pointLng').value=
    p.lng;

    document
    .getElementById('pointPanel')
    .classList
    .add('active');
    document .getElementById('mapOverlay') .classList .add('active');

}

function loadAllProjects(){

    mapMarkers.forEach(m=>{
    
        if(!m.isTempImport){
    
            map.removeLayer(m);
    
        }
    
    });
    
    mapMarkers=
    mapMarkers.filter(m=>m.isTempImport);

    let projects=[];
    
    try{
    
        projects=
        JSON.parse(
            Android.getProjectList()
        );
    
    }catch(e){
    
        projects=[];
    
    }

    projects.forEach(project=>{

    const data=
    loadProjectFromKML(
        project
    );
    (data||[]).forEach(p=>{
            let color='#22c55e';

            if(p.type==='ODF') color='#3b82f6';
            if(p.type==='ODP') color='#22c55e';
            if(p.type==='TU_DL')
            color='#eab308';
            
            if(p.type==='TU_VT')
                color='#f59e0b';
            if(p.type==='KH') color='#f97316';
            if(p.type==='SC') color='#ef4444';

        
            const mk=L.circleMarker(
                [p.lat,p.lng],
                {
                    radius:7,
                    color:'#fff',
                    weight:2,
                    fillColor:color,
                    fillOpacity:1
                }
            )
            .addTo(map)
            .bindPopup(
                '<b>'+project+'</b><br>'+p.name
            );
            
   
        mk.on('contextmenu',function(){
        
            measureDistance(
                p.lat,
                p.lng
            );
        
            mk.closePopup();
        
            navigator.vibrate?.(100);
        
        });

        mapMarkers.push(mk);

    });

     
    const realMarkers=
    mapMarkers.filter(
        m=>!m.isTempImport
    );
    
    if(realMarkers.length>0){
    
        const bounds=[];
    
        realMarkers.forEach(m=>{
    
            bounds.push(
                m.getLatLng()
            );
    
        });

        map.fitBounds(
            bounds,
            {
                padding:[40,40]
            }
        );
    
        }
    
        });
    
    }
        

    function searchPoint(){
    
        const kw=
        document
        .getElementById('searchPoint')
        .value
        .toLowerCase();
    
        if(!kw){
    
            if(currentProject==='ALL_PROJECTS'){
    
                loadAllProjects();
    
            }else{
    
                loadLocal();
    
            }
    
            return;
    
        }
    
        mapMarkers.forEach(m=>{
    
            if(!m.isTempImport){
    
                map.removeLayer(m);
    
            }
    
        });
    
        mapMarkers=
        mapMarkers.filter(m=>m.isTempImport);
    
        let sourcePoints=[];
    
        if(currentProject==='ALL_PROJECTS'){
    
            let projects=[];
    
            try{
    
                projects=
                JSON.parse(
                    Android.getProjectList()
                );
    
            }catch(e){
    
                projects=[];
    
            }
    
            projects.forEach(project=>{
    
                const data=
                loadProjectFromKML(
                    project
                );
    
                (data||[]).forEach(p=>{
    
                    sourcePoints.push(p);
    
                });
    
            });
    
        }else{
    
            sourcePoints=surveyPoints;
    
        }
    
        sourcePoints.forEach(p=>{
    
            if(
                p.name.toLowerCase().includes(kw)
            ){
    
                const mk=L.circleMarker(
                    [p.lat,p.lng],
                    {
                        radius:10,
                        color:'#fff',
                        weight:2,
                        fillColor:'#ff0000',
                        fillOpacity:1
                    }
                )
                .addTo(map)
                .bindPopup(p.name);
    
                mapMarkers.push(mk);
    
                map.setView(
                    [p.lat,p.lng],
                    20
                );
    
                mk.openPopup();
    
            }
    
        });
    
    }

function openPointList(){

    let html='';

    surveyPoints.forEach((p,index)=>{

        let color='#22c55e';

        if(p.type==='ODF')
            color='#3b82f6';

        if(p.type==='TU_DL')
            color='#eab308';

        if(p.type==='TU_VT')
            color='#f59e0b';

        if(p.type==='KH')
            color='#f97316';

        html+=`

        <div
            style="
                background:#111827;
                border:1px solid #1f2937;
                border-radius:12px;
                padding:10px;
                margin-bottom:8px;
                color:white;
            "
        >

            <div
                style="
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                "
            >

                <div>

                    <div
                        style="
                            font-weight:700;
                            color:${color};
                            font-size:13px;
                        "
                    >
                        ${p.name}
                    </div>

                    <div
                        style="
                            font-size:11px;
                            color:#9ca3af;
                            margin-top:2px;
                        "
                    >
                        ${p.type}
                    </div>

                </div>

                <div
                    style="
                        display:flex;
                        gap:6px;
                    "
                >

                    <button
                        onclick="
                            map.setView(
                                [${p.lat},${p.lng}],
                                20
                            );
                        "

                        style="
                            border:none;
                            background:#2563eb;
                            color:white;
                            padding:6px 8px;
                            border-radius:8px;
                        "
                    >
                        📍
                    </button>

                    <button
                       
                        onclick="
                        
                            document
                            .getElementById('listPanel')
                            .classList
                            .remove('active');
                        
                            editPoint(${index})
                        
                        "

                        style="
                            border:none;
                            background:#16a34a;
                            color:white;
                            padding:6px 8px;
                            border-radius:8px;
                        "
                    >
                        ✏️
                    </button>

                </div>

            </div>

        </div>

        `;

    });

    document.getElementById(
        'pointListContainer'
    ).innerHTML=html;

    document
    .getElementById('listPanel')
    .classList
    .add('active');

}

function shareProject(){

    if(!currentProject){

        alert('Chưa chọn công trình');

        return;

    }

    Android.shareProject(
        currentProject
    );

}
    
function deletePoint(index){

    if(!confirm('Xóa điểm này?'))
        return;

    surveyPoints.splice(index,1);

    saveLocal();

    exportKML();

    loadLocal();

}

function clearAllData(){

    if(
        currentProject==='ALL_PROJECTS'
        ||
        !currentProject
    ){
    
        alert(
            'Hãy chọn 1 công trình cụ thể để xóa'
        );
    
        return;
    
    }

    if(
        !confirm(
            'Xóa công trình '+currentProject+' ?'
        )
    ) return;

    try{

        Android.deleteProject(
            currentProject
        );

    }catch(e){

        alert(e);

    }

    surveyPoints=[];

    mapMarkers.forEach(m=>{
    
        if(!m.isTempImport){
    
            map.removeLayer(m);
    
        }
    
    });
    
    mapMarkers=
    mapMarkers.filter(m=>m.isTempImport);
   
    currentProject='';
    
    updateProjectList();
    
    loadAllProjects();

    alert('Đã xóa công trình');

}
