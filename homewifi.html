<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Homewifi Dashboard PRO</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:6px}
.card{background:#fff;padding:10px;margin-bottom:8px;border-radius:8px}
input,select,button{padding:6px;margin-top:4px;width:100%}
.high{color:red;font-weight:bold}
.history{background:#fafafa;padding:6px;margin-top:6px;border-radius:6px}
.done{color:green;font-weight:bold}
.fail{color:orange;font-weight:bold}
</style>
</head>

<body>

<h3>📋 Dashboard Homewifi PRO</h3>

<input id="acc_th" placeholder="🔍 Tìm account">

<div id="dataTH"></div>

<script>

const API_TH   = "https://script.google.com/macros/s/AKfycbyezxVz4giR-_yzv9ogTlbuvb4jkwyfZCrrDv53ScmkPrcDY1f1Mv-jMVziS3OGWLkl/exec?sheet=Homewifi";
const API_NOTE = "https://script.google.com/macros/s/AKfycby65IonkB4-im-6x2iJVAbMyzbUfaSs0e2udEQHoi5qnOSVdbO8wRyWGxiTE5KJZ0I5BQ/exec";

let dataTH = [];
let noteData = [];

// LOAD
async function loadAll(){

  let th = await fetch(API_TH).then(r=>r.json());
  dataTH = th.data;

  let note = await fetch(API_NOTE).then(r=>r.json());
  noteData = note.data;

  renderTH(dataTH);
}

// LẤY NOTE THEO ACCOUNT
function getNote(account){
  return noteData.filter(n => n.account == account);
}

// SAVE
function save(account, nhan_vien){

  let note = document.getElementById("note_"+account).value;
  let status = document.getElementById("status_"+account).value;
  let file = document.getElementById("img_"+account).files[0];

  if(!note && !file){
    alert("Nhập ghi chú hoặc chọn ảnh");
    return;
  }

  if(file){
    let reader = new FileReader();
    reader.onload = function(){
      send(account, note, status, reader.result, nhan_vien);
    };
    reader.readAsDataURL(file);
  }else{
    send(account, note, status, "", nhan_vien);
  }
}

function send(account, note, status, image, nhan_vien){

  fetch(API_NOTE,{
    method:"POST",
    body: JSON.stringify({
      account,
      note,
      status,
      image,
      nhan_vien
    })
  })
  .then(()=>{
    alert("✅ Đã lưu");
    loadAll();
  });
}

// RENDER
function renderTH(data){

  let accFilter = document.getElementById("acc_th").value.toLowerCase();

  let html = "";

  data.forEach(r=>{

    if(accFilter && !r.account.toLowerCase().includes(accFilter)) return;

    let notes = getNote(r.account);

    let latest = notes[notes.length-1];

    let statusIcon = "";
    let statusClass = "";

    if(latest){
      if(latest.status=="done"){
        statusIcon = "✅";
        statusClass = "done";
      }
      if(latest.status=="fail"){
        statusIcon = "⚠️";
        statusClass = "fail";
      }
    }

    html += `
    <div class="card">

      <b class="${statusClass}">${statusIcon} ${r.account}</b><br>
      👤 ${r.nhan_vien} - ${r.huyen}<br>

      💰 <span class="${r.t_p>200000?'high':''}">
      ${Number(r.t_p||0).toLocaleString()}
      </span>

      <hr>

      📝 <input id="note_${r.account}" placeholder="Ghi chú...">

      <select id="status_${r.account}">
        <option value="done">✅ Đã xử lý</option>
        <option value="fail">⚠️ Bất khả kháng</option>
      </select>

      <input type="file" id="img_${r.account}">

      <button onclick="save('${r.account}','${r.nhan_vien}')">💾 Lưu</button>

      <button onclick="toggleHistory('${r.account}')">📜 Lịch sử</button>

      <div id="his_${r.account}" class="history" style="display:none">
        ${renderHistory(notes)}
      </div>

    </div>
    `;
  });

  document.getElementById("dataTH").innerHTML = html;
}

// HISTORY
function renderHistory(list){

  if(!list.length) return "Chưa có";

  return list.map(n=>`
    <div>
      ⏰ ${formatTime(n.time)}<br>
      👤 ${n.nhan_vien}<br>
      ${n.status=="done"?"✅":"⚠️"} ${n.note}<br>
      ${n.image ? `<a href="${n.image}" target="_blank">📷 Xem ảnh</a>`:""}
      <hr>
    </div>
  `).join("");
}

// TOGGLE
function toggleHistory(acc){

  let el = document.getElementById("his_"+acc);

  el.style.display = (el.style.display=="none") ? "block" : "none";
}

// TIME
function formatTime(t){
  let d = new Date(t);
  return d.toLocaleString("vi-VN");
}

// FILTER
document.getElementById("acc_th").addEventListener("input", ()=>{
  renderTH(dataTH);
});

// INIT
loadAll();

</script>

</body>
</html>
