<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Homewifi Dashboard</title>

<style>
body {
  font-family: Arial;
  padding: 10px;
  background: #f5f5f5;
}

.card {
  background: #fff;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.high {
  color: red;
  font-weight: bold;
}

input {
  padding: 6px;
  margin-right: 6px;
  margin-bottom: 10px;
}

h3 {
  margin-top: 15px;
}
</style>
</head>

<body>

<h3>📋 Danh sách xử lý Homewifi</h3>

<input id="nv_th" placeholder="Tìm nhân viên">
<input id="huyen_th" placeholder="Tìm huyện">
<button onclick="filterTH()">Lọc</button>

<div id="dataTH">Đang tải...</div>

<script>

// 🔥 API của bạn
const API_TH = "https://script.google.com/macros/s/AKfycbyezxVz4giR-_yzv9ogTlbuvb4jkwyfZCrrDv53ScmkPrcDY1f1Mv-jMVziS3OGWLkl/exec?sheet=Homewifi";

let dataTH = [];

// ============================
// LOAD DATA
// ============================
function loadTH(){
  fetch(API_TH)
    .then(r => r.json())
    .then(res => {
      dataTH = res.data;
      renderTH(dataTH);
    })
    .catch(err => {
      document.getElementById("dataTH").innerHTML = "❌ Lỗi tải dữ liệu";
      console.error(err);
    });
}

// ============================
// GOM THEO NHÂN VIÊN
// ============================
function groupByNV(data){

  let map = {};

  data.forEach(r => {

    let key = (r.nhan_vien || "") + "_" + (r.huyen || "");

    if(!map[key]){
      map[key] = {
        nhan_vien: r.nhan_vien,
        huyen: r.huyen,
        account: r.account,
        seri: [],
        t_p: 0,
        thang: r.thang
      };
    }

    if(r.seri){
      map[key].seri.push(r.seri);
    }

    map[key].t_p += Number(r.t_p || 0);
  });

  return Object.values(map);
}

// ============================
// RENDER
// ============================
function renderTH(data){

  let grouped = groupByNV(data);

  // chỉ lấy NV có phạt
  grouped = grouped.filter(r => r.t_p > 0);

  // sort tiền giảm dần
  grouped.sort((a,b)=> b.t_p - a.t_p);

  let html = "";

  grouped.forEach(r => {

    let tien = Number(r.t_p).toLocaleString("vi-VN");

    let colorClass = r.t_p > 200000 ? "high" : "";

    html += `
      <div class="card">
        <b>👤 ${r.nhan_vien || "-"} - ${r.huyen || "-"}</b><br>

        📱 Account: ${r.account || "-"}<br>
        🔧 Seri: ${r.seri.join(", ") || "-"}<br>
        📅 Tháng triển khai: ${r.thang || "-"}<br>
        💰 Tiền phạt: <span class="${colorClass}">${tien}</span>
      </div>
    `;
  });

  document.getElementById("dataTH").innerHTML = html || "Không có dữ liệu";
}

// ============================
// FILTER
// ============================
function filterTH(){

  let nv = document.getElementById("nv_th").value.toLowerCase();
  let h = document.getElementById("huyen_th").value.toLowerCase();

  let f = dataTH.filter(r =>
    (r.nhan_vien || "").toLowerCase().includes(nv) &&
    (r.huyen || "").toLowerCase().includes(h)
  );

  renderTH(f);
}

// ============================
// INIT
// ============================
loadTH();

</script>

</body>
</html>
