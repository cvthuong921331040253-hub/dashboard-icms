<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Homewifi Dashboard</title>

<style>
body {
  font-family: Arial;
  padding: 10px;
  background: #f5f5f5;
}

.card {
  background: #fff;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.account {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed #ddd;
}

.high {
  color: red;
  font-weight: bold;
}

input {
  padding: 6px;
  margin-right: 6px;
  margin-bottom: 10px;
}

#logtime {
  color: #666;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h3>📋 Danh sách xử lý Homewifi</h3>
<div id="logtime">Đang tải...</div>

<input id="nv_th" placeholder="Tìm nhân viên">
<input id="huyen_th" placeholder="Tìm huyện">
<button onclick="filterTH()">Lọc</button>

<div id="dataTH">Đang tải...</div>

<script>

// 🔥 API
const API_TH = "https://script.google.com/macros/s/AKfycbyezxVz4giR-_yzv9ogTlbuvb4jkwyfZCrrDv53ScmkPrcDY1f1Mv-jMVziS3OGWLkl/exec?sheet=Homewifi";

let dataTH = [];

// ============================
// LOAD DATA
// ============================
function loadTH(){
  fetch(API_TH)
    .then(r => r.json())
    .then(res => {

      dataTH = res.data;

      // 🔥 logtime mới nhất
      let latest = getLatestLogtime(dataTH);

      let isOld = (Date.now() - latest) > 24*60*60*1000;

      document.getElementById("logtime").innerHTML =
        `⏰ Cập nhật: <span style="color:${isOld?'red':'#666'}">
          ${formatTime(latest)}
        </span>`;

      renderTH(dataTH);
    })
    .catch(err => {
      document.getElementById("dataTH").innerHTML = "❌ Lỗi tải dữ liệu";
      console.error(err);
    });
}

// ============================
// LẤY LOGTIME MỚI NHẤT
// ============================
function getLatestLogtime(data){

  let max = 0;

  data.forEach(r=>{
    let t = new Date(r.update).getTime();
    if(t > max) max = t;
  });

  return max;
}

// ============================
// FORMAT TIME
// ============================
function formatTime(date){

  let d = new Date(date);

  let dd = String(d.getDate()).padStart(2,'0');
  let mm = String(d.getMonth()+1).padStart(2,'0');
  let yy = d.getFullYear();

  let hh = String(d.getHours()).padStart(2,'0');
  let mi = String(d.getMinutes()).padStart(2,'0');

  return `${dd}/${mm}/${yy} ${hh}:${mi}`;
}

// ============================
// GOM THEO ACCOUNT (ĐÚNG)
// ============================
function groupByAccount(data){

  let map = {};

  data.forEach(r => {

    let key = (r.nhan_vien || "") + "_" + (r.account || "");

    let log = new Date(r.update || 0);

    if(!map[key]){
      map[key] = {
        nhan_vien: r.nhan_vien,
        huyen: r.huyen,
        account: r.account,
        seri: [],
        t_p: 0,
        thang: r.thang,
        update: log
      };
    }

    if(r.seri){
      map[key].seri.push(r.seri);
    }

    map[key].t_p += Number(r.t_p || 0);

    // lấy log mới nhất từng account
    if(log > map[key].update){
      map[key].update = log;
    }
  });

  return Object.values(map);
}

// ============================
// RENDER
// ============================
function renderTH(data){

  let grouped = groupByAccount(data);

  grouped = grouped.filter(r => r.t_p > 0);

  grouped.sort((a,b)=> b.t_p - a.t_p);

  let html = "";

  grouped.forEach(r => {

    let tien = Number(r.t_p).toLocaleString("vi-VN");
    let colorClass = r.t_p > 200000 ? "high" : "";

    html += `
      <div class="card">
        <b>👤 ${r.nhan_vien || "-"} - ${r.huyen || "-"}</b>

        <div class="account">
          📱 Account: <b>${r.account || "-"}</b><br>
          🔧 Seri: ${r.seri.join(", ") || "-"}<br>
          📅 Tháng triển khai: ${r.thang || "-"}<br>
          💰 Tiền phạt: <span class="${colorClass}">${tien}</span><br>
          ⏰ Logtime: ${formatTime(r.update)}
        </div>
      </div>
    `;
  });

  document.getElementById("dataTH").innerHTML = html || "Không có dữ liệu";
}

// ============================
// FILTER
// ============================
function filterTH(){

  let nv = document.getElementById("nv_th").value.toLowerCase();
  let h = document.getElementById("huyen_th").value.toLowerCase();

  let f = dataTH.filter(r =>
    (r.nhan_vien || "").toLowerCase().includes(nv) &&
    (r.huyen || "").toLowerCase().includes(h)
  );

  renderTH(f);
}

// ============================
// INIT
// ============================
loadTH();

</script>

</body>
</html>
