<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Xử lý Homewifi thiếu</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:6px}
.card{background:#fff;padding:10px;margin-bottom:8px;border-radius:8px}
.high{color:red;font-weight:bold}
.history{background:#fafafa;padding:6px;margin-top:6px;border-radius:6px}
.done{color:green;font-weight:bold}
.fail{color:orange;font-weight:bold}
button{padding:6px;margin-top:4px;cursor:pointer}
.header{position: fixed;top: 0;left: 0;width: 100%;background: #f5f5f5;padding: 8px;z-index: 1000;box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
/* đẩy nội dung xuống tránh bị đè */
#dataTH{margin-top: 90px;}
h3{margin: 0 0 6px 0;}
#search_all{width: 100%;padding: 6px;}
</style>

</head>

<body>

<div class="header">

  <h3>📋 Xử lý Homewifi thiếu</h3>

  <input id="search_all" placeholder="🔍 Tìm account / nhân viên / huyện">

</div>

<div id="dataTH"></div>

<script>

const API_TH   = "https://script.google.com/macros/s/AKfycbyezxVz4giR-_yzv9ogTlbuvb4jkwyfZCrrDv53ScmkPrcDY1f1Mv-jMVziS3OGWLkl/exec?sheet=Homewifi";
const API_NOTE = "https://script.google.com/macros/s/AKfycbxRzw22SuGZXByVNrQoylfmuY_5Jtat7KwNs24gbGbuRrt-txGs1Uxo5Vg0JC-h1hLNXg/exec";

let dataTH = [];
let noteData = [];

// ===== LOAD =====
async function loadAll(){
  let th = await fetch(API_TH).then(r=>r.json());
  dataTH = th.data;

  let note = await fetch(API_NOTE).then(r=>r.json());
  noteData = note.data;

  renderTH(dataTH);
}


// ===== CHUYỂN TRANG =====
function goDetail(account){
  window.location.href = "homewifinhaplieu.html?account=" + account;
}

// ===== GROUP =====
function groupByAccount(data){
  let map = {};

  data.forEach(r=>{
    let key = r.account;

    if(!map[key]){
      map[key] = {
        nhan_vien: r.nhan_vien,
        huyen: r.huyen,
        account: r.account,
        seri: [],
        t_p: 0,
        thang: r.thang
      };
    }

    if(r.seri) map[key].seri.push(r.seri);
    map[key].t_p += Number(r.t_p || 0);
  });

  return Object.values(map);
}

// ===== NOTE =====
function getNote(account){
  return noteData.filter(n => n.account == account);
}

// ===== RENDER =====
function renderTH(data){

  let html = "";

  let grouped = groupByAccount(data)
    .filter(r => r.t_p > 0)
    .sort((a,b)=> b.t_p - a.t_p);

  grouped.forEach(r=>{

    let notes = getNote(r.account);
    let latest = notes.length ? notes[notes.length-1] : null;

    let statusIcon = "";
    let statusClass = "";

    if(latest){
      if(latest.status=="done"){statusIcon="✅";statusClass="done";}
      if(latest.status=="fail"){statusIcon="⚠️";statusClass="fail";}
    }

    html += `
    <div class="card" data-acc="${r.account}">

      <b class="${statusClass}">${statusIcon} ${r.account}</b><br>
      👤 ${r.nhan_vien} - ${r.huyen}<br>
      🔧 Thiếu: ${r.seri.join(", ")}<br>
      📅 TKM tháng: ${r.thang}<br>
      💰 <span class="${r.t_p>200000?'high':''}">
      ${Number(r.t_p||0).toLocaleString()}
      </span>

      <div style="display:flex; gap:6px; margin-top:6px">

        <button onclick="toggleHistory('${r.account}')">
          📜 Lịch sử
        </button>

        <button onclick="goDetail('${r.account}')">
          ✏️ Nhập dữ liệu
        </button>

      </div>

      <div id="his_${r.account}" class="history" style="display:none">
        ${renderHistory(notes)}
      </div>

    </div>
    `;
  });

document.getElementById("dataTH").innerHTML = html || "Không có dữ liệu";

// 🔥 FIX highlight đúng thời điểm
let acc = localStorage.getItem("updated_account");

if(acc){
  setTimeout(()=>{
    highlightAccount(acc);
    localStorage.removeItem("updated_account");
  },150); // delay nhỏ cho chắc chắn DOM xong
}
}
// ===== HISTORY =====
function renderHistory(list){
  if(!list.length) return "Chưa có";

  return list.map(n=>`
    ⏰ ${formatTime(n.time)}<br>
    👤 ${n.nhan_vien}<br>
    ${n.status=="done"?"✅ Đã xử lý":"❌ Bất khả kháng: " + n.note}<br>
    ${n.image 
      ? n.image.split(",").map(url => 
          `<a href="${url}" target="_blank">📷 Ảnh</a>`
        ).join(" ")
      : ""
    }
    <hr>
  `).join("");
}

function toggleHistory(acc){
  let el = document.getElementById("his_"+acc);
  el.style.display = el.style.display=="none" ? "block":"none";
}

function formatTime(t){
  return new Date(t).toLocaleString("vi-VN");
}
function highlightAccount(account){

  let el = document.querySelector(`[data-acc='${account}']`);

  if(el){
    el.style.background = "#fff3cd";

    setTimeout(()=>{
      el.style.background = "#fff";
    },2000);

    el.scrollIntoView({behavior:"smooth",block:"center"});
  }

}

// ===== FILTER =====
document.getElementById("search_all").addEventListener("input", ()=>{
  let key = document.getElementById("search_all").value.toLowerCase();

  let f = dataTH.filter(r=>{
    return (r.account||"").toLowerCase().includes(key) ||
           (r.nhan_vien||"").toLowerCase().includes(key) ||
           (r.huyen||"").toLowerCase().includes(key);
  });

  renderTH(f);
});

// INIT
loadAll();

</script>

</body>
</html>
