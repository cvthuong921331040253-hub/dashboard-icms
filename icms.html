<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard ICMS</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f1f3f4;
}

.header{
  background:#0b5394;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:10px;
}

.top-box{
  display:flex;
  gap:10px;
  margin-bottom:15px;
  flex-wrap:wrap;
}

.main-btn{
  flex:1;
  min-width:120px;
  border:none;
  padding:10px;
  border-radius:10px;
  background:#0b5394;
  color:white;
  font-size:13px;
  font-weight:bold;
}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.group-title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
  color:#0b5394;
}

.sub-btn{
  width:100%;
  border:none;
  padding:12px;
  margin-bottom:8px;
  border-radius:8px;
  background:#e8f0fe;
  text-align:left;
  font-weight:bold;
  font-size:15px;
}

.item{
  background:white;
  border-left:4px solid red;
  padding:8px;
  border-radius:8px;
  margin-bottom:8px;
}

.item p{
  margin:3px 0;
  font-size:12px;
}

.red{
  color:red;
  font-weight:bold;
}

.green{
  color:green;
  font-weight:bold;
}

#loading{
  text-align:center;
  padding:20px;
  font-size:18px;
}

</style>
</head>

<body>

<div class="header">
  DASHBOARD ICMS
</div>

<div class="container">

  <button class="main-btn"
    onclick="reloadData()"
    style="
      margin-bottom:8px;
      background:green;
      padding:10px;
      font-size:13px;
    ">
    LOAD DỮ LIỆU
  </button>

  <div class="top-box">

    <button class="main-btn"
      onclick="showType('InOS')">
      INOS
    </button>

    <button class="main-btn"
      onclick="showType('OutOS')">
      OUT OS
    </button>

    <button class="main-btn"
      style="background:#ff9900"
      onclick="showChoCD()">
      WO FT CHỜ CD DUYỆT
    </button>

    <button class="main-btn"
      style="background:#6a1b9a"
      onclick="showTimelineTTH()">
      TIMELINE TTH
    </button>

    <button class="main-btn"
      style="background:#00897b"
      onclick="showTimelineDV()">
      TIMELINE ĐẦU VIỆC
    </button>

  </div>

  <div id="loading">
    Đang tải dữ liệu...
  </div>

  <button
  onclick="goBack()"
  style="
    margin-top:8px;
    margin-bottom:10px;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    background:#666;
    color:white;
    font-size:13px;
    font-weight:bold;
  ">
  ← BACK
  </button>

  <input
  type="text"
  id="searchInput"
  placeholder="Tìm trạm, huyện, danh mục, WO, nhân viên..."
  onkeyup="searchData()"
  style="
    width:100%;
    box-sizing:border-box;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:12px;
    font-size:13px;
  "
>
  
  <div id="content"></div>

</div>

<script>

const API =
'https://script.google.com/macros/s/AKfycbyst7u_5xirD4DSu_2XccKTWWvik4h1xGxfuBveJGuWZmK0n-PHdUbfVvMFGoRvUVKB/exec?sheet=ICMS';

let DATA = [];

let PAGE_HISTORY = [];

loadData();

function saveHistory(){

  PAGE_HISTORY.push(
    document.getElementById('content')
      .innerHTML
  );

}

function goBack(){

  if(PAGE_HISTORY.length > 0){

    const lastPage =
      PAGE_HISTORY.pop();

    document.getElementById('content')
      .innerHTML = lastPage;

  }

}

function loadData(){

  document.getElementById('loading')
    .style.display = 'block';

  fetch(API)
  .then(res => res.json())
  .then(data => {

    DATA = data.map(x => ({

      tram:
        x.tram || '',

      mawo:
        x.mawo || x.wo || '',

      dauviec:
        x.dauviec || x.dv || '',

      thoigian:
        Number(x.thoigian) || 0,

      mota:
        x.mota || '',

      danhmuc:
        x.danhmuc || '',

      tth:
        x.tth || '',

      wo_vvc:
        x.wo_vvc || '',

      wo_vtnet:
        x.wo_vtnet || '',

      nhanvien_tao:
        x.nhanvien_tao || '',

      nhanvien:
        x.nhanvien || '',

      type:
        x.type || '',

      danhgia:
        Number(x.thoigian) < 0
          ? 'Quá hạn'
          : 'Trong hạn'

    }));

    document.getElementById('loading')
      .style.display = 'none';

  });

}

function reloadData(){

  DATA = [];

  document.getElementById('content')
    .innerHTML = '';

  PAGE_HISTORY = [];

  loadData();

}

function showType(type){

  saveHistory();

  const content =
    document.getElementById('content');

  const list =
    DATA.filter(x =>

      String(x.type)
      .toLowerCase()
      ==
      String(type)
      .toLowerCase()

    );

  const tths =
    [...new Set(list.map(x => x.tth))];

  let html = '';

  tths.forEach(tth => {

    const tthData =
      list.filter(x => x.tth == tth);

    const quaHan =
      tthData.filter(
        x => x.danhgia == 'Quá hạn'
      );

    const trongHan =
      tthData.filter(
        x => x.danhgia == 'Trong hạn'
      );

    html += `
      <div class="card">

        <div class="group-title">
          ${tth}
        </div>

        <button class="sub-btn"
          onclick="
            showCategory(
              '${type}',
              '${tth}',
              'Quá hạn'
            )
          ">

          Quá hạn (${quaHan.length})

        </button>

        <button class="sub-btn"
          onclick="
            showCategory(
              '${type}',
              '${tth}',
              'Trong hạn'
            )
          ">

          Trong hạn (${trongHan.length})

        </button>

      </div>
    `;

  });

  content.innerHTML = html;

}

function showCategory(
  type,
  tth,
  status
){

  saveHistory();

  const content =
    document.getElementById('content');

  let list =
    DATA.filter(x =>

      String(x.type)
      .toLowerCase()
      ==
      String(type)
      .toLowerCase()

      &&

      x.tth == tth

    );

  list =
    list.filter(
      x => x.danhgia == status
    );

  const categories =
    [...new Set(
      list.map(x => x.danhmuc)
    )];

  let html = `
    <div class="card">

      <div class="group-title">
        ${type}
        /
        ${tth}
        /
        ${status}
      </div>
  `;

  categories.forEach(cat => {

    const count =
      list.filter(
        x => x.danhmuc == cat
      ).length;

    html += `
      <button class="sub-btn"

        onclick="
          showList(
            '${type}',
            '${tth}',
            '${status}',
            '${cat}'
          )
        ">

        ${cat}
        (${count})

      </button>
    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

function showList(
  type,
  tth,
  status,
  category
){

  saveHistory();

  const content =
    document.getElementById('content');

  let list =
    DATA.filter(x =>

      String(x.type)
      .toLowerCase()
      ==
      String(type)
      .toLowerCase()

      &&

      x.tth == tth &&
      x.danhmuc == category &&
      x.danhgia == status

    );

  list.sort(
    (a,b) =>
      a.thoigian - b.thoigian
  );

  let html = `
    <div class="card">

      <div class="group-title">
        ${category}
      </div>
  `;

  list.forEach(item => {

    html += `

      <div class="item">

        <p>
          <b>Trạm:</b>
          ${item.tram}
        </p>

        <p style="
          color:
            ${String(item.mawo)
              .toLowerCase()
              .includes('chưa sinh')
              ? '#00b0f0'
              : '#000'};

          font-weight:bold;
        ">

          <b>Mã wo:</b>
          ${item.mawo || 'Chưa sinh wo'}

        </p>

        <p>
          <b>Đầu việc:</b>
          ${item.dauviec || ''}
        </p>

        <p>
          <b>Nhân viên:</b>
          ${item.nhanvien}
        </p>

        <p class="
          ${item.thoigian < 0
            ? 'red'
            : 'green'}
        ">
          <b>Thời gian tồn:</b>
          ${item.thoigian} ngày
        </p>

        <p>
          <b>Mô tả:</b>
          ${item.mota}
        </p>

        <p style="
          color:
            ${String(item.wo_vtnet)
              .includes('Chờ CD duyệt')
              ? '#ff9900'
              : '#000'};

          font-weight:
            ${String(item.wo_vtnet)
              .includes('Chờ CD duyệt')
              ? 'bold'
              : 'normal'};
        ">
          <b>Trạng thái wo vtnet:</b>
          ${item.wo_vtnet}
        </p>

        <p>
          <b>Trạng thái wo vcc:</b>
          ${item.wo_vvc}
        </p>

        <p>
          <b>Nhân viên tạo:</b>
          ${item.nhanvien_tao}
        </p>

      </div>

    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

function showChoCD(){

  saveHistory();

  const content =
    document.getElementById('content');

  let list =
    DATA.filter(x =>

      String(x.wo_vtnet)
      .toLowerCase()
      .includes('chờ cd duyệt')

    );

  list.sort(
    (a,b) =>
      a.thoigian - b.thoigian
  );

  let html = `

    <div class="card">

      <div class="group-title">
        WO FT CHỜ CD DUYỆT
      </div>

  `;

  list.forEach(item => {

    html += `

      <div class="item">

        <p>
          <b>Trạm:</b>
          ${item.tram}
        </p>

        <p>
          <b>Mã wo:</b>
          ${item.mawo}
        </p>

        <p>
          <b>Đầu việc:</b>
          ${item.dauviec}
        </p>

        <p class="red">
          <b>Thời gian tồn:</b>
          ${item.thoigian} ngày
        </p>

        <p style="
          color:#ff9900;
          font-weight:bold;
        ">
          <b>WO VTNET:</b>
          ${item.wo_vtnet}
        </p>

      </div>

    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

function showTimelineTTH(){

  saveHistory();

  const content =
    document.getElementById('content');

  const list =
    DATA.filter(x =>

      String(x.type)
      .toLowerCase()
      .includes('inos')

    );

  const tths =
    [...new Set(
      list.map(x => x.tth)
    )];

  let html = `

    <div class="card">

      <div class="group-title">
        TIMELINE TTH INOS
      </div>

  `;

  tths.forEach(tth => {

    const tthData =
      list.filter(x => x.tth == tth);

    const quaHan =
      tthData.filter(
        x => x.danhgia == 'Quá hạn'
      ).length;

    const trongHan =
      tthData.filter(
        x => x.danhgia == 'Trong hạn'
      ).length;

    html += `

      <div style="
        margin-bottom:20px;
      ">

        <b>${tth}</b>

        <div style="
          margin-top:5px;
        ">

          <small>
            Quá hạn:
            ${quaHan}
          </small>

          <div style="
            height:14px;
            width:${quaHan * 3}px;
            background:red;
            border-radius:10px;
          "></div>

        </div>

        <div style="
          margin-top:5px;
        ">

          <small>
            Trong hạn:
            ${trongHan}
          </small>

          <div style="
            height:8px;
            width:${trongHan * 3}px;
            background:green;
            border-radius:10px;
          "></div>

        </div>

      </div>

    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

function showTimelineDV(){

  saveHistory();

  const content =
    document.getElementById('content');

  const list =
    DATA.filter(x =>

      String(x.type)
      .toLowerCase()
      .includes('inos')

    );

  const dvs =
    [...new Set(
      list.map(x => x.dauviec)
    )];

  let html = `

    <div class="card">

      <div class="group-title">
        TIMELINE ĐẦU VIỆC INOS
      </div>

  `;

  dvs.forEach(dv => {

    const count =
      list.filter(
        x => x.dauviec == dv
      ).length;

    html += `

      <div style="
        margin-bottom:20px;
      ">

        <b>${dv}</b>

        <div style="
          margin-top:5px;
          height:10px;
          width:${count * 4}px;
          background:#0b5394;
          border-radius:10px;
        "></div>

        <small>
          ${count} công việc
        </small>

      </div>

    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

function searchData(){

  saveHistory();

  const keyword =
    document.getElementById('searchInput')
      .value
      .toLowerCase()
      .trim();

  const content =
    document.getElementById('content');

  if(keyword == ''){

    content.innerHTML = '';

    return;

  }

  let list =
    DATA.filter(x =>

      String(x.tram)
        .toLowerCase()
        .includes(keyword)

      ||

      String(x.tth)
        .toLowerCase()
        .includes(keyword)

      ||

      String(x.danhmuc)
        .toLowerCase()
        .includes(keyword)

      ||

      String(x.mawo)
        .toLowerCase()
        .includes(keyword)

      ||

      String(x.nhanvien)
        .toLowerCase()
        .includes(keyword)

      ||

      String(x.dauviec)
        .toLowerCase()
        .includes(keyword)

    );

  list.sort(
    (a,b) =>
      a.thoigian - b.thoigian
  );

  let html = `

    <div class="card">

      <div class="group-title">
        KẾT QUẢ TÌM KIẾM
        (${list.length})
      </div>

  `;

  list.forEach(item => {

    html += `

      <div class="item">

        <p>
          <b>Trạm:</b>
          ${item.tram}
        </p>

        <p style="
          color:
            ${String(item.mawo)
              .toLowerCase()
              .includes('chưa sinh')
              ? '#00b0f0'
              : '#000'};

          font-weight:bold;
        ">

          <b>Mã wo:</b>
          ${item.mawo || 'Chưa sinh wo'}

        </p>

        <p>
          <b>Huyện:</b>
          ${item.tth}
        </p>

        <p>
          <b>Danh mục:</b>
          ${item.danhmuc}
        </p>

        <p>
          <b>Đầu việc:</b>
          ${item.dauviec}
        </p>

        <p>
          <b>Nhân viên:</b>
          ${item.nhanvien}
        </p>

        <p class="
          ${item.thoigian < 0
            ? 'red'
            : 'green'}
        ">
          <b>Thời gian tồn:</b>
          ${item.thoigian} ngày
        </p>

        <p>
          <b>Mô tả:</b>
          ${item.mota}
        </p>

      </div>

    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

</script>

</body>
</html>
