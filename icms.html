<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  font-family:Arial;
  background:#f1f3f4;
  overflow-x:hidden;
}

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:1000;
  background:#0b5394;
  color:white;
  padding:8px;
  text-align:center;
  font-size:16px;
  font-weight:bold;
}
  
.container{
  padding:8px;
  max-width:500px;
  margin:auto;
}
  
.fixed-space{
  height:200px;
}
  
.top-box{
  display:grid;
  grid-template-columns:
    repeat(3,1fr);
  gap:4px;
  margin-bottom:4px;
}

.main-btn{
  width:100%;
  height:34px;
  border:none;
  border-radius:8px;
  background:#0b5394;
  color:white;
  font-size:10px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:2px 4px;
  box-sizing:border-box;
}

.card{
  background:white;
  padding:8px;
  border-radius:12px;
  margin-bottom:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  overflow:hidden;
}

.group-title{
  font-size:14px;
  font-weight:bold;
  margin-bottom:16px;
  color:#0b5394;
}

.sub-btn{
  width:100%;
  border:none;
  padding:6px 10px;
  margin-bottom:4px;
  border-radius:8px;
  background:#e8f0fe;
  text-align:left;
  font-weight:bold;
  font-size:12px;
  min-height:32px;
  display:flex;
  align-items:center;
  box-sizing:border-box;
}

.item{
  background:white;
  border-left:4px solid red;
  padding:8px;
  border-radius:8px;
  margin-bottom:8px;
}

.item p{
  margin:4px 0;
  font-size:14px;
}

.red{
  color:red;
  font-weight:bold;
}

.green{
  color:green;
  font-weight:bold;
}

#loading{
  text-align:center;
  padding:4px;
  font-size:10px;
}
.fixed-top{
  position:fixed;
  top:0px;
  left:0;
  right:0;
  z-index:999;
  background:#f1f3f4;
  padding:6px;
  box-shadow:
  0 2px 5px rgba(0,0,0,0.08);
  max-width:500px;
  margin:auto;
}

</style>
</head>

<body>
<div class="container">
  <div class="fixed-top">
  <button class="main-btn"
    onclick="reloadData()"
  style="
    margin-bottom:4px;
    background:green;
    padding:4px;
    font-size:10px;
    height:34px;
  ">
    LOAD LẠI DỮ LIỆU
  </button>
  <div class="top-box">

    <button class="main-btn"
      onclick="showType('InOS')">
      INOS
    </button>

    <button class="main-btn"
      onclick="showType('OutOS')">
      OUT OS
    </button>

    <button class="main-btn"
      style="background:#ff9900"
      onclick="showChoCD()">
      WO FT CHỜ CD DUYỆT
    </button>

    <button class="main-btn"
      style="background:#6a1b9a"
      onclick="showTimelineTTH()">
      BIỂU ĐỒ TTH
    </button>

    <button class="main-btn"
      style="background:#00897b"
      onclick="showTimelineDV()">
      BIỂU ĐỒ ĐẦU VIỆC
    </button>
  
  </div>

  <div id="loading">
    ⏳ Đang tải dữ liệu... vui lòng chờ!
  </div>

  <input
  type="text"
  id="searchInput"
  placeholder="Tìm: Trạm, Huyện, Danh mục, Wo, Nhân viên..."
  onkeyup="searchData()"
  style="
    width:100%;
    box-sizing:border-box;
    padding:6px 8px;
    border-radius:8px;
    border:1px solid #ccc;
    background:white;
    color:black;
    font-size:12px;
    margin-top:6px;
  "
>
  <button
    onclick="goBack()"
    style="
      width:100%;
      margin-top:4px;
      border:none;
      padding:5px 8px;
      border-radius:8px;
      background:#666;
      color:white;
      font-size:10px;
      font-weight:bold;
    "
  >
    ← BACK
  </button>
  
</div>
<div class="fixed-space"></div>
<div id="content"></div>
</div>

<script>

const API =
'https://script.google.com/macros/s/AKfycbyst7u_5xirD4DSu_2XccKTWWvik4h1xGxfuBveJGuWZmK0n-PHdUbfVvMFGoRvUVKB/exec?sheet=ICMS';

let DATA = [];

let PAGE_HISTORY = [];

loadData();

function saveHistory(){

  PAGE_HISTORY.push(
    document.getElementById('content')
      .innerHTML
  );

}

function goBack(){

  if(PAGE_HISTORY.length > 0){

    const lastPage =
      PAGE_HISTORY.pop();

    document.getElementById('content')
      .innerHTML = lastPage;

  }

}

function loadData(){

  document.getElementById('loading')
    .style.display = 'block';

  fetch(API)
  .then(res => res.json())
  .then(data => {

    DATA = data.map(x => ({

      tram:
        x.tram || '',

      mawo:
        x.mawo || x.wo || '',

      dauviec:
        x.dauviec || x.dv || '',

      thoigian:
        Number(x.thoigian) || 0,

      mota:
        x.mota || '',

      danhmuc:
        x.danhmuc || '',

      tth:
        x.tth || '',

      wo_vvc:
        x.wo_vvc || '',

      wo_vtnet:
        x.wo_vtnet || '',

      nhanvien_tao:
        x.nhanvien_tao || '',

      nhanvien:
        x.nhanvien || '',

      type:
        x.type || '',

      danhgia:
        Number(x.thoigian) < 0
          ? 'Quá hạn'
          : 'Trong hạn'

    }));

    document.getElementById('loading')
      .style.display = 'none';

  });

}

function reloadData(){

  DATA = [];

  document.getElementById('content')
    .innerHTML = '';

  PAGE_HISTORY = [];

  loadData();

}

function showType(type){

  saveHistory();

  const content =
    document.getElementById('content');

  const list =
    DATA.filter(x =>

      String(x.type)
      .toLowerCase()
      ==
      String(type)
      .toLowerCase()

    );

  const tths =
    [...new Set(list.map(x => x.tth))];

  let html = '';

  tths.forEach(tth => {

    const tthData =
      list.filter(x => x.tth == tth);

    const quaHan =
      tthData.filter(
        x => x.danhgia == 'Quá hạn'
      );

    const trongHan =
      tthData.filter(
        x => x.danhgia == 'Trong hạn'
      );

    html += `
      <div class="card">

        <div class="group-title">
          ${tth}
        </div>

        <button class="sub-btn"
          onclick="
            showCategory(
              '${type}',
              '${tth}',
              'Quá hạn'
            )
          ">

          Quá hạn (${quaHan.length})

        </button>

        <button class="sub-btn"
          onclick="
            showCategory(
              '${type}',
              '${tth}',
              'Trong hạn'
            )
          ">

          Trong hạn (${trongHan.length})

        </button>

      </div>
    `;

  });

  content.innerHTML = html;

}

function showCategory(
  type,
  tth,
  status
){

  saveHistory();

  const content =
    document.getElementById('content');

  let list =
    DATA.filter(x =>

      String(x.type)
      .toLowerCase()
      ==
      String(type)
      .toLowerCase()

      &&

      x.tth == tth

    );

  list =
    list.filter(
      x => x.danhgia == status
    );

  const categories =
    [...new Set(
      list.map(x => x.danhmuc)
    )];

  let html = `
    <div class="card">

      <div class="group-title">
        ${type}
        /
        ${tth}
        /
        ${status}
      </div>
  `;

  categories.forEach(cat => {

    const count =
      list.filter(
        x => x.danhmuc == cat
      ).length;

    html += `
      <button class="sub-btn"

        onclick="
          showList(
            '${type}',
            '${tth}',
            '${status}',
            '${cat}'
          )
        ">

        ${cat}
        (${count})

      </button>
    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

function showList(
  type,
  tth,
  status,
  category
){

  saveHistory();

  const content =
    document.getElementById('content');

  let list =
    DATA.filter(x =>

      String(x.type)
      .toLowerCase()
      ==
      String(type)
      .toLowerCase()

      &&

      x.tth == tth &&
      x.danhmuc == category &&
      x.danhgia == status

    );

  list.sort(
    (a,b) =>
      a.thoigian - b.thoigian
  );

  let html = `
    <div class="card">

      <div class="group-title">
        ${category}
      </div>
  `;

  list.forEach(item => {

    html += `

      <div class="item">

        <p>
          <b>Trạm, tuyến, tủ:</b>
          ${item.tram}
        </p>

        <p style="
          color:
            ${String(item.mawo)
              .toLowerCase()
              .includes('chưa sinh')
              ? '#00b0f0'
              : '#000'};

          font-weight:bold;
        ">

          <b>Mã wo:</b>
          ${item.mawo || 'Chưa sinh wo'}
        </p>

        <p>
            <b>Loại công việc:</b>
            <span style="
              color:
                ${String(item.type)
                  .toLowerCase()
                  .includes('inos')
                  ? '#0b5394'
                  : '#ff6600'};
          
              font-weight:bold;
            ">
              ${item.type}
            </span> 
        </p>
        
        <p>
          <b>Đầu việc:</b>
          ${item.dauviec || ''}
        </p>

        <p>
          <b>Nhân viên:</b>
          ${item.nhanvien}
        </p>

        <p class="
          ${item.thoigian < 0
            ? 'red'
            : 'green'}
        ">
          <b>Thời gian tồn:</b>
          ${item.thoigian} ngày
        </p>

        <p>
          <b>Mô tả:</b>
          ${item.mota}
        </p>

        <p style="
          color:
            ${String(item.wo_vtnet)
              .includes('Chờ CD duyệt')
              ? '#ff9900'
              : '#000'};

          font-weight:
            ${String(item.wo_vtnet)
              .includes('Chờ CD duyệt')
              ? 'bold'
              : 'normal'};
        ">
          <b>Trạng thái wo vtnet:</b>
          ${item.wo_vtnet}
        </p>

        <p>
          <b>Trạng thái wo vcc:</b>
          ${item.wo_vvc}
        </p>

        <p>
          <b>Nhân viên tạo:</b>
          ${item.nhanvien_tao}
        </p>

      </div>

    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

function showChoCD(){

  saveHistory();

  const content =
    document.getElementById('content');

  let list =
    DATA.filter(x =>
  
      String(x.wo_vvc)
      .toLowerCase()
      .includes('chờ cd duyệt')
  );

  list.sort(
    (a,b) =>
      a.thoigian - b.thoigian
  );

  let html = `

    <div class="card">

      <div class="group-title">
        WO FT ĐÓNG CHỜ CD DUYỆT
      </div>

  `;

  list.forEach(item => {

    html += `

      <div class="item">

        <p>
          <b>Trạm, tuyến, tủ:</b>
          ${item.tram}
        </p>

        <p>
          <b>Mã wo:</b>
          ${item.mawo}
        </p>

        <p>
          <b>Loại công việc:</b>
          <span style="
            color:
              ${String(item.type)
                .toLowerCase()
                .includes('inos')
                ? '#0b5394'
                : '#ff6600'}; 
              font-weight:bold;
            ">
              ${item.type}
            </span> 
        </p>
          
        <p>
          <b>Đầu việc:</b>
          ${item.dauviec}
        </p>

        <p class="red">
          <b>Thời gian tồn:</b>
          ${item.thoigian} ngày
        </p>

        <p style="
          color:#ff9900;
          font-weight:bold;
        ">
        <b>WO VCC:</b>
        ${item.wo_vvc}
        </p>

      </div>

    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

function showTimelineTTH(){

  saveHistory();

  const content =
    document.getElementById('content');

  const list =
    DATA.filter(x =>

      String(x.type)
      .toLowerCase()
      .includes('inos')

    );

  const tths =
    [...new Set(
      list.map(x => x.tth)
    )];

  let html = `

    <div class="card">

      <div class="group-title">
        BIỂU ĐỒ TTH HẠNG MỤC INOS
      </div>

  `;

  tths.forEach(tth => {

    const tthData =
      list.filter(x => x.tth == tth);

    const quaHan =
      tthData.filter(
        x => x.danhgia == 'Quá hạn'
      ).length;

    const trongHan =
      tthData.filter(
        x => x.danhgia == 'Trong hạn'
      ).length;

    html += `
        <div style="
          margin-bottom:12px;
        ">
        
          <div style="
            display:flex;
            justify-content:space-between;
            align-items:center;
        
            font-size:12px;
            font-weight:bold;
        
            margin-bottom:4px;
          ">
        
            <span style="
              color:#0b5394;
            ">
              ${tth}
            </span>
        
            <span>
        
              <span style="
                color:red;
              ">
                QH ${quaHan}
              </span>
        
              |
        
              <span style="
                color:green;
              ">
                TH ${trongHan}
              </span>
        
            </span>
        
          </div>
        
          <div style="
            display:flex;
        
            width:100%;
        
            height:10px;
        
            border-radius:20px;
        
            overflow:hidden;
        
            background:#ddd;
          ">
        
            <div
        
              onclick="
                showTTHDetail(
                  '${tth}',
                  'Quá hạn'
                )
              "
        
              style="
                width:${(
                  quaHan /
                  (quaHan + trongHan)
                ) * 100}%;
        
                background:#ff3b30;
        
                cursor:pointer;
              "
        
            ></div>
        
            <div
        
              onclick="
                showTTHDetail(
                  '${tth}',
                  'Trong hạn'
                )
              "
        
              style="
                width:${(
                  trongHan /
                  (quaHan + trongHan)
                ) * 100}%;
        
                background:#34c759;
        
                cursor:pointer;
              "
        
            ></div>
        
          </div>
        
        </div>
    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

function showTimelineDV(){

  saveHistory();

  const content =
    document.getElementById('content');

  const list =
    DATA.filter(x =>

      String(x.type)
      .toLowerCase()
      .includes('inos')

    );

  const dvs =
    [...new Set(
      list.map(x =>

        x.dauviec &&
        String(x.dauviec).trim() != ''
          ? x.dauviec
          : 'Đầu việc trống'

      )
    )];

  let html = `

    <div class="card">

      <div class="group-title">
        BIỂU ĐỒ ĐẦU VIỆC HẠNG MỤC INOS
      </div>

  `;

  dvs.forEach(dv => {

    const quaHan =
      list.filter(x => {

        const value =

          x.dauviec &&
          String(x.dauviec).trim() != ''
            ? x.dauviec
            : 'Đầu việc trống';

        return (
          value == dv
          &&
          x.danhgia == 'Quá hạn'
        );

      }).length;

    const trongHan =
      list.filter(x => {

        const value =

          x.dauviec &&
          String(x.dauviec).trim() != ''
            ? x.dauviec
            : 'Đầu việc trống';

        return (
          value == dv
          &&
          x.danhgia == 'Trong hạn'
        );

      }).length;

    const tong =
      quaHan + trongHan;

    html += `

      <div style="
        margin-bottom:20px;
      ">

        <button

          onclick="
            showDVDetail(
              '${String(dv)
                .replace(/'/g,'')
                .replace(/"/g,'')
              }'
            )
          "

          style="
            width:100%;
            border:none;
            background:white;
            text-align:left;

            padding:0;
            margin:0;

            cursor:pointer;
          "

        >

          <b style="
            font-size:16px;
            color:#0b5394;
          ">
            ${dv}
          </b>

          <div style="
            margin-top:2px;
            margin-bottom:6px;

            font-size:11px;
            color:#666;
          ">

            Tổng:
            <b>${tong}</b>

            |

            <span style="color:red">
              Quá hạn:
              <b>${quaHan}</b>
            </span>

            |

            <span style="color:green">
              Trong hạn:
              <b>${trongHan}</b>
            </span>

          </div>

          <div style="
            margin-top:5px;
          ">

            <div style="
              height:8px;

              width:${Math.max(
                Math.min(quaHan * 0.5, 100),
                5
              )}%;

              background:red;

              border-radius:10px;
            "></div>

          </div>

          <div style="
            margin-top:5px;
          ">

            <div style="
              height:8px;

              width:${Math.max(
                Math.min(trongHan * 0.5, 100),
                5
              )}%;

              background:green;

              border-radius:10px;
            "></div>

          </div>

        </button>

      </div>

    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

function searchData(){

  saveHistory();

  const keyword =
    document.getElementById('searchInput')
      .value
      .toLowerCase()
      .trim();

  const content =
    document.getElementById('content');

  if(keyword == ''){

    content.innerHTML = '';

    return;

  }

  let list =
    DATA.filter(x =>

      String(x.tram)
        .toLowerCase()
        .includes(keyword)

      ||

      String(x.tth)
        .toLowerCase()
        .includes(keyword)

      ||

      String(x.danhmuc)
        .toLowerCase()
        .includes(keyword)

      ||

      String(x.mawo)
        .toLowerCase()
        .includes(keyword)

      ||

      String(x.nhanvien)
        .toLowerCase()
        .includes(keyword)

      ||

      String(x.dauviec)
        .toLowerCase()
        .includes(keyword)

    );

  list.sort(
    (a,b) =>
      a.thoigian - b.thoigian
  );

  let html = `

    <div class="card">

      <div class="group-title">
        KẾT QUẢ TÌM KIẾM
        (${list.length})
      </div>

  `;

  list.forEach(item => {

    html += `

      <div class="item">

        <p>
          <b>Trạm, tuyến, tủ:</b>
          ${item.tram}
        </p>

        <p style="
          color:
            ${String(item.mawo)
              .toLowerCase()
              .includes('chưa sinh')
              ? '#00b0f0'
              : '#000'};

          font-weight:bold;
        ">

          <b>Mã wo:</b>
          ${item.mawo || 'Chưa sinh wo'}
        </p>

        <p>
          <b>Loại công việc:</b>
          <span style="
            color:
              ${String(item.type)
                .toLowerCase()
                .includes('inos')
                ? '#0b5394'
                : '#ff6600'}; 
              font-weight:bold;
            ">
              ${item.type}
            </span> 
        </p>

        <p>
          <b>Huyện:</b>
          ${item.tth}
        </p>

        <p>
          <b>Danh mục:</b>
          ${item.danhmuc}
        </p>

        <p>
          <b>Đầu việc:</b>
          ${item.dauviec}
        </p>

        <p>
          <b>Nhân viên:</b>
          ${item.nhanvien}
        </p>

        <p class="
          ${item.thoigian < 0
            ? 'red'
            : 'green'}
        ">
          <b>Thời gian tồn:</b>
          ${item.thoigian} ngày
        </p>

        <p>
          <b>Mô tả:</b>
          ${item.mota}
        </p>

      </div>

    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

function showDVDetail(dv){

  saveHistory();

  const content =
    document.getElementById('content');

  let list =
    DATA.filter(x => {

      const value =

        x.dauviec &&
        String(x.dauviec).trim() != ''
          ? x.dauviec
          : 'Đầu việc trống';

      return value == dv;

    });

  list.sort(
    (a,b) =>
      a.thoigian - b.thoigian
  );

  let html = `

    <div class="card">

      <div class="group-title">
        ${dv}
        (${list.length})
      </div>

  `;

  list.forEach(item => {

    html += `

      <div class="item">

        <p>
          <b>Trạm, tuyến, tủ:</b>
          ${item.tram}
        </p>

        <p style="
          color:
            ${String(item.mawo)
              .toLowerCase()
              .includes('chưa sinh')
              ? '#00b0f0'
              : '#000'};

          font-weight:bold;
        ">

          <b>Mã wo:</b>
          ${item.mawo || 'Chưa sinh wo'}
        </p>

        <p>
          <b>Loại công việc:</b>
          <span style="
            color:
              ${String(item.type)
                .toLowerCase()
                .includes('inos')
                ? '#0b5394'
                : '#ff6600'}; 
              font-weight:bold;
            ">
              ${item.type}
            </span> 
        </p>

        <p>
          <b>Huyện:</b>
          ${item.tth}
        </p>

        <p>
          <b>Danh mục:</b>
          ${item.danhmuc}
        </p>

        <p>
          <b>Đầu việc:</b>
          ${dv}
        </p>

        <p>
          <b>Nhân viên:</b>
          ${item.nhanvien}
        </p>

        <p class="
          ${item.thoigian < 0
            ? 'red'
            : 'green'}
        ">
          <b>Thời gian tồn:</b>
          ${item.thoigian} ngày
        </p>

        <p>
          <b>Mô tả:</b>
          ${item.mota}
        </p>

      </div>

    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

function showTTHDetail(
  tth,
  status
){

  saveHistory();

  const content =
    document.getElementById('content');

  let list =
    DATA.filter(x =>

      String(x.type)
      .toLowerCase()
      .includes('inos')

      &&

      x.tth == tth

      &&

      x.danhgia == status

    );

  list.sort(
    (a,b) =>
      a.thoigian - b.thoigian
  );

  let html = `

    <div class="card">

      <div class="group-title">
        ${tth}
        /
        ${status}
        (${list.length})
      </div>

  `;

  list.forEach(item => {

    html += `

      <div class="item">

        <p>
          <b>Trạm, tuyến, tủ:</b>
          ${item.tram}
        </p>

        <p style="
          color:
            ${String(item.mawo)
              .toLowerCase()
              .includes('chưa sinh')
              ? '#00b0f0'
              : '#000'};

          font-weight:bold;
        ">

          <b>Mã WO:</b>
          ${item.mawo}
        </p>

        <p>
          <b>Loại công việc:</b>
          <span style="
            color:
              ${String(item.type)
                .toLowerCase()
                .includes('inos')
                ? '#0b5394'
                : '#ff6600'}; 
              font-weight:bold;
            ">
              ${item.type}
            </span> 
        </p>

        <p>
          <b>Danh mục:</b>
          ${item.danhmuc}
        </p>

        <p>
          <b>Đầu việc:</b>
          ${item.dauviec || 'Đầu việc trống'}
        </p>

        <p>
          <b>Nhân viên:</b>
          ${item.nhanvien}
        </p>

        <p class="
          ${item.thoigian < 0
            ? 'red'
            : 'green'}
        ">
          <b>Thời gian tồn:</b>
          ${item.thoigian} ngày
        </p>

        <p>
          <b>Mô tả:</b>
          ${item.mota}
        </p>

      </div>

    `;

  });

  html += '</div>';

  content.innerHTML = html;

}

</script>
