<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Nhập liệu account</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
padding:20px;
}

.form{

max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;

}

h2{
margin-top:0;
}

input,
textarea,
select{

width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;

}

textarea{
min-height:100px;
resize:vertical;
}

button{

width:100%;
padding:14px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

.readonly{

background:#f3f4f6;

}

</style>

</head>

<body>

<div class="form">

<h2>Nhập liệu account</h2>

<label>Account</label>

<input
id="account"
class="readonly"
readonly
>

<label>Ngày gốc</label>

<input
id="ngay_goc"
class="readonly"
readonly
>

<label>Loại dữ liệu</label>

<input
id="loai_du_lieu"
class="readonly"
readonly
>

<label>Nhân viên xử lý</label>

<input id="nv_xuly">

<label>Loại WO</label>

<select id="loai_wo">

<option value="">
-- Chọn --
</option>

<option>
HOME KÉM
</option>

<option>
PORT KÉM
</option>

</select>

<label>Nguyên nhân bypass</label>

<textarea id="nguyen_nhan"></textarea>

<label>Chi tiết bypass</label>

<textarea id="chitiet_bypass"></textarea>

<label>Thiết bị</label>

<input id="thietbi">

<label>Serial HWF</label>

<input id="serial_hwf">

<button onclick="saveData()">

Lưu dữ liệu

</button>

</div>

<script>

/* =========================
   API
========================= */

const API =
"YOUR_API_URL";

/* =========================
   GET PARAMS
========================= */

const params =
new URLSearchParams(location.search);

document.getElementById("account").value =
params.get("account") || "";

document.getElementById("ngay_goc").value =
params.get("ngay") || "";

document.getElementById("loai_du_lieu").value =
params.get("loai") || "";

/* =========================
   SAVE
========================= */

async function saveData(){

try{

const data={

nv_xuly:
document.getElementById("nv_xuly").value,

account:
document.getElementById("account").value,

ngay_goc:
document.getElementById("ngay_goc").value,

loai_du_lieu:
document.getElementById("loai_du_lieu").value,

loai_wo:
document.getElementById("loai_wo").value,

nguyen_nhan:
document.getElementById("nguyen_nhan").value,

chitiet_bypass:
document.getElementById("chitiet_bypass").value,

thietbi:
document.getElementById("thietbi").value,

serial_hwf:
document.getElementById("serial_hwf").value,

user_update:"web"

};

const res = await fetch(API,{

method:"POST",

body:JSON.stringify(data)

});

const json =
await res.json();

if(json.success){

alert("Đã lưu dữ liệu");

}else{

alert(json.error || "Lỗi");

}

}catch(err){

alert(err);

}

}

</script>

</body>

</html>
