<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Kho vật tư</title>

<style>

body{
  margin:0;
  padding:10px;
  font-family:Arial;
  background:#f4f6f9;
}

h2{
  margin:0;
}

.update-time{
  color:#666;
  margin:6px 0 12px;
  font-size:14px;
}

.topbar{
  display:flex;
  gap:10px;
  margin-bottom:10px;
  flex-wrap:wrap;
}

input,select{
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  padding:8px 14px;
  border:none;
  background:#1976d2;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.card{
  background:white;
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  margin-bottom:10px;
}

.stat{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
}

.stat h3{
  margin:0;
  font-size:14px;
  color:#666;
}

.stat p{
  margin:8px 0 0;
  font-size:24px;
  font-weight:bold;
}

.table-wrap{
  overflow:auto;
  background:white;
  border-radius:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:800px;
}

th{
  background:#1976d2;
  color:white;
  position:sticky;
  top:0;
}

th,td{
  padding:8px;
  border:1px solid #ddd;
  font-size:14px;
}

tr:nth-child(even){
  background:#fafafa;
}

.loading{
  padding:30px;
  text-align:center;
}

.type-filters{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

.type-btn{
  background:#e0e0e0;
  color:#333;
  font-weight:bold;
}

.type-btn.active{
  background:#1976d2;
  color:white;
}

@media(max-width:768px){

  body{
    padding:5px;
  }

  th,td{
    font-size:12px;
    padding:6px;
  }

}

</style>
</head>

<body>

<h2>📦 Kho vật tư</h2>

<div class="update-time">
  Cập nhật lần cuối:
  <span id="lastUpdate">--</span>
</div>

<div class="stats">

  <div class="stat">
    <h3>Tổng bản ghi</h3>
    <p id="tong">0</p>
  </div>

  <div class="stat">
    <h3>Tổng số lượng</h3>
    <p id="tongsl">0</p>
  </div>

</div>

<div class="card">

  <div class="topbar">

    <input
      type="text"
      id="search"
      placeholder="Tìm mặt hàng..."
    >

    <select id="huyenFilter">
      <option value="">Tất cả huyện</option>
    </select>

    <button onclick="reloadAll()">
      Reload
    </button>

  </div>

  <div
    class="type-filters"
    id="loaiFilters">
  </div>

</div>

<div class="table-wrap">

<table>

<thead>
<tr>
  <th>Mặt hàng</th>
  <th>ĐVT</th>
  <th>SL</th>
  <th>Nhân viên</th>
  <th>Huyện</th>
  <th>Loại MH</th>
</tr>
</thead>

<tbody id="tbody">

<tr>
<td colspan="6" class="loading">
Đang tải dữ liệu...
</td>
</tr>

</tbody>

</table>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyqb1Qf8YHiaPvlFKAX872-o6sf6a_GcQCy_2l9poMeYXyePFEjKnxTtpJHImaAQ0JTVg/exec?sheet=Data%20kho";

let allData = [];

let currentLoaiMH = "";

async function loadData(){

  try{

    const res = await fetch(API_URL);

    const json = await res.json();

    allData = json.data || [];

    allData.reverse();

    renderTable(allData);

    renderStats(allData);

    renderHuyen(allData);

    renderLoaiMH(allData);

  }catch(err){

    document.getElementById("tbody").innerHTML = `
      <tr>
        <td colspan="6" class="loading">
          Lỗi tải dữ liệu
        </td>
      </tr>
    `;

    console.log(err);
  }
}

function renderTable(data){

  if(data.length === 0){

    document.getElementById("tbody").innerHTML = `
      <tr>
        <td colspan="6" class="loading">
          Không có dữ liệu
        </td>
      </tr>
    `;

    return;
  }

  let html = "";

  data.forEach(item => {

    html += `
      <tr>
        <td>${item.mh || ""}</td>
        <td>${item.dv || ""}</td>
        <td>${item.sl || 0}</td>
        <td>${item.nv || ""}</td>
        <td>${item.huyen || ""}</td>
        <td>${item.loaimh || ""}</td>
      </tr>
    `;
  });

  document.getElementById("tbody").innerHTML = html;

  let last = data[0].tg || "--";

  document.getElementById("lastUpdate")
    .innerText = last;
}

function renderStats(data){

  document.getElementById("tong").innerText =
    data.length;

  let tongsl = 0;

  data.forEach(i => {

    tongsl += Number(i.sl || 0);

  });

  document.getElementById("tongsl").innerText =
    tongsl;
}

function renderHuyen(data){

  let arr = [...new Set(
    data.map(i => i.huyen).filter(Boolean)
  )];

  arr.sort();

  let html =
    `<option value="">Tất cả huyện</option>`;

  arr.forEach(h => {

    html += `
      <option value="${h}">
        ${h}
      </option>
    `;
  });

  document.getElementById("huyenFilter").innerHTML =
    html;
}

function renderLoaiMH(data){

  let arr = [...new Set(
    data.map(i => i.loaimh).filter(Boolean)
  )];

  arr.sort();

  let html = `
    <button
      class="type-btn active"
      data-type=""
      onclick="selectType(this)">
      Tất cả
    </button>
  `;

  arr.forEach(loai => {

    html += `
      <button
        class="type-btn"
        data-type="${loai}"
        onclick="selectType(this)">
        ${loai}
      </button>
    `;
  });

  document.getElementById("loaiFilters")
    .innerHTML = html;
}

function selectType(btn){

  document
    .querySelectorAll(".type-btn")
    .forEach(b => b.classList.remove("active"));

  btn.classList.add("active");

  currentLoaiMH = btn.dataset.type;

  filterData();
}

function filterData(){

  let keyword =
    document.getElementById("search")
    .value
    .toLowerCase();

  let huyen =
    document.getElementById("huyenFilter")
    .value;

  let filtered = allData.filter(i => {

    let okSearch =
      (i.mh || "")
      .toLowerCase()
      .includes(keyword);

    let okHuyen =
      !huyen || i.huyen === huyen;

    let okLoai =
      !currentLoaiMH ||
      i.loaimh === currentLoaiMH;

    return okSearch && okHuyen && okLoai;
  });

  renderTable(filtered);

  renderStats(filtered);
}

function reloadAll(){

  currentLoaiMH = "";

  document.getElementById("search").value = "";

  document.getElementById("huyenFilter").value = "";

  document
    .querySelectorAll(".type-btn")
    .forEach(b => b.classList.remove("active"));

  document
    .querySelector(".type-btn")
    .classList.add("active");

  renderTable(allData);

  renderStats(allData);
}

document
.getElementById("search")
.addEventListener("input", filterData);

document
.getElementById("huyenFilter")
.addEventListener("change", filterData);

loadData();

</script>

</body>
</html>
