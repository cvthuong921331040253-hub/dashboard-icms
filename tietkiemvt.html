<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#f5f7fb; padding:8px; }

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  background: #f5f7fb;
  z-index: 1000;
}

.header-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.reload-btn {
  padding:6px 10px;
  background:#2196f3;
  color:#fff;
  border:none;
  border-radius:6px;
}

/* ===== TABLE ===== */
.table-wrap {
  overflow:auto;
  max-height:400px;
  border:1px solid #ddd;
  border-radius:6px;
}

table {
  border-collapse: collapse;
  width:max-content;
  min-width:100%;
  border:2px solid #666;
}

th, td {
  border:1px solid #999;
  padding:6px 8px;
  font-size:13px;
  white-space:nowrap;
}

th { background:#e3f2fd; }

/* ===== STICKY FIX CHUẨN ===== */

/* Ô Huyện */
thead th[rowspan]{
  position: sticky;
  top:0;
  left:0;
  z-index:20;
  background:#d0e7ff;
  font-weight:bold;
}

/* header dòng 1 */
thead tr:first-child th{
  position: sticky;
  top:0;
  z-index:10;
}

/* header dòng 2 */
thead tr:nth-child(2) th{
  position: sticky;
  top:32px;
  z-index:9;
}

/* cột huyện body */
tbody td:first-child{
  position: sticky;
  left:0;
  background:#d0e7ff;
  z-index:5;
  font-weight:bold;
}

/* ===== CARD ===== */
.card {
  background:#fff;
  padding:8px;
  margin:6px 0;
  border-radius:6px;
}

.top { background:#e8f5e9; }
.worst { background:#ffeaea; }

.ok { color:green; }
.fail { color:red; font-weight:bold; }

/* ===== MOBILE ===== */
@media(max-width:768px){
  th,td{ font-size:11px; padding:4px }
  h2{ font-size:18px }
  h3{ font-size:14px }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-top">
    <h2>📊 KPI Khoán Vật Tư</h2>
    <button onclick="location.reload()" class="reload-btn">🔄</button>
  </div>

  <div id="logtime" style="font-size:12px"></div>

  🔍 NV <input id="nv" onkeyup="filter()">
  🔍 Huyện <input id="huyen" onkeyup="filter()">
</div>

<div id="tableSection">
  <h3>📊 Bảng huyện</h3>
  <div class="table-wrap">
    <table id="table"></table>
  </div>
</div>

<div id="topSection">
  <h3>🏆 Top 10 NV tốt</h3>
  <div id="top"></div>

  <h3>⚠️ Top 10 NV kém</h3>
  <div id="worst"></div>
</div>

<h3>📋 Danh sách nhân viên</h3>
<div id="list"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycby2YYZVK6r1QXP_TgnB0i99prYJmEG8cJwGDQILU1tph0i38b80BhN6Oa9bT5IMuQft0A/exec?sheet=Khoan vt";

let tableData=[], nvData=[];

function num(v){return Number(v||0).toLocaleString("vi-VN");}

function load(){
fetch(API).then(r=>r.json()).then(res=>{
let raw=res.data||[];

// logtime
let tg=raw[0]?.tg_update||"";
if(tg){ tg=new Date(tg).toLocaleString("vi-VN"); }
document.getElementById("logtime").innerText="🕒 "+tg;

// bảng
tableData=raw.slice(0,30);
nvData=raw.slice(30);

applyFilter();
});
}

function applyFilter(){
let nv=document.getElementById("nv").value.toLowerCase();
let h=document.getElementById("huyen").value.toLowerCase();

let isSearch=nv||h;

// ẩn top khi search
document.getElementById("topSection").style.display=
isSearch?"none":"block";

// ẩn bảng khi search NV
document.getElementById("tableSection").style.display=
nv?"none":"block";

// filter
let tableF=tableData.filter(r=>
(r.huyen||"").toLowerCase().includes(h)
);

let nvF=nvData.filter(r=>
(r.nhan_vien||"").toLowerCase().includes(nv)&&
(r.huyen||"").toLowerCase().includes(h)
);

renderTable(tableF);
renderTop(nvData);
renderWorst(nvData);
renderList(nvF);
}

function filter(){applyFilter();}

// ===== TABLE =====
function renderTable(data){

let html=`
<thead>
<tr>
<th rowspan="2">Huyện</th>
<th colspan="5">📦 Triển khai mới</th>
<th colspan="5">🔧 Sự cố</th>
</tr>
<tr>
<th>ĐM</th><th>TH</th><th>CL</th><th>%</th><th>T/P</th>
<th>ĐM</th><th>TH</th><th>CL</th><th>%</th><th>T/P</th>
</tr>
</thead><tbody>`;

data.forEach(r=>{
html+=`
<tr>
<td>${r.huyen}</td>

<td>${num(r.dm_tkm)}</td>
<td>${num(r.th_tkm)}</td>
<td>${num(r.cl_tkm)}</td>
<td>${r.tl_tkm}%</td>
<td>${num(r.t_p_tkm)}</td>

<td>${num(r.dm_xlsc)}</td>
<td>${num(r.th_sc)}</td>
<td>${num(r.cl_sc)}</td>
<td>${r.tl_sc}%</td>
<td>${num(r.t_p_sc)}</td>
</tr>`;
});

html+="</tbody>";
document.getElementById("table").innerHTML=html;
}

// ===== TOP =====
function renderTop(data){
let s=[...data].sort((a,b)=>b.t_p-a.t_p).slice(0,10);
document.getElementById("top").innerHTML=
s.map((r,i)=>`<div class="card top">🏆 ${i+1}. ${r.nhan_vien} (${num(r.t_p)})</div>`).join("");
}

// ===== WORST =====
function renderWorst(data){
let s=[...data].sort((a,b)=>a.t_p-b.t_p).slice(0,10);
document.getElementById("worst").innerHTML=
s.map((r,i)=>`<div class="card worst">❌ ${i+1}. ${r.nhan_vien} (${num(r.t_p)})</div>`).join("");
}

// ===== LIST =====
function renderList(data){
let html="";
data.forEach(r=>{
html+=`
<div class="card">
<b>${r.nhan_vien} - ${r.huyen}</b><br>
Tỉ lệ: <span class="${r.tl>=0?'ok':'fail'}">${r.tl}%</span><br>
Thưởng/Phạt: ${num(r.t_p)}
</div>`;
});
document.getElementById("list").innerHTML=html;
}

load();

</script>
</body>
</html>
