<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#f5f7fb; padding:8px; }

/* HEADER */
.header { position: sticky; top:0; background:#f5f7fb; z-index:1000; }
.header-top { display:flex; justify-content:space-between; align-items:center; }

.reload-btn {
  padding:6px 10px;
  background:#2196f3;
  color:#fff;
  border:none;
  border-radius:6px;
}

/* TABLE */
.table-wrap {
  overflow:auto;
  max-height:400px;
  border:1px solid #ddd;
  border-radius:6px;
}

table {
  border-collapse: collapse;
  width:max-content;
  min-width:100%;
  border:2px solid #666;
}

th, td {
  border:1px solid #999;
  padding:6px 8px;
  font-size:12px;
  white-space:nowrap;
}

th { background:#e3f2fd; }

/* STICKY */
thead th[rowspan]{
  position:sticky;
  top:0;
  left:0;
  z-index:20;
  background:#d0e7ff;
}

thead tr:first-child th{
  position:sticky;
  top:0;
  z-index:10;
}

thead tr:nth-child(2) th{
  position:sticky;
  top:30px;
  z-index:9;
}

tbody td:first-child{
  position:sticky;
  left:0;
  z-index:5;
  background:#d0e7ff;
  font-weight:bold;
}

/* CARD */
.card {
  background:#fff;
  padding:8px;
  margin:6px 0;
  border-radius:6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.top { border-left:4px solid #4caf50; }
.worst { border-left:4px solid #e53935; }

.ok { color:#2e7d32; font-weight:bold; }
.fail { color:#c62828; font-weight:bold; }

/* MOBILE */
@media(max-width:768px){
  th,td{ font-size:11px; padding:4px }
  h2{ font-size:18px }
  h3{ font-size:14px }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-top">
    <h2>📊 KPI Khoán Vật Tư</h2>
    <button onclick="location.reload()" class="reload-btn">🔄</button>
  </div>

  <div id="logtime" style="font-size:12px"></div>

  🔍 NV <input id="nv" onkeyup="filter()">
  🔍 Huyện <input id="huyen" onkeyup="filter()">
</div>

<div id="tableSection">
  <h3>📊 Bảng huyện</h3>
  <div class="table-wrap">
    <table id="table"></table>
  </div>
</div>

<div id="topSection">
  <h3>🏆 Top KPI</h3>
  <div id="top"></div>
  <div id="worst"></div>
</div>

<h3>📋 Danh sách nhân viên</h3>
<div id="list"></div>

<script>

const API="https://script.google.com/macros/s/AKfycby2YYZVK6r1QXP_TgnB0i99prYJmEG8cJwGDQILU1tph0i38b80BhN6Oa9bT5IMuQft0A/exec?sheet=Khoan vt";

let tableData=[], nvData=[];

function num(v){return Number(v||0).toLocaleString("vi-VN");}

function load(){
fetch(API).then(r=>r.json()).then(res=>{
let raw=res.data||[];

// logtime
let tg=raw[0]?.tg_update||"";
if(tg){ tg=new Date(tg).toLocaleString("vi-VN"); }
document.getElementById("logtime").innerText="🕒 "+tg;

// bảng huyện
tableData=raw.slice(0,30);

// nhân viên
nvData=raw.slice(30).map(r=>({
  nhan_vien:r["nhan vien"]||r.nhan_vien,
  huyen:r.huyen,

  t_p:Number(r.t_p||0),
  tl:Number(r.tl||0),
  cl:Number(r.cl||0),

  t_p_tkm:Number(r.t_p_tkm||0),
  t_p_sc:Number(r.t_p_sc||0)
}));

applyFilter();
});
}

function filter(){applyFilter();}

function applyFilter(){

let nv=document.getElementById("nv").value.toLowerCase();
let h=document.getElementById("huyen").value.toLowerCase();

let isSearch=nv||h;

document.getElementById("topSection").style.display=
isSearch?"none":"block";

document.getElementById("tableSection").style.display=
nv?"none":"block";

let tableF=tableData.filter(r=>
(r.huyen||"").toLowerCase().includes(h)
);

let nvF=nvData.filter(r=>
(r.nhan_vien||"").toLowerCase().includes(nv)&&
(r.huyen||"").toLowerCase().includes(h)
);

renderTable(tableF);
renderTop(nvData);
renderWorst(nvData);
renderList(nvF);
}

/* TABLE */
function renderTable(data){

let html=`
<thead>
<tr>
<th rowspan="2">Huyện</th>
<th colspan="5">📦 TKM</th>
<th colspan="5">🔧 SC</th>
</tr>
<tr>
<th>ĐM</th><th>TH</th><th>CL</th><th>%</th><th>T/P</th>
<th>ĐM</th><th>TH</th><th>CL</th><th>%</th><th>T/P</th>
</tr>
</thead><tbody>`;

data.forEach(r=>{
html+=`
<tr>
<td>${r.huyen}</td>

<td>${num(r.dm_tkm)}</td>
<td>${num(r.th_tkm)}</td>
<td>${num(r.cl_tkm)}</td>
<td>${r.tl_tkm}%</td>
<td>${num(r.t_p_tkm)}</td>

<td>${num(r.dm_xlsc)}</td>
<td>${num(r.th_sc)}</td>
<td>${num(r.cl_sc)}</td>
<td>${r.tl_sc}%</td>
<td>${num(r.t_p_sc)}</td>
</tr>`;
});

html+="</tbody>";
document.getElementById("table").innerHTML=html;
}

/* TOP TKM */
function renderTop(data){
let s=[...data].sort((a,b)=>b.t_p_tkm-a.t_p_tkm).slice(0,5);

document.getElementById("top").innerHTML=
"<h4>📦 Top TKM</h4>"+
s.map((r,i)=>`
<div class="card top">
🏆 ${i+1}. ${r.nhan_vien}<br>
💰 ${num(r.t_p_tkm)}
</div>`).join("");
}

/* TOP SC */
function renderWorst(data){
let s=[...data].sort((a,b)=>b.t_p_sc-a.t_p_sc).slice(0,5);

document.getElementById("worst").innerHTML=
"<h4>🔧 Top SC</h4>"+
s.map((r,i)=>`
<div class="card worst">
🏆 ${i+1}. ${r.nhan_vien}<br>
💰 ${num(r.t_p_sc)}
</div>`).join("");
}

/* LIST */
function renderList(data){

let html="";
data.forEach(r=>{
html+=`
<div class="card">
<b>${r.nhan_vien} - ${r.huyen}</b><br>
🎯 Tỉ lệ: <span class="${r.tl>=0?'ok':'fail'}">${r.tl}%</span><br>
💰 Thưởng/Phạt: <span class="${r.t_p>=0?'ok':'fail'}">${num(r.t_p)}</span>
</div>`;
});

document.getElementById("list").innerHTML=html;
}

load();

</script>

</body>
</html>
