<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhập dữ liệu</title>

<style>
body{font-family:Arial;padding:10px;background:#f5f5f5}
.card{background:#fff;padding:12px;border-radius:8px}
input,select,button{width:100%;padding:8px;margin-top:8px}
.preview img{width:80px;margin:5px;border-radius:6px}
button{padding:12px;font-size:16px;}
input,select,textarea{font-size:16px;}
body{font-family:Arial;padding:10px;padding-bottom:80px;background:#f5f5f5}
.btn-upload{display:block;width:100%;padding:12px;margin-top:8px;text-align:center;background:#eee;border-radius:6px;cursor:pointer;}
</style>

</head>

<body>

<h3>📋 Nhập xử lý</h3>

<div class="card">

<div id="info"></div>

<textarea id="note" placeholder="Ghi chú" rows="2"></textarea>

<select id="status">
  <option value="done">✅ Đã xử lý</option>
  <option value="fail">❌ Bất khả kháng</option>
</select>

<input type="file" id="img" multiple accept="image/*" style="display:none">
<label for="img" class="btn-upload">📷 Chọn ảnh</label> 

<div class="preview" id="preview"></div>

<button id="btnSave" onclick="save()">💾 Lưu</button>
<div id="loading" style="display:none; margin-top:10px; text-align:center">
  ⏳ Đang tải dữ liệu...
</div>
</div>

<script>

const API_NOTE = "https://script.google.com/macros/s/AKfycbxExUGpUZBAKJ4cqjohbZIoXusU1yxt507eUyl1mgTzzvz-8QdRRoMWw1G6apBoX_kK4Q/exec";

let account = "";
let nhan_vien = "";
let noteData = [];

// ===== LOAD NOTE =====
async function loadNote(){
  let res = await fetch(API_NOTE).then(r=>r.json());
  noteData = res.data;
}

// ===== LẤY PARAM =====
function getParam(){
  let url = new URLSearchParams(window.location.search);
  account = url.get("account");

  document.getElementById("info").innerHTML =
    `<b>Account:</b> ${account}`;
}

// ===== CHECK EXIST =====
function isExist(account){
  return noteData.some(n => n.account == account);
}

// ===== SAVE =====

async function save(){
  document.getElementById("loading").style.display = "block";
  document.getElementById("btnSave").disabled = true;
  let note = document.getElementById("note").value.trim();
  let status = document.getElementById("status").value;
  let files = document.getElementById("img").files;

  let existed = isExist(account);

  // 🔒 CHỐNG TRÙNG
  if(existed){
    if(!confirm("Account đã cập nhật. Bạn muốn cập nhật?")){
      document.getElementById("loading").style.display = "none";
      document.getElementById("btnSave").disabled = false;
      return;
    }
  }

  // 🎯 LOGIC
  if(status === "done"){
    if(files.length === 0){
      alert("⚠️ Đã xử lý phải có ảnh");
      document.getElementById("loading").style.display = "none";
      document.getElementById("btnSave").disabled = false;
      return;
    }
  }

  if(status === "fail"){
    if(files.length === 0 || !note){
      alert("⚠️ Bất khả kháng cần ghi chú + ảnh");
      document.getElementById("loading").style.display = "none";
      document.getElementById("btnSave").disabled = false;
      return;
    }
  }

  // 🚀 upload nhiều ảnh
  let images = [];

  if(files.length > 0){
    for(let f of files){
      let base64 = await compressImagePromise(f);
      images.push(base64);
    }
  }

  send(note, status, images, existed);
}

// ===== SEND =====
function send(note, status, images, existed){

  fetch(API_NOTE,{
    method:"POST",
    body: JSON.stringify({
      account,
      note,
      status,
      images, // 👈 gửi mảng ảnh
      nhan_vien,
      mode: existed ? "update" : "insert"
    })
  })
  .then(res=>res.text())
  .then(()=>{
    alert("✅ Đã lưu");
  
    document.getElementById("loading").style.display = "none";
    document.getElementById("btnSave").disabled = false;
  
    localStorage.setItem("updated_account", account);
  
    if(document.referrer.includes("homewifi")){
      window.history.back();
    }else{
      window.location.href = "https://cvthuong921331040253-hub.github.io/dashboard-icms/homewifi.html";
    }
  })
  .catch(()=>{
    alert("❌ Lỗi upload");
  
    document.getElementById("loading").style.display = "none";
    document.getElementById("btnSave").disabled = false;
  });
}

// ===== NÉN ẢNH PROMISE =====
function compressImagePromise(file){
  return new Promise(resolve=>{
    let img = new Image();
    let reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = function(){
      let canvas = document.createElement("canvas");
      let scale = Math.min(1, 1000 / img.width);

      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      let ctx = canvas.getContext("2d");
      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      resolve(canvas.toDataURL("image/jpeg",0.7));
    };

    reader.readAsDataURL(file);
  });
}

// ===== PREVIEW ẢNH =====
document.getElementById("img").addEventListener("change", function(){

  let preview = document.getElementById("preview");
  preview.innerHTML = "";

  for(let file of this.files){
    let img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  }
});
// 🔥 DEBUG FILE INPUT
document.getElementById("img").addEventListener("click", ()=>{
  console.log("CLICK FILE INPUT");
});

document.getElementById("img").addEventListener("change", ()=>{
  console.log("ĐÃ CHỌN FILE");
});
// INIT
getParam();
loadNote();

</script>

</body>
</html>
