<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nhập dữ liệu</title>

<style>
body{font-family:Arial;padding:10px;background:#f5f5f5}
.card{background:#fff;padding:12px;border-radius:8px}
input,select,button{width:100%;padding:8px;margin-top:8px}
</style>

</head>

<body>

<h3>📋 Nhập xử lý</h3>

<div class="card">

<div id="info"></div>

<input id="note" placeholder="Ghi chú">

<select id="status">
  <option value="done">✅ Đã xử lý</option>
  <option value="fail">❌ Bất khả kháng</option>
</select>

<input type="file" id="img">

<button onclick="save()">💾 Lưu</button>

</div>

<script>

const API_NOTE = "https://script.google.com/macros/s/AKfycbyecpvfz4Z1ZYUh0PrUCtwvNKRJQklp5hjFwdETPZR7rJqj2QG0Yhp_IcMT4hLlkJwj4g/exec";

let account = "";
let nhan_vien = "";

// LẤY PARAM URL
function getParam(){
  let url = new URLSearchParams(window.location.search);
  account = url.get("account");

  document.getElementById("info").innerHTML =
    `<b>Account:</b> ${account}`;
}

// SAVE
function save(){

  let note = document.getElementById("note").value;
  let status = document.getElementById("status").value;
  let file = document.getElementById("img").files[0];

  if(file){
    compressImage(file, (base64)=>{
      send(note, status, base64);
    });
  }else{
    send(note, status, "");
  }
}

function send(note, status, image){

  fetch(API_NOTE,{
    method:"POST",
    body: JSON.stringify({
      account,
      note,
      status,
      image,
      nhan_vien
    })
  })
  .then(res=>res.text())
  .then(()=>{
    alert("✅ Đã lưu");
    window.history.back();
  });
}

// NÉN ẢNH
function compressImage(file, callback){

  let img = new Image();
  let reader = new FileReader();

  reader.onload = e => img.src = e.target.result;

  img.onload = function(){

    let canvas = document.createElement("canvas");
    let scale = Math.min(1, 1000 / img.width);

    canvas.width = img.width * scale;
    canvas.height = img.height * scale;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    callback(canvas.toDataURL("image/jpeg",0.7));
  };

  reader.readAsDataURL(file);
}

getParam();

</script>

</body>
</html>
