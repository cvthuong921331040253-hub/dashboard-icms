<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KPI PRO MAX</title>

<style>
body {
  font-family: Arial;
  padding: 15px;
  background: #f5f7fb;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: 0 1px 5px rgba(0,0,0,0.1);
}

.ok { color: green; }
.fail { color: red; font-weight: bold; }

.top {
  background: #fff3cd;
  border-left: 5px solid gold;
}

.gold { border-left: 6px solid gold; }
.silver { border-left: 6px solid silver; }
.bronze { border-left: 6px solid #cd7f32; }

input {
  padding: 6px;
  margin-right: 8px;
}

.alert {
  background: red;
  color: white;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h2>📊 KPI CĐBR PRO MAX</h2>

<div id="alert"></div>

🔍 Nhân viên <input id="nv" onkeyup="filter()">
🏢 Huyện <input id="huyen" onkeyup="filter()">

<h3>🏆 TOP KPI xuất sắc</h3>
<div id="top"></div>

<h3>📋 Danh sách</h3>
<div id="data"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwO6Jw4qg0Q_xkhj06eSAxudH-G7u1Vny_GyASbPfqyfL6EImF2No2YUe46y00tSEYF/exec?sheet=Taget CDBR";

let allData = [];
let showBadOnly = false;

// ===== FIX DATA =====
function safe(v){ return v ?? 0; }

function toNumber(v){
  if(!v) return 0;

  // fix lỗi date
  if(typeof v === "string" && v.includes("T")) return 0;

  if(typeof v === "string"){
    return parseFloat(v.replace("%","")) || 0;
  }

  return v;
}

function check(v,t,type="up"){
  v = toNumber(v);
  t = toNumber(t);

  if(type==="down") return v <= t;
  return v >= t;
}

// ===== KPI HTML =====
function kpi(label,v,t,type="up"){
  v = toNumber(v);
  t = toNumber(t);

  let ok = check(v,t,type);

  return `<div class="${ok?'ok':'fail'}">
    - ${label}: ${v}% (target ${t}%) ${ok?'✅':'❌'}
  </div>`;
}

// ===== TÍNH ĐIỂM KPI =====
function calcScore(r){

  let score = 0;
  let total = 0;

  function add(v,t,type="up"){
    total++;
    if(check(v,t,type)) score++;
  }

  // triển khai mới
  add(r.tk_3h_moi,r.target_3h_moi);
  add(r.tk_10h_moi,r.target_10h_moi);
  add(r.tk_16h_moi,r.target_16h_moi);
  add(r.tk_24h_moi,r.target_24h_moi);

  // có sẵn
  add(r.tk_3h_co_san,r.target_3h_co_san);
  add(r.tk_10h_co_san,r.target_10h_co_san);
  add(r.tk_16h_co_san,r.target_16h_co_san);
  add(r.tk_24h_co_san,r.target_24h_co_san);

  // hẹn
  add(r.tich_hen,r.target_tich_hen);

  // sự cố
  add(r.sc_3h,r.target_sc_3h);
  add(r.sc_10h,r.target_sc_10h);
  add(r.sc_16h,r.target_sc_16h);
  add(r.sc_24h,r.target_sc_24h);
  add(r.sc_hot,r.target_sc_hot);
  add(r.sc_vip,r.target_sc_vip);
  add(r.sc_ht_24h,r.target_sc_ht_24h);
  add(r.sc_soc24,r.target_sc_soc_24h);
  add(r.sc_soc72,r.target_sc_soc_72h);
  add(r.sc_hen,r.target_sc_hen);
  add(r.sc_lap,r.target_sc_lap,"down");

  return Math.round((score/total)*100);
}

// ===== LOAD =====
function load(){
  fetch(API)
  .then(r=>r.json())
  .then(res=>{
    allData = res.data;

    render(allData);
    top5();
    alertBox();
  });
}

// ===== RENDER =====
function render(data){

  let html = "";

  data.forEach(r=>{

    let score = calcScore(r);

    if(showBadOnly && score >= 100) return;

    html += `
    <div class="card">
      <b>👤 ${safe(r.nhan_vien)} - ${safe(r.huyen)}</b><br>
      📦 TK mới: ${safe(r.tong_tk_moi)} |
      📦 TK có sẵn: ${safe(r.tong_tk_co_san)} |
      🚨 SC: ${safe(r.tong_sc)} |
      🏆 Rank: ${safe(r.vi_tri)} |

      <br><br>

      <b>🔵 Triển khai mới</b>
      ${kpi("3h",r.tk_3h_moi,r.target_3h_moi)}
      ${kpi("10h",r.tk_10h_moi,r.target_10h_moi)}
      ${kpi("16h",r.tk_16h_moi,r.target_16h_moi)}
      ${kpi("24h",r.tk_24h_moi,r.target_24h_moi)}

      <b>🟢 Triển khai có sẵn</b>
      ${kpi("3h",r.tk_3h_co_san,r.target_3h_co_san)}
      ${kpi("10h",r.tk_10h_co_san,r.target_10h_co_san)}
      ${kpi("16h",r.tk_16h_co_san,r.target_16h_co_san)}
      ${kpi("24h",r.tk_24h_co_san,r.target_24h_co_san)}

      <b>🟡 Triển khai hẹn</b>
      ${kpi("Tích hẹn",r.tich_hen,r.target_tich_hen)}

      <b>🔴 Sự cố</b>
      ${kpi("3h",r.sc_3h,r.target_sc_3h)}
      ${kpi("10h",r.sc_10h,r.target_sc_10h)}
      ${kpi("16h",r.sc_16h,r.target_sc_16h)}
      ${kpi("24h",r.sc_24h,r.target_sc_24h)}
      ${kpi("HOT",r.sc_hot,r.target_sc_hot)}
      ${kpi("VIP",r.sc_vip,r.target_sc_vip)}
      ${kpi("HT 24h",r.sc_ht_24h,r.target_sc_ht_24h)}
      ${kpi("SOC 24h",r.sc_soc_24h,r.target_sc_soc_24h)}
      ${kpi("SOC 72h",r.sc_soc_72h,r.target_sc_soc_72h)}
      ${kpi("Hẹn",r.sc_hen,r.target_sc_hen)}
      ${kpi("Lặp",r.sc_lap,r.target_sc_lap,"down")}
    </div>`;
  });

  document.getElementById("data").innerHTML = html;
}

// ===== FILTER =====
function filter(){
  let nv = document.getElementById("nv").value.toLowerCase();
  let h = document.getElementById("huyen").value.toLowerCase();

  let f = allData.filter(r =>
    (r.nhan_vien||"").toLowerCase().includes(nv) &&
    (r.huyen||"").toLowerCase().includes(h)
  );

  render(f);
}

// ===== TOGGLE =====
function onlyBad(v){
  showBadOnly = v;
  render(allData);
}

// ===== TOP PRO =====
function top5(){

  let s = [...allData]
    .map(r => ({...r, score: calcScore(r)}))
    .sort((a,b)=> b.score - a.score)
    .slice(0,5);

  let html="";

  s.forEach((r,i)=>{

    let icon = "🏅";
    let cls = "top";

    if(i===0){ icon="🥇"; cls="card top gold"; }
    else if(i===1){ icon="🥈"; cls="card top silver"; }
    else if(i===2){ icon="🥉"; cls="card top bronze"; }

    html += `<div class="${cls}">
      ${icon} TOP ${i+1} - <b>${r.nhan_vien}</b> - ${r.huyen}
    </div>`;
  });

  document.getElementById("top").innerHTML = html;
}

// ===== AUTO =====
setInterval(load,30000);

// ===== START =====
load();

</script>

</body>
</html>
