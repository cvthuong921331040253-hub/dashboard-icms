<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard ICMS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f0f2f5;
}

h2 {
  margin-top: 10px;
}

input {
  padding: 6px;
  margin-right: 10px;
}

.card {
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  background: white;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.bad { color: red; font-weight: bold; }
.good { color: green; }

.top {
  background: #ffe5e5;
}

</style>
</head>

<body>

<h2>📊 Dashboard</h2>

<div id="dashboard"></div>

<canvas id="chart" height="100"></canvas>

<br>

🔍 Nhân viên:
<input id="nhanvien" onkeyup="applyFilter()">

🏢 Huyện:
<input id="huyen" onkeyup="applyFilter()">

<label>
  <input type="checkbox" onchange="onlyBad(this.checked)">
  Chỉ xem không đạt
</label>

<br><br>

<h2>🏆 Top nhân viên kém nhất</h2>
<div id="top"></div>

<h2>📋 Chi tiết</h2>
<div id="detail"></div>

<script>

let currentData = [];
let showOnlyBad = false;


// ================= LOAD =================
function loadData(sheet) {

  const api = "https://script.google.com/macros/s/AKfycbwO6Jw4qg0Q_xkhj06eSAxudH-G7u1Vny_GyASbPfqyfL6EImF2No2YUe46y00tSEYF/exec?sheet=" + sheet;

  fetch(api)
    .then(res => res.json())
    .then(res => {

      currentData = res.data;

      renderDashboard(currentData);
      renderChart(currentData);
      showTop(currentData);
      showDetail(currentData);
      checkAlert(currentData);
    });
}


// ================= DASHBOARD =================
function renderDashboard(data) {

  let total = data.length;
  let bad = data.filter(r => parseFloat(r["TK 24h"]) < 85).length;

  document.getElementById("dashboard").innerHTML = `
    Tổng: ${total} |
    Không đạt: <span style="color:red">${bad}</span>
  `;
}


// ================= BIỂU ĐỒ =================
function renderChart(data) {

  let bad = data.filter(r => parseFloat(r["TK 24h"]) < 85).length;
  let good = data.length - bad;

  new Chart(document.getElementById("chart"), {
    type: 'pie',
    data: {
      labels: ["Đạt", "Không đạt"],
      datasets: [{
        data: [good, bad]
      }]
    }
  });
}


// ================= ALERT =================
function checkAlert(data) {

  let badList = data.filter(r => parseFloat(r["TK 24h"]) < 85);

  if (badList.length > 0) {
    console.log("⚠️ Có nhân viên không đạt!");
  }
}


// ================= TOP NHÂN VIÊN KÉM =================
function showTop(data) {

  let sorted = [...data].sort((a,b) =>
    parseFloat(a["TK 24h"]) - parseFloat(b["TK 24h"])
  );

  let top5 = sorted.slice(0,5);

  let html = "";

  top5.forEach(r => {
    html += `
      <div class="card top">
        ${r["Nhân viên"]} - ${r["TTH"]} (${r["TK 24h"]}%)
      </div>
    `;
  });

  document.getElementById("top").innerHTML = html;
}


// ================= DETAIL =================
function showDetail(data) {

  let html = "";

  data.forEach(r => {

    let v24 = parseFloat(r["TK 24h"]) || 0;

    if (showOnlyBad && v24 >= 85) return;

    html += `
      <div class="card">
        <b>${r["Nhân viên"]} - ${r["TTH"]}</b><br>
        📦 ${r["Tổng TB TKM"] || 0} |
        🚨 ${r["SC"] || 0} |
        🏆 ${r["Vị thứ"] || "-"}<br><br>

        <div class="${v24 < 85 ? "bad" : "good"}">
          TK 24h: ${v24}% (Target 85%)
        </div>
      </div>
    `;
  });

  document.getElementById("detail").innerHTML = html;
}


// ================= FILTER =================
function applyFilter() {

  let nv = document.getElementById("nhanvien").value.toLowerCase();
  let huyen = document.getElementById("huyen").value.toLowerCase();

  let filtered = currentData.filter(r =>
    (r["Nhân viên"] || "").toLowerCase().includes(nv) &&
    (r["TTH"] || "").toLowerCase().includes(huyen)
  );

  showDetail(filtered);
}


// ================= TOGGLE =================
function onlyBad(val) {
  showOnlyBad = val;
  showDetail(currentData);
}


// ================= AUTO REFRESH =================
setInterval(() => {
  loadData("Taget CDBR");
}, 30000);


// ================= START =================
loadData("Taget CDBR");

</script>

</body>
</html>
