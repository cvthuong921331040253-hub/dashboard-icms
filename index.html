<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard ICMS</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    h2 {
      margin-top: 10px;
    }

    input {
      padding: 5px;
      margin-right: 10px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      background: #f9f9f9;
    }

    .bad {
      color: red;
      font-weight: bold;
    }

    .good {
      color: green;
    }
  </style>
</head>

<body>

<h2>📊 Dashboard</h2>

<div id="dashboard"></div>

<br>

🔍 Nhân viên:
<input id="nhanvien" onkeyup="applyFilter()">

🏢 Huyện:
<input id="huyen" onkeyup="applyFilter()">

<br><br>

<h2>📋 Chi tiết nhân viên</h2>

<div id="detail"></div>

<script>

// =======================
// BIẾN LƯU DỮ LIỆU
// =======================
let currentData = [];

// =======================
// LOAD DATA TỪ GOOGLE SHEET
// =======================
function loadData(sheet) {

  const api = "https://script.google.com/macros/s/AKfycbwO6Jw4qg0Q_xkhj06eSAxudH-G7u1Vny_GyASbPfqyfL6EImF2No2YUe46y00tSEYF/exec?sheet=" + sheet;

  fetch(api)
    .then(res => res.json())
    .then(res => {

      // lưu data để filter
      currentData = res.data;

      // hiển thị dashboard tổng
      renderDashboard(res.data);

      // hiển thị chi tiết
      showDetail(res.data);
    });
}


// =======================
// DASHBOARD TỔNG
// =======================
function renderDashboard(data) {

  let total = data.length;

  // ví dụ: đếm nhân viên không đạt (TK 24h < 85%)
  let bad = data.filter(r => parseFloat(r["TK 24h"]) < 85).length;

  let percent = ((bad / total) * 100).toFixed(1);

  document.getElementById("dashboard").innerHTML = `
    Tổng: ${total} <br>
    Không đạt: <span style="color:red">${bad}</span> <br>
    Tỷ lệ: ${percent}%
  `;
}


// =======================
// HIỂN THỊ CHI TIẾT NHÂN VIÊN
// =======================
function showDetail(data) {

  let html = "";

  data.forEach(r => {

    // ===== THÔNG TIN CHUNG =====
    let ten = r["Nhân viên"] || "";
    let huyen = r["TTH"] || "";

    let tongTB = r["Tổng TB TKM"] || 0;
    let suCo = r["SC"] || 0;
    let rank = r["Vị thứ"] || "-";

    html += `
      <div class="card">
        <b>👤 ${ten} - ${huyen}</b><br>
        📦 Tổng thuê bao: ${tongTB}<br>
        🚨 Tổng sự cố: ${suCo}<br>
        🏆 Xếp hạng: ${rank}<br><br>
    `;

    // ===== KPI (CÓ THỂ CHỈNH) =====
    let kpis = [
      {name: "TK 3h", key: "TK 3h", target: 45},
      {name: "TK 10h", key: "TK 10h", target: 75},
      {name: "TK 24h", key: "TK 24h", target: 85}
    ];

    kpis.forEach(k => {

      let v = parseFloat(r[k.key]) || 0;

      // kiểm tra đạt hay không
      let isBad = v < k.target;

      html += `
        <div class="${isBad ? "bad" : "good"}">
          ${k.name}: ${v}% (Target ${k.target}%)
        </div>
      `;
    });

    html += "</div>";
  });

  document.getElementById("detail").innerHTML = html;
}


// =======================
// FILTER NHÂN VIÊN / HUYỆN
// =======================
function applyFilter() {

  let nv = document.getElementById("nhanvien").value.toLowerCase();
  let huyen = document.getElementById("huyen").value.toLowerCase();

  let filtered = currentData.filter(r =>
    (r["Nhân viên"] || "").toLowerCase().includes(nv) &&
    (r["TTH"] || "").toLowerCase().includes(huyen)
  );

  showDetail(filtered);
}


// =======================
// AUTO LOAD 30 GIÂY
// =======================
setInterval(() => {
  loadData("Taget CDBR");
}, 30000);


// =======================
// LOAD LẦN ĐẦU
// =======================
loadData("Taget CDBR");

</script>

</body>
</html>
