<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard KPI</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

.card {
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 15px;
}

.ok { color: green; }
.fail { color: red; }

h3 { margin: 5px 0; }

</style>
</head>

<body>

<h2>📊 Dashboard KPI</h2>

<div id="data"></div>

<script>

// 👉 API của bạn
const API = "https://script.google.com/macros/s/AKfycbwO6Jw4qg0Q_xkhj06eSAxudH-G7u1Vny_GyASbPfqyfL6EImF2No2YUe46y00tSEYF/exec?sheet=Taget CDBR";

// =======================
// CHECK KPI
// =======================
function check(value, target, type="normal") {
  value = parseFloat(value) || 0;
  target = parseFloat(target) || 0;

  if (type === "reverse") {
    return value <= target;
  }
  return value >= target;
}

// =======================
// RENDER 1 KPI
// =======================
function renderKPI(label, value, target, type="normal") {
  const ok = check(value, target, type);

  return `
    <div class="${ok ? 'ok' : 'fail'}">
      - ${label}: ${value}% (target ${target}%) ${ok ? '✅' : '❌'}
    </div>
  `;
}

// =======================
// LOAD DATA
// =======================
function loadData() {

  fetch(API)
  .then(res => res.json())
  .then(res => {

    let html = "";

    res.data.forEach(row => {

      html += `
      <div class="card">

        <h3>👤 ${row.nhan_vien} - ${row.huyen}</h3>

        <div>📦 Triển khai mới: ${row.tong_tk_moi}</div>
        <div>📦 Đường dây có sẵn: ${row.tong_tk_co_san}</div>
        <div>🚨 Tổng sự cố: ${row.tong_sc}</div>
        <div>🏆 Xếp hạng: ${row.vi_tri}</div>

        <br>

        <b>🔵 Triển khai mới</b>
        ${renderKPI("3h", row.tk_3h_moi, row.target_3h_moi)}
        ${renderKPI("10h", row.tk_10h_moi, row.target_10h_moi)}
        ${renderKPI("16h", row.tk_16h_moi, row.target_16h_moi)}
        ${renderKPI("24h", row.tk_24h_moi, row.target_24h_moi)}

        <br>

        <b>🟢 Triển khai có sẵn</b>
        ${renderKPI("3h", row.tk_3h_co_san, row.target_3h_co_san)}
        ${renderKPI("10h", row.tk_10h_co_san, row.target_10h_co_san)}
        ${renderKPI("16h", row.tk_16h_co_san, row.target_16h_co_san)}
        ${renderKPI("24h", row.tk_24h_co_san, row.target_24h_co_san)}

        <br>

        <b>🟡 Triển khai hẹn</b>
        ${renderKPI("Tích hẹn", row.tich_hen, row.target_tich_hen)}

        <br>

        <b>🔴 Sự cố</b>
        ${renderKPI("3h", row.sc_3h, row.target_sc_3h)}
        ${renderKPI("10h", row.sc_10h, row.target_sc_10h)}
        ${renderKPI("16h", row.sc_16h, row.target_sc_16h)}
        ${renderKPI("24h", row.sc_24h, row.target_sc_24h)}
        ${renderKPI("HOT", row.sc_hot, row.target_sc_hot)}
        ${renderKPI("VIP", row.sc_vip, row.target_sc_vip)}
        ${renderKPI("SOC 24h", row.sc_soc24, row.target_sc_soc24)}
        ${renderKPI("SOC 72h", row.sc_soc72, row.target_sc_soc72)}
        ${renderKPI("Hẹn", row.sc_hen, row.target_sc_hen)}

        ${renderKPI("Sự cố lặp", row.sc_lap, row.target_sc_lap, "reverse")}

      </div>
      `;

    });

    document.getElementById("data").innerHTML = html;

  });
}

// load lần đầu
loadData();

// auto reload 30s
setInterval(loadData, 30000);

</script>

</body>
</html>
