<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Target</title>

<style>
body { font-family: Arial; padding: 20px; }
table { border-collapse: collapse; width: 100%; font-size: 12px; }
th, td { border: 1px solid #ccc; padding: 5px; }
th { background: #f2f2f2; }

.red { background-color: #ffcccc; }

.box {
  padding: 10px;
  background: #f5f5f5;
  margin-bottom: 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<h2>📊 Dashboard</h2>
<div class="box" id="dashboard"></div>

<br>

🔍 Nhân viên:
<input type="text" id="filterName" onkeyup="applyFilter()">

🏢 Huyện:
<input type="text" id="filterHuyen" onkeyup="applyFilter()">

<br><br>

<select onchange="loadData(this.value)">
  <option value="ICMS">ICMS</option>
  <option value="Taget CDBR">Taget CDBR</option>
</select>

<br><br>

<div id="data"></div>

<script>

let currentData = [];
let currentHeaders = [];

function loadData(sheet) {
  const api = "https://script.google.com/macros/s/AKfycbwO6Jw4qg0Q_xkhj06eSAxudH-G7u1Vny_GyASbPfqyfL6EImF2No2YUe46y00tSEYF/exec?sheet=" + sheet;

  fetch(api)
    .then(res => res.json())
    .then(res => {

      currentData = res.data;
      currentHeaders = res.headers;

      renderTable(currentData);

      updateDashboard(currentData);
    });
}

function applyFilter() {
  let name = document.getElementById("filterName").value.toLowerCase();
  let huyen = document.getElementById("filterHuyen").value.toLowerCase();

  let filtered = currentData.filter(r =>
    (r["Nhân viên"] || "").toLowerCase().includes(name) &&
    (r["TTH"] || "").toLowerCase().includes(huyen)
  );

  renderTable(filtered);
  updateDashboard(filtered);
}

function updateDashboard(data) {
  let total = data.length;

  let khongDat = 0;

  data.forEach(row => {
    for (let key in row) {
      if (key.toLowerCase().includes("target")) {
        let val = parseFloat(row[key]);
        if (!isNaN(val) && val < 100) {
          khongDat++;
          break;
        }
      }
    }
  });

  let percent = total ? ((khongDat / total) * 100).toFixed(1) : 0;

  document.getElementById("dashboard").innerHTML = `
    Tổng: ${total} <br>
    Không đạt: <span style="color:red">${khongDat}</span><br>
    Tỷ lệ: <span style="color:red">${percent}%</span>
  `;
}

function renderTable(data) {
  let html = "<table><tr>";

  currentHeaders.forEach(h => {
    html += `<th>${h}</th>`;
  });

  html += "</tr>";

  data.forEach(row => {

    let isBad = false;

    for (let key in row) {
      if (key.toLowerCase().includes("target")) {
        let val = parseFloat(row[key]);
        if (!isNaN(val) && val < 100) {
          isBad = true;
          break;
        }
      }
    }

    let color = isBad ? "class='red'" : "";

    html += `<tr ${color}>`;

    currentHeaders.forEach(h => {
      html += `<td>${row[h] || ""}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("data").innerHTML = html;
}

// load mặc định
loadData("Taget CDBR");

</script>

</body>
</html>
