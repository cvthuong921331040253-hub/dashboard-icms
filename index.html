<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ICMS PRO Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  padding: 20px;
}

/* HEADER */
.header {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

/* BOX */
.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

/* CARD */
.card {
  background: white;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

/* STATUS */
.bad { color: red; font-weight: bold; }
.good { color: green; }

.top { background: #ffecec; }

/* INPUT */
input, select {
  padding: 6px;
  margin-right: 10px;
}

.alert {
  background: red;
  color: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="header">🚀 ICMS PRO DASHBOARD</div>

<div id="alertBox"></div>

<div class="grid">
  <div class="box" id="totalBox"></div>
  <div class="box" id="chartBox">
    <canvas id="chart"></canvas>
  </div>
  <div class="box" id="huyenChartBox">
    <canvas id="chartHuyen"></canvas>
  </div>
</div>

<div class="box">
  🔍 Nhân viên <input id="nv" onkeyup="applyFilter()">
  🏢 Huyện <input id="huyen" onkeyup="applyFilter()">

  <select onchange="filterStatus(this.value)">
    <option value="all">Tất cả</option>
    <option value="bad">Không đạt</option>
    <option value="good">Đạt</option>
  </select>
</div>

<div class="box">
  <h3>🏆 Top 5 nhân viên kém nhất</h3>
  <div id="top"></div>
</div>

<div class="box">
  <h3>📋 Danh sách</h3>
  <div id="list"></div>
</div>

<script>

let currentData = [];
let statusFilter = "all";


// ================= LOAD =================
function loadData() {

  const api = "https://script.google.com/macros/s/AKfycbwO6Jw4qg0Q_xkhj06eSAxudH-G7u1Vny_GyASbPfqyfL6EImF2No2YUe46y00tSEYF/exec?sheet=Taget CDBR";

  fetch(api)
    .then(r => r.json())
    .then(res => {

      currentData = res.data;

      renderTotal();
      renderChart();
      renderHuyenChart();
      renderTop();
      renderList();
      showAlert();
    });
}


// ================= TOTAL =================
function renderTotal() {

  let total = currentData.length;
  let bad = currentData.filter(r => parseFloat(r["TK 24h"]) < 85).length;

  document.getElementById("totalBox").innerHTML = `
    Tổng NV: ${total}<br>
    Không đạt: <span style="color:red">${bad}</span>
  `;
}


// ================= PIE =================
function renderChart() {

  let bad = currentData.filter(r => parseFloat(r["TK 24h"]) < 85).length;
  let good = currentData.length - bad;

  new Chart(chart, {
    type: 'pie',
    data: {
      labels: ["Đạt", "Không đạt"],
      datasets: [{ data: [good, bad] }]
    }
  });
}


// ================= HUYEN CHART =================
function renderHuyenChart() {

  let map = {};

  currentData.forEach(r => {
    let h = r["TTH"] || "Khác";
    let v = parseFloat(r["TK 24h"]) || 0;

    if (!map[h]) map[h] = [];
    map[h].push(v);
  });

  let labels = [];
  let values = [];

  for (let h in map) {
    let avg = map[h].reduce((a,b)=>a+b,0)/map[h].length;
    labels.push(h);
    values.push(avg.toFixed(1));
  }

  new Chart(chartHuyen, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{ label: "% TB", data: values }]
    }
  });
}


// ================= ALERT =================
function showAlert() {

  let bad = currentData.filter(r => parseFloat(r["TK 24h"]) < 85);

  if (bad.length > 0) {
    document.getElementById("alertBox").innerHTML =
      `<div class="alert">⚠️ Có ${bad.length} nhân viên không đạt!</div>`;
  }
}


// ================= TOP =================
function renderTop() {

  let sorted = [...currentData].sort((a,b)=>
    parseFloat(a["TK 24h"]) - parseFloat(b["TK 24h"])
  );

  let top = sorted.slice(0,5);

  let html = "";

  top.forEach(r => {
    html += `<div class="card top">
      ${r["Nhân viên"]} - ${r["TTH"]} (${r["TK 24h"]}%)
    </div>`;
  });

  document.getElementById("top").innerHTML = html;
}


// ================= LIST =================
function renderList(data = currentData) {

  let html = "";

  data.forEach(r => {

    let v = parseFloat(r["TK 24h"]) || 0;

    if (statusFilter === "bad" && v >= 85) return;
    if (statusFilter === "good" && v < 85) return;

    html += `
      <div class="card">
        <b>${r["Nhân viên"]}</b> - ${r["TTH"]}<br>
        📦 ${r["Tổng TB TKM"] || 0}
        | 🚨 ${r["SC"] || 0}
        | 🏆 ${r["Vị thứ"] || "-"}<br>

        <div class="${v < 85 ? "bad" : "good"}">
          TK 24h: ${v}% (Target 85%)
        </div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}


// ================= FILTER =================
function applyFilter() {

  let nv = document.getElementById("nv").value.toLowerCase();
  let huyen = document.getElementById("huyen").value.toLowerCase();

  let filtered = currentData.filter(r =>
    (r["Nhân viên"]||"").toLowerCase().includes(nv) &&
    (r["TTH"]||"").toLowerCase().includes(huyen)
  );

  renderList(filtered);
}


// ================= STATUS =================
function filterStatus(val) {
  statusFilter = val;
  renderList();
}


// ================= AUTO =================
setInterval(loadData, 30000);


// ================= START =================
loadData();

</script>

</body>
</html>
