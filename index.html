<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KPI FINAL</title>

<style>
body {
  font-family: Arial;
  padding: 15px;
  background: #f5f7fb;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: 0 1px 5px rgba(0,0,0,0.1);
}

.ok { color: green; }
.fail { color: red; font-weight: bold; }

.top { background: #e8f5e9; }
.worst { background: #ffeaea; }

input {
  padding: 6px;
  margin-right: 8px;
}

</style>
</head>

<body>

<h2>📊 KPI CĐBR</h2>

🔍 Nhân viên <input id="nv" onkeyup="filter()">
🏢 Huyện <input id="huyen" onkeyup="filter()">
<label><input type="checkbox" onchange="onlyBad(this.checked)"> KPI kém</label>

<h3>🏆 Top tốt</h3>
<div id="top"></div>

<h3>⚠️ Top 10 nhân viên kém</h3>
<div id="worst"></div>

<h3>📋 Danh sách</h3>
<div id="data"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwO6Jw4qg0Q_xkhj06eSAxudH-G7u1Vny_GyASbPfqyfL6EImF2No2YUe46y00tSEYF/exec?sheet=Taget CDBR";

let allData = [];
let showBadOnly = false;

// ===== FIX DATA =====
function safe(v){ return v ?? 0; }

function toNumber(v){
  if(!v) return 0;
  if(typeof v === "string" && v.includes("T")) return 0;
  if(typeof v === "string"){
    return parseFloat(v.replace("%","")) || 0;
  }
  return v;
}

function check(v,t,type="up"){
  v = toNumber(v);
  t = toNumber(t);

  if(type==="down") return v <= t;
  return v >= t;
}

// ===== KPI =====
function kpi(label,v,t,type="up"){
  let ok = check(v,t,type);
  return `<div class="${ok?'ok':'fail'}">
    - ${label}: ${toNumber(v)}% (target ${toNumber(t)}%) ${ok?'✅':'❌'}
  </div>`;
}

// ===== LOAD =====
function load(){
  fetch(API)
  .then(r=>r.json())
  .then(res=>{
    allData = res.data;

    render(allData);
    top5();
    topWorst();
  });
}

// ===== RENDER =====
function render(data){

  let html = "";

  data.forEach(r=>{

    // lọc KPI kém (dựa 24h)
    let bad = !check(r.tk_24h_moi,r.target_24h_moi);

    if(showBadOnly && !bad) return;

    html += `
    <div class="card">
      <b>👤 ${safe(r.nhan_vien)} - ${safe(r.huyen)}</b><br>
      📦 TK mới: ${safe(r.tong_tk_moi)} |
      📦 TK có sẵn: ${safe(r.tong_tk_co_san)} |
      🚨 SC: ${safe(r.tong_sc)} |
      🏆 Rank: ${safe(r.vi_tri)}

      <br><br>

      <b>🔵 Triển khai mới</b>
      ${kpi("24h",r.tk_24h_moi,r.target_24h_moi)}

      <b>🟢 Có sẵn</b>
      ${kpi("24h",r.tk_24h_co_san,r.target_24h_co_san)}

      <b>🔴 Sự cố</b>
      ${kpi("24h",r.sc_24h,r.target_sc_24h)}
      ${kpi("Lặp",r.sc_lap,r.target_sc_lap,"down")}
    </div>`;
  });

  document.getElementById("data").innerHTML = html;
}

// ===== FILTER =====
function filter(){
  let nv = document.getElementById("nv").value.toLowerCase();
  let h = document.getElementById("huyen").value.toLowerCase();

  let f = allData.filter(r =>
    (r.nhan_vien||"").toLowerCase().includes(nv) &&
    (r.huyen||"").toLowerCase().includes(h)
  );

  render(f);
}

// ===== CHECKBOX =====
function onlyBad(v){
  showBadOnly = v;
  render(allData);
}

// ===== TOP TỐT =====
function top5(){

  let s = [...allData]
    .sort((a,b)=> toNumber(a.vi_tri) - toNumber(b.vi_tri))
    .slice(0,5);

  let html="";

  s.forEach((r,i)=>{
    html += `<div class="card top">
      🏆 TOP ${i+1} - ${r.nhan_vien} - ${r.huyen}
    </div>`;
  });

  document.getElementById("top").innerHTML = html;
}

// ===== TOP KÉM =====
function topWorst(){

  let s = [...allData]
    .sort((a,b)=> toNumber(b.vi_tri) - toNumber(a.vi_tri))
    .slice(0,10);

  let html="";

  s.forEach((r,i)=>{
    html += `<div class="card worst">
      ❌ TOP KÉM ${i+1} - ${r.nhan_vien} - ${r.huyen} (Rank: ${r.vi_tri})
    </div>`;
  });

  document.getElementById("worst").innerHTML = html;
}

// ===== AUTO =====
setInterval(load,30000);

// ===== PULL DOWN MOBILE =====
let startY = 0;

document.addEventListener("touchstart", e=>{
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{
  let endY = e.changedTouches[0].clientY;

  if(endY - startY > 100){
    load();
  }
});

// START
load();

</script>

</body>
</html>
